            async _showMissionModal(isEdit, mKey = null) {
                let mData = { targetLevel: 5, title: '', rewards: [] };
                if (isEdit && mKey) {
                    Loader.show();
                    const snap = await get(ref(db, `cat_missions/${mKey}`));
                    Loader.hide();
                    if (snap.exists()) mData = snap.val();
                }

                Loader.show();
                const shopSnap = await get(ref(db, 'cat_shop'));
                Loader.hide();
                const catShop = shopSnap.exists() ? shopSnap.val() : {};

                let optHtml = `<option value="">-- ไม่เลือก / ไม่มี --</option>`;
                optHtml += `<option value="ticket|ticket">🎟️ Ticket</option>`;
                for (const [k, v] of Object.entries(catShop)) {
                    let prefix = '';
                    if(v.type==='cat') prefix='🐱 แมว';
                    else if(v.type==='bg') prefix='🖼️ พื้นหลัง';
                    else if(v.type==='cat_frame') prefix='⭐ กรอบโปรไฟล์';
                    else if(v.type==='food') prefix='🍖 อาหาร';
                    
                    if (prefix) optHtml += `<option value="${v.type}|${k}">${prefix} - ${v.name}</option>`;
                }

                let r1 = '', a1 = 1, r2 = '', a2 = 1;
                if (mData.rewards && mData.rewards.length > 0) {
                    r1 = `${mData.rewards[0].type}|${mData.rewards[0].id}`;
                    a1 = mData.rewards[0].amount || 1;
                    if (mData.rewards.length > 1) {
                        r2 = `${mData.rewards[1].type}|${mData.rewards[1].id}`;
                        a2 = mData.rewards[1].amount || 1;
                    }
                }

                const { value: formValues } = await Swal.fire({
                    title: `<span style="font-family: 'Kanit';">${isEdit ? 'แก้ไขภารกิจ' : 'เพิ่มภารกิจใหม่'}</span>`,
                    html: `
                        <div class="text-left font-sans text-xs space-y-3 mt-3 overflow-y-auto max-h-[60vh] no-scrollbar px-1">
                            <div>
                                <label class="block text-gray-500 mb-1 font-bold">เป้าหมาย (เลเวลแมว)</label>
                                <input type="number" id="ms-lvl" class="w-full p-2.5 border rounded-lg bg-gray-50 focus:outline-primary" value="${mData.targetLevel}" min="1">
                            </div>
                            <div>
                                <label class="block text-gray-500 mb-1 font-bold">ชื่อภารกิจ (ถ้ามี)</label>
                                <input type="text" id="ms-title" class="w-full p-2.5 border rounded-lg bg-gray-50 focus:outline-primary" value="${mData.title || ''}" placeholder="เช่น เติบโตเป็นแมว Lv.5">
                            </div>
                            
                            <div class="p-3 bg-indigo-50 border border-indigo-100 rounded-xl space-y-2">
                                <label class="block text-indigo-800 font-bold">รางวัลที่ 1</label>
                                <select id="ms-r1" class="w-full p-2.5 border rounded-lg" onchange="app.toggleMissionAmount(1, this.value)">
                                    ${optHtml}
                                </select>
                                <div id="ms-amt1-box" style="display:none;">
                                    <label class="block text-gray-500 mt-2 mb-1 font-bold">จำนวนที่ได้รับ</label>
                                    <input type="number" id="ms-amt1" class="w-full p-2.5 border rounded-lg focus:outline-primary" value="${a1}" min="1">
                                </div>
                            </div>

                            <div class="p-3 bg-indigo-50 border border-indigo-100 rounded-xl space-y-2">
                                <label class="block text-indigo-800 font-bold">รางวัลที่ 2 (ตัวเลือก)</label>
                                <select id="ms-r2" class="w-full p-2.5 border rounded-lg" onchange="app.toggleMissionAmount(2, this.value)">
                                    ${optHtml}
                                </select>
                                <div id="ms-amt2-box" style="display:none;">
                                    <label class="block text-gray-500 mt-2 mb-1 font-bold">จำนวนที่ได้รับ</label>
                                    <input type="number" id="ms-amt2" class="w-full p-2.5 border rounded-lg focus:outline-primary" value="${a2}" min="1">
                                </div>
                            </div>
                        </div>
                    `,
                    showCancelButton: true, confirmButtonText: 'บันทึก', confirmButtonColor: '#27D6F5', customClass: {popup: 'rounded-[2rem]'},
                    didOpen: () => {
                        document.getElementById('ms-r1').value = r1;
                        document.getElementById('ms-r2').value = r2;
                        window.app.toggleMissionAmount(1, r1);
                        window.app.toggleMissionAmount(2, r2);
                    },
                    preConfirm: () => {
                        const targetLevel = parseInt(document.getElementById('ms-lvl').value);
                        const title = document.getElementById('ms-title').value.trim();
                        const v1 = document.getElementById('ms-r1').value;
                        const v2 = document.getElementById('ms-r2').value;
                        
                        if (!targetLevel || targetLevel < 1) { Swal.showValidationMessage('ระบุเลเวลเป้าหมายให้ถูกต้อง'); return false; }
                        if (!v1 && !v2) { Swal.showValidationMessage('ต้องมีรางวัลอย่างน้อย 1 อย่าง'); return false; }

                        let rewards = [];
                        [v1, v2].forEach((v, idx) => {
                            if (v) {
                                const [t, id] = v.split('|');
                                const amtBox = document.getElementById(`ms-amt${idx+1}`);
                                const amt = (t === 'food' || t === 'ticket') ? (parseInt(amtBox.value) || 1) : 1;
                                rewards.push({ type: t, id: id, amount: amt });
                            }
                        });

                        return { targetLevel, title, rewards };
                    }
                });

                if (formValues) {
                    Loader.show();
                    try {
                        if (isEdit) await update(ref(db, `cat_missions/${mKey}`), formValues);
                        else await push(ref(db, 'cat_missions'), formValues);
                        Loader.hide(); Toast.fire({icon: 'success', title: 'บันทึกภารกิจสำเร็จ'});
                        this.renderCatMission();
                    } catch(e) { Loader.hide(); Toast.fire({icon:'error', title:'Error'}); }
                }
            },
            
            async addCatMission() { this._showMissionModal(false); },
            async editCatMission(key) { this._showMissionModal(true, key); },
            async deleteCatMission(key) {
                const res = await Swal.fire({title:'ลบภารกิจนี้?', icon:'warning', showCancelButton:true, customClass:{popup:'rounded-3xl'}});
                if(res.isConfirmed) { Loader.show(); await remove(ref(db, `cat_missions/${key}`)); Loader.hide(); this.renderCatMission(); }
            },

            async claimCatMission(key) {
                Loader.show();
                try {
                    const [mSnap, shopSnap] = await Promise.all([
                        get(ref(db, `cat_missions/${key}`)),
                        get(ref(db, 'cat_shop'))
                    ]);
                    
                    if (!mSnap.exists()) { Loader.hide(); return Toast.fire({icon:'error', title:'ไม่พบภารกิจ'}); }
                    
                    const mission = mSnap.val();
                    const catShop = shopSnap.exists() ? shopSnap.val() : {};
                    const u = appState.user;
                    let updates = {};

                    // ข้ามการรับหากเคยรับแล้วเพื่อความปลอดภัย
                    if(u.catData?.missionsClaimed?.[key]) { Loader.hide(); return Toast.fire({icon:'info', title:'คุณรับรางวัลนี้ไปแล้ว'}); }

                    updates[`users/${u.uid}/catData/missionsClaimed/${key}`] = true;
                    if(!u.catData.missionsClaimed) u.catData.missionsClaimed = {};
                    u.catData.missionsClaimed[key] = true;

                    for (let r of (mission.rewards || [])) {
                        if (r.type === 'ticket') {
                            const cur = u.items?.ticket || 0;
                            updates[`users/${u.uid}/items/ticket`] = cur + r.amount;
                            if(!u.items) u.items = {};
                            u.items.ticket = cur + r.amount;
                        } else {
                            const shopItem = catShop[r.id];
                            if (!shopItem) continue;

                            if (r.type === 'food') {
                                const cur = u.catData.inventory?.[r.id] || 0;
                                updates[`users/${u.uid}/catData/inventory/${r.id}`] = cur + r.amount;
                                if(!u.catData.inventory) u.catData.inventory = {};
                                u.catData.inventory[r.id] = cur + r.amount;
                            } else if (r.type === 'cat' || r.type === 'bg') {
                                updates[`users/${u.uid}/catData/unlocked/${shopItem.driveId}`] = true;
                                if(!u.catData.unlocked) u.catData.unlocked = {};
                                u.catData.unlocked[shopItem.driveId] = true;
                            } else if (r.type === 'cat_frame') {
                                updates[`users/${u.uid}/unlocked_frames/${shopItem.driveId}`] = true;
                                if(!u.unlocked_frames) u.unlocked_frames = {};
                                u.unlocked_frames[shopItem.driveId] = true;
                            }
                        }
                    }

                    await update(ref(db), updates);
                    Loader.hide();
                    Swal.fire({ icon: 'success', title: 'ยินดีด้วย!', text: 'รับรางวัลจากภารกิจสำเร็จแล้ว', customClass: {popup: 'rounded-[2rem]'}, confirmButtonColor: '#27D6F5' });
                    this.renderCatMission();

                } catch(e) { Loader.hide(); Toast.fire({icon:'error', title:'เกิดข้อผิดพลาด'}); }
            },

            async claimCatMining(type) {
                const u = appState.user;
                const banData = window.app.checkBanStatus(u);
                if (banData) {
                    return Swal.fire({
                        icon: 'error',
                        title: 'ถูกระงับสิทธิ์การรับแร่',
                        html: `<b>${banData.reasonTitle}</b><br><p class="text-sm mt-2">${banData.reasonDetail}</p>`,
                        confirmButtonColor: '#F5275B',
                        customClass: { popup: 'rounded-[2rem]' }
                    });
                }
                const catData = u.catData;
                if (!catData || !catData.mining || !catData.mining[type] || !catData.mining[type].ready || catData.mining[type].claimed) return;

                let hungerWidth = Math.max(0, Math.min(100, catData.hunger || 0));
                let happyWidth = Math.max(0, Math.min(100, catData.happiness || 0));

                if (hungerWidth === 0) {
                    return Swal.fire({icon:'error', title:'แมวไม่มีแรง!', text:'ความหิว 0% โปรดให้อาหารก่อนสุ่มขุดแร่', customClass:{popup:'rounded-3xl'}});
                }

                let factor = happyWidth / 100;
                let yieldAmount = 0; let nameStr = '';
                if (type === 'cc') { yieldAmount = Math.floor(1000 + (500 * factor)); nameStr = 'Cat Coin'; }
                if (type === 'cd') { yieldAmount = Math.floor(1000 + (500 * factor)); nameStr = 'Cat Diamond'; }
                if (type === 'ce') { yieldAmount = Math.floor(250 + (50 * factor)); nameStr = 'Cat Emerald'; }

                // 🌟 [จุดแก้ไขเพิ่ม] เช็กการสวมใส่การ์ดพิเศษเพื่อคูณ 2 ค่าแร่ดิบ
                const equippedItems = u.equippedSpecialItems || {};
                const hasCCx2 = Object.values(equippedItems).includes('item_1'); // CatCoin x2
                const hasCDx2 = Object.values(equippedItems).includes('item_2'); // CatDiamond x2
                const hasCEx2 = Object.values(equippedItems).includes('item_3'); // CatEmerald x2

                if (type === 'cc' && hasCCx2) yieldAmount *= 2;
                if (type === 'cd' && hasCDx2) yieldAmount *= 2;
                if (type === 'ce' && hasCEx2) yieldAmount *= 2;

                Loader.show();
                try {
                    const currentInv = catData.inventory[type] || 0;
                    let updates = {};
                    updates[`users/${u.uid}/catData/inventory/${type}`] = currentInv + yieldAmount;
                    updates[`users/${u.uid}/catData/mining/${type}/claimed`] = true;
                    
                    await update(ref(db), updates);
                    appState.user.catData.inventory[type] = currentInv + yieldAmount;
                    appState.user.catData.mining[type].claimed = true;
                    
                    Loader.hide();
                    Toast.fire({ icon: 'success', title: `ได้รับ ${yieldAmount.toLocaleString()} ${nameStr}` });
                    
                    this.renderCatRoomMain(); 
                } catch(e) { Loader.hide(); Toast.fire({icon:'error', title:'เกิดข้อผิดพลาด'}); }
            },

        async feedCat(foodId, hPlus, hpPlus) {
            const u = appState.user;
            if (!u || !u.catData) return;
            let curFood = u.catData.inventory[foodId] || 0;
            if (curFood <= 0) return;

            let curHunger = u.catData.hunger || 0;
            let curHappy = u.catData.happiness || 0;
            let curLevel = u.catData.level || 1;
            let overfeedCount = u.catData.overfeedCount || 0;

            // 🌟 ดึงข้อมูลรายละเอียดอาหาร (ชื่อ และ รูปภาพ) จาก Store มาแสดงผลบน Modal
            const foodItem = window.renderStore && window.renderStore.catShop && window.renderStore.catShop[foodId];
            const foodName = foodItem ? foodItem.name : 'อาหารแมว';
            // สร้างลิงก์รูปภาพจาก driveId ของอาหาร (ถ้าไม่มีจะใช้ภาพ Default แทน)
            const foodImage = foodItem && foodItem.driveId 
                ? `https://drive.google.com/thumbnail?id=${foodItem.driveId}&sz=s800` 
                : 'https://cdn-icons-png.flaticon.com/512/3043/3043834.png'; 

            // 1. เช็คเพดานการกินสูงสุดที่เหลืออยู่ (Overfeed Limit)
            if (curHunger >= 100 && curHappy >= 100 && overfeedCount >= 5) {
                return Swal.fire({
                    icon: 'info',
                    title: 'อิ่มแล้ว เมี๊ยว!',
                    text: 'น้องแมวอิ่มมากจนทานเพิ่มไม่ไหวแล้วน้า~',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' }
                });
            }

            // 2. คำนวณหาจำนวนสูงสุดที่สามารถป้อนได้ในครั้งนี้
            let maxFeedQty = curFood; 

            // หากปัจจุบันแมวอิ่มเต็ม 100 ทั้งคู่แล้ว จำกัดเพดานตามสิทธิ์ Overfeed ที่เหลืออยู่ (ไม่เกิน 5)
            if (curHunger >= 100 && curHappy >= 100) {
                maxFeedQty = Math.min(maxFeedQty, 5 - overfeedCount);
            }

            let feedQty = 1; // จำนวนเริ่มต้นในสไลเดอร์

            // 3. เปิด Modal ให้เลือกจำนวนอาหารที่ต้องการป้อน พร้อมแสดงรูปและชื่ออาหาร
            const res = await Swal.fire({
                title: 'ป้อนอาหารน้องแมว',
                html: `
                    <div class="p-1 animate-fadeIn">
                        <!-- 🌟 ส่วนแสดงรูปภาพและชื่อของอาหารแมวที่ถูกกดเลือก -->
                        <div class="flex flex-col items-center justify-center bg-gradient-to-b from-indigo-50/50 to-transparent p-4 rounded-3xl border border-indigo-50/80 mb-4">
                            <div class="w-20 h-20 bg-white border-2 border-indigo-100 rounded-2xl flex items-center justify-center overflow-hidden p-1.5 shadow-sm mb-2">
                                <img src="${foodImage}" class="w-full h-full object-contain" alt="${foodName}">
                            </div>
                            <div class="text-sm font-extrabold text-indigo-950">${foodName}</div>
                            <p class="text-[10px] text-gray-400 mt-0.5">คุณมีไอเทมนี้ทั้งหมด: <span class="text-indigo-600 font-bold">${curFood} ชิ้น</span></p>
                        </div>
                        
                        <!-- Volume Bar / Slider เลือกจำนวน -->
                        <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl mb-2">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-bold text-gray-600">จำนวนที่จะให้:</span>
                                <span id="swal-feed-qty" class="text-xl font-extrabold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-xl border border-indigo-100">1</span>
                            </div>
                            <input type="range" id="swal-feed-slider" min="1" max="${maxFeedQty}" value="1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                            <div class="flex justify-between text-[10px] text-gray-400 mt-1 px-1">
                                <span>1 ชิ้น</span>
                                <span>ให้ได้สูงสุด ${maxFeedQty} ชิ้น</span>
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                confirmButtonText: 'ป้อนเลย เมี๊ยว!',
                cancelButtonText: 'ยกเลิก',
                confirmButtonColor: '#27D6F5',
                customClass: { popup: 'rounded-3xl' },
                didOpen: () => {
                    const slider = document.getElementById('swal-feed-slider');
                    const qtyDisplay = document.getElementById('swal-feed-qty');

                    slider.addEventListener('input', (e) => {
                        feedQty = parseInt(e.target.value) || 1;
                        qtyDisplay.textContent = feedQty.toLocaleString();
                    });
                }
            });

            if (!res.isConfirmed) return; // ผู้เล่นกดยกเลิก

            Loader.show();
            try {
                // 4. ลูปคำนวณสถานะทีละชิ้นตามจำนวนที่เลือกป้อนจริง
                for (let i = 0; i < feedQty; i++) {
                    if (curHunger >= 100 && curHappy >= 100) {
                        overfeedCount += 1;
                    } else {
                        overfeedCount = 0;
                    }

                    curHunger = Math.min(100, curHunger + hPlus);
                    curHappy = Math.min(100, curHappy + hpPlus);
                    
                    if (Math.random() > 0.8) {
                        curLevel = Math.min(120, curLevel + 1);
                    }
                }

                // 5. บันทึกผลลัพธ์ลง Firebase ครั้งเดียว
                let updates = {};
                updates[`users/${u.uid}/catData/inventory/${foodId}`] = curFood - feedQty;
                updates[`users/${u.uid}/catData/hunger`] = curHunger;
                updates[`users/${u.uid}/catData/happiness`] = curHappy;
                updates[`users/${u.uid}/catData/level`] = curLevel;
                updates[`users/${u.uid}/catData/overfeedCount`] = overfeedCount;

                await update(ref(db), updates);
                
                // อัปเดต Local State
                appState.user.catData.inventory[foodId] = curFood - feedQty;
                appState.user.catData.hunger = curHunger;
                appState.user.catData.happiness = curHappy;
                appState.user.catData.level = curLevel;
                appState.user.catData.overfeedCount = overfeedCount;

                Loader.hide();
                
                // แสดงข้อความตามสถานะการกิน
                if (curHunger >= 100 && curHappy >= 100 && overfeedCount >= 5) {
                    Swal.fire({
                        icon: 'info',
                        title: 'อิ่มแล้ว เมี๊ยว!',
                        text: 'น้องแมวอิ่มจนพุงกางทานเพิ่มไม่ไหวแล้วน้า~',
                        confirmButtonColor: '#27D6F5',
                        customClass: { popup: 'rounded-3xl' }
                    });
                } else if (overfeedCount > 0) {
                    Toast.fire({ icon: 'success', title: `ง่ำๆ.. อิ่มจังง้าวว~ (ป้อนไป ${feedQty} ชิ้น)` });
                } else {
                    Toast.fire({ icon: 'success', title: `อร่อยจังง้าวว~ (ป้อนไป ${feedQty} ชิ้น)` });
                }
                
                this.renderCatProfile();
            } catch(e) {

            async buyCatShopItem(key) {
                const u = appState.user; 
                const item = window.renderStore.catShop[key];
                if (!item || !u) return;

                // เช็คว่าเป็นไอเทม Limited หรือไม่
                if (item.isLimited && item.type !== 'food') {
                    return Swal.fire({ icon: 'warning', title: 'ยังไม่เปิดขาย', text: 'ไอเทมชิ้นนี้เป็นไอเทม Limited ยังไม่เปิดให้แลกในขณะนี้', customClass:{popup:'rounded-3xl'} });
                }

                // --- คำนวณราคาต่อชิ้นตามเงื่อนไขส่วนลดเดิม ---
                let originalUnitPrice = item.price || 0; // 🛠️ แก้จาก const เป็น let
                let finalUnitPrice = originalUnitPrice;

                const equipped = u.equippedSpecialItems || {};
                const hasFrameDiscount = equipped.slot1 === 'item_6' || equipped.slot2 === 'item_6';
                const hasFoodDiscount = equipped.slot1 === 'item_7' || equipped.slot2 === 'item_7';

                if (item.type === 'cat_frame' && hasFrameDiscount) {
                    finalUnitPrice = Math.floor(originalUnitPrice * 0.75); // ลดราคา 25%
                } else if (item.type === 'food' && hasFoodDiscount) {
                    finalUnitPrice = Math.floor(originalUnitPrice * 0.75); // ลดราคา 25%
                }

                // 🛠️ เพิ่มโค้ดส่วนนี้: ตรวจสอบสถานะการแบนของผู้ใช้เพื่ออัปราคาอาหารแมวก่อนทำการหักเงินจริง
                const isBanned = u.banInfo && u.banInfo.isBanned; 
                if (isBanned && item.type === 'food') {
                    if (originalUnitPrice < 10000) originalUnitPrice += 10000;
                    if (finalUnitPrice < 10000) finalUnitPrice += 10000;
                }

                const sc = (u.items && u.items.sc) || 0;
                let purchaseQty = 1; // จำนวนเริ่มต้นในการซื้อ

                // --- 🌟 เริ่มต้นส่วนของ Modal เลือกจำนวนสำหรับอาหารแมว 🌟 ---
                if (item.type === 'food') {
                    // หาจำนวนสูงสุดที่เงิน SC ของผู้เล่นจะพอซื้อได้ (แต่ไม่เกิน 99 ชิ้น)
                    const maxAffordable = Math.min(99, Math.floor(sc / finalUnitPrice));
                    
                    if (maxAffordable <= 0) {
                        return Swal.fire({ icon: 'error', title: 'SC ไม่พอ', text: `คุณมี SC ไม่เพียงพอสำหรับซื้ออาหารชิ้นนี้ (ราคาชิ้นละ ${finalUnitPrice.toLocaleString()} SC)`, customClass:{popup:'rounded-3xl'} });
                    }

                    const res = await Swal.fire({
                        title: `ซื้ออาหารแมว: ${item.name}`,
                        html: `
                            <div class="p-1">
                                <p class="text-xs text-gray-500 mb-4">ราคาชิ้นละ: <span class="text-indigo-600 font-bold">${finalUnitPrice.toLocaleString()} SC</span></p>
                                
                                <div class="bg-gray-50 border border-gray-100 p-4 rounded-2xl mb-4">
                                    <div class="flex justify-between items-center mb-2">
                                        <span class="text-xs font-bold text-gray-600">เลือกจำนวน:</span>
                                        <span id="swal-qty-display" class="text-xl font-extrabold text-indigo-600 bg-indigo-50 px-3 py-1 rounded-xl border border-indigo-100">1</span>
                                    </div>
                                    <input type="range" id="swal-qty-slider" min="1" max="${maxAffordable}" value="1" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                                    <div class="flex justify-between text-[10px] text-gray-400 mt-1 px-1">
                                        <span>1 ใบ</span>
                                        <span>สูงสุด ${maxAffordable} ใบ</span>
                                    </div>
                                </div>

                                <div class="flex justify-between items-center bg-orange-50 border border-orange-100 p-3.5 rounded-2xl text-left">
                                    <div>
                                        <div class="text-[10px] font-bold text-orange-700">ยอดที่ต้องจ่ายทั้งหมด</div>
                                        <div class="text-xs text-gray-400">ยอดคงเหลือ: ${(sc).toLocaleString()} SC</div>
                                    </div>
                                    <div class="text-right">
                                        <span id="swal-total-price" class="text-lg font-extrabold text-orange-600">${finalUnitPrice.toLocaleString()}</span> 
                                        <span class="text-xs font-bold text-orange-600">SC</span>
                                    </div>
                                </div>
                            </div>
                        `,
                        showCancelButton: true,
                        confirmButtonText: 'ยืนยันการซื้อ',
                        cancelButtonText: 'ยกเลิก',
                        confirmButtonColor: '#27D6F5',
                        customClass: { popup: 'rounded-3xl' },
                        didOpen: () => {
                            const slider = document.getElementById('swal-qty-slider');
                            const qtyDisplay = document.getElementById('swal-qty-display');
                            const totalDisplay = document.getElementById('swal-total-price');

                            // ตรวจจับเหตุการณ์เลื่อนเพื่อคำนวณราคาแบบ Real-time
                            slider.addEventListener('input', (e) => {
                                const currentVal = parseInt(e.target.value) || 1;
                                purchaseQty = currentVal;
                                
                                // อัปเดตตัวเลขจำนวนตัวอย่าง
                                qtyDisplay.textContent = currentVal.toLocaleString();
                                
                                // อัปเดตยอดราคารวม
                                const calculatedTotal = currentVal * finalUnitPrice;
                                totalDisplay.textContent = calculatedTotal.toLocaleString();
                            });
                        }
                    });

                    if (!res.isConfirmed) return; // กดยกเลิก
                } else {
                    // สำหรับไอเทมประเภทอื่น (แมว, พื้นหลัง, กรอบ) ซื้อทีละ 1 ชิ้นตามปกติ
                    if (sc < finalUnitPrice) return Swal.fire({ icon: 'error', title: 'SC ไม่พอ', text: 'คุณต้องแลก S-Card เพิ่ม', customClass:{popup:'rounded-3xl'} });
                    
                    const res = await Swal.fire({ 
                        title: `ซื้อ ${item.name}?`, 
                        text: `ใช้ ${finalUnitPrice.toLocaleString()} SC ${finalUnitPrice !== originalUnitPrice ? `(ลดราคาจาก ${originalUnitPrice.toLocaleString()} SC)` : ''}`, 
                        showCancelButton: true, 
                        confirmButtonText: 'ซื้อเลย', 
                        cancelButtonText: 'ยกเลิก', 
                        customClass: { popup: 'rounded-3xl' }, 
                        confirmButtonColor: '#27D6F5' 
                    });
                    
                    if (!res.isConfirmed) return;
                }
                // --- 🌟 สิ้นสุดส่วนตัดตัวเลือกจำนวน 🌟 ---

                // คำนวณราคารวมสรุปสุดท้ายจริงๆ ที่ต้องใช้หักออก
                const totalCost = finalUnitPrice * purchaseQty;

                Loader.show();
                try {
                    let updates = {}; 
                    updates[`users/${u.uid}/items/sc`] = sc - totalCost;
                    
                    if (item.type === 'food') {
                        const cur = u.catData.inventory[key] || 0;
                        updates[`users/${u.uid}/catData/inventory/${key}`] = cur + purchaseQty;
                        appState.user.catData.inventory[key] = cur + purchaseQty;
                    } else if (item.type === 'cat' || item.type === 'bg') {

                        updates[`users/${u.uid}/catData/unlocked/${item.driveId}`] = true;
                        appState.user.catData.unlocked = { ...curUnlocked, [item.driveId]: true };
                    } else if (item.type === 'cat_frame') {

                        updates[`users/${u.uid}/unlocked_frames/${item.driveId}`] = true;
                        appState.user.unlocked_frames = { ...curFrames, [item.driveId]: true };
                    }
                    
                    await update(ref(db), updates); 
                    appState.user.items.sc = sc - totalCost;
                    
                    const scEl = document.getElementById('cat-sc-balance');
                    if (scEl) {
                        scEl.textContent = appState.user.items.sc.toLocaleString();
                    }
                    
                    Loader.hide(); 
                    Toast.fire({icon:'success', title: item.type === 'food' ? `ซื้อสำเร็จจำนวน ${purchaseQty} ชิ้น!` : 'ซื้อไอเทมสำเร็จ'});

                        this.renderCatProfile();

                    Loader.hide(); 
                    console.error(e);
                    Toast.fire({icon:'error', title:'เกิดข้อผิดพลาดในระบบ'}); 
                }
            },

            async processCatExchange(type) {
                const u = appState.user;

                // กัน undefined
                if (!u.items) u.items = {};
                if (!u.catData.inventory) u.catData.inventory = {};

                const inv = u.catData.inventory;

                let cost = 0, gain = 0, targetType = '';

                if (type === 'cc') {
                    cost = 1000;
                    gain = 10;
                    targetType = 'cs';
                }

                if (type === 'cd') {
                    cost = 1000;
                    gain = 10;
                    targetType = 'ct';
                }

                if (type === 'ce') {
                    cost = 500;
                    gain = 1;
                    targetType = 'ticket';
                }

                // ใช้ Swal.fire แทน
                if ((inv[type] || 0) < cost) {
                    return Swal.fire({
                        icon: 'error',
                        title: 'แร่ไม่พอ',
                        text: `ต้องการอย่างน้อย ${cost}`,
                        customClass: { popup: 'rounded-3xl' }
                    });
                }

                Loader.show();

                try {
                    const newMineral = (inv[type] || 0) - cost;
                    const curTarget = u.items[targetType] || 0;
                    const newTarget = curTarget + gain;

                    let updates = {};

                    updates[`users/${u.uid}/catData/inventory/${type}`] = newMineral;
                    updates[`users/${u.uid}/items/${targetType}`] = newTarget;

                    await update(ref(db), updates);

                    // sync state
                    appState.user.catData.inventory[type] = newMineral;
                    appState.user.items[targetType] = newTarget;

                    Loader.hide();

                    Swal.fire({
                        icon: 'success',
                        title: 'แลกเปลี่ยนสำเร็จ',
                        timer: 1500,
                        showConfirmButton: false,
                        customClass: { popup: 'rounded-3xl' }
                    });

                    // update UI
                    const ccEl = document.getElementById('cat-cc-balance');
                    const cdEl = document.getElementById('cat-cd-balance');
                    const ceEl = document.getElementById('cat-ce-balance');

                    if (ccEl) ccEl.innerText = appState.user.catData.inventory.cc.toLocaleString();
                    if (cdEl) cdEl.innerText = appState.user.catData.inventory.cd.toLocaleString();
                    if (ceEl) ceEl.innerText = appState.user.catData.inventory.ce.toLocaleString();

                    const invEl = document.getElementById(`cr-inv-${type}`);
                    if (invEl) {
                        invEl.innerText = appState.user.catData.inventory[type].toLocaleString();
                    }

                } catch (e) {
                    console.error(e);

                    Loader.hide();

                    Swal.fire({
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: e.message || 'ไม่สามารถแลกเปลี่ยนได้'
                    });
                }
            },

            async checkMailBadge() {
                const uid = appState.user?.uid;
                if (!uid) return;
                const snap = await get(ref(db, `mailbox/${uid}`));
                const badge = document.getElementById('mail-badge');
                if (badge) {
                    if (snap.exists()) {
                        const count = Object.keys(snap.val()).length;
                        badge.innerText = count;
                        badge.classList.remove('hidden');
                        badge.classList.add('flex'); // ใส่ flex กลับเข้ามาเมื่อมีจดหมาย
                    } else {
                        badge.classList.add('hidden');
                        badge.classList.remove('flex');
                    }
                }
            },
            async checkTaskBadge() {
                const u = appState.user;
                if (!u || u.role !== 'student') return;
                
                const badge = document.getElementById('nav-task-badge');
                if (!badge) return;

                const classId = `${u.class}-${u.room}`.replace(/\./g, '_');
                
                try {
                    const assignsRef = ref(db, `assignments/${classId}`);
                    const assignSnap = await get(assignsRef);
                    if (!assignSnap.exists()) {
                        badge.classList.add('hidden');
                        return;
                    }
                    
                    const subRef = ref(db, 'submissions');
                    const subSnap = await get(subRef);
                    const allSubs = subSnap.exists() ? subSnap.val() : {};
                    
                    let hasUnclaimedGift = false;
                    for (const aId of Object.keys(assignSnap.val())) {
                        const mySub = allSubs[aId]?.[u.uid];
                        if (mySub && mySub.attachment && mySub.attachment.claimed === false) {
                            hasUnclaimedGift = true;
                            break;
                        }
                    }
                    
                    if (hasUnclaimedGift) {
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                } catch(e) {
                    console.error("Task badge check error", e);
                }
            },

            async claimMail(mailId, category, driveId) {
                Loader.show();
                const uid = appState.user.uid;
                try {
                    let updates = {};
                    
                    // รับของเข้าตัว
                    if (category === 'frame' || category === 'cat_frame') {
                        updates[`users/${uid}/unlocked_frames/${driveId}`] = true;
                        if(!appState.user.unlocked_frames) appState.user.unlocked_frames = {};
                        appState.user.unlocked_frames[driveId] = true;
                    } else if (category === 'cat' || category === 'bg') {
                        updates[`users/${uid}/catData/unlocked/${driveId}`] = true;
                        if(appState.user.catData) {
                            if(!appState.user.catData.unlocked) appState.user.catData.unlocked = {};
                            appState.user.catData.unlocked[driveId] = true;
                        }
                    } else if (category === 'food') {
                        const mailSnap = await get(ref(db, `mailbox/${uid}/${mailId}`));
                        const amount = mailSnap.exists() ? mailSnap.val().amount : 1;
                        
                        // 1. ค้นหา Shop Key (เช่น food_1) จาก Drive ID 
                        let foodKey = driveId; 
                        if (!window.renderStore.catShop || Object.keys(window.renderStore.catShop).length === 0) {
                            const snap = await get(ref(db, 'cat_shop'));
                            window.renderStore.catShop = snap.exists() ? snap.val() : {};
                        }
                        for (const k in window.renderStore.catShop) {
                            if (window.renderStore.catShop[k].driveId === driveId) {
                                foodKey = k; 
                                break;
                            }
                        }

                        // 2. บันทึกข้อมูลด้วย foodKey แทน driveId
                        const cur = appState.user.catData?.inventory?.[foodKey] || 0;
                        updates[`users/${uid}/catData/inventory/${foodKey}`] = cur + amount;
                        
                        if(!appState.user.catData) appState.user.catData = {};
                        if(!appState.user.catData.inventory) appState.user.catData.inventory = {};
                        appState.user.catData.inventory[foodKey] = cur + amount;
                    }

                    // ลบจดหมายทิ้ง
                    updates[`mailbox/${uid}/${mailId}`] = null;
                    
                    await update(ref(db), updates);
                    Loader.hide();
                    Toast.fire({ icon: 'success', title: 'รับไอเทมสำเร็จ!' });
                    
                    // รีเฟรชหน้าจดหมายและ Badge
                    this.checkMailBadge();
                    this.showMailbox(); 
                    
                } catch(e) {
                    Loader.hide();
                    Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการรับของ' });
                }
            },

                const amountInput = document.getElementById('rw-amount');
                if (!val || !amountInput) return;
                
                // โครงสร้าง value ที่เราตั้งไว้คือ "type|category|driveId|name"
                // เราเลยจะแยกข้อความด้วย '|' เพื่อเช็คแค่ตำแหน่งของ category (ตำแหน่งที่ 1)
                const parts = val.split('|');
                const category = parts[1];

                if (category === 'frame' || category === 'cat_frame' || category === 'cat' || category === 'bg') {
                    amountInput.style.display = 'none';
                    amountInput.value = 1; // ล็อคจำนวนไว้ที่ 1
                } else {
                    amountInput.style.display = 'block';
                }

            async addGachaItem(bId) {
                // 1. ดึงข้อมูลไอเท็มทั้งหมดที่มีอยู่ในร้านค้าทุกร้านจาก Firebase
                Loader.show();
                const shopSnap = await get(ref(db, 'shop_items'));
                Loader.hide();
                
                if (!shopSnap.exists()) {
                    Toast.fire({ icon: 'error', title: 'ไม่พบข้อมูลไอเท็มในระบบร้านค้า' });
                    return;
                }
                
                const shopItems = shopSnap.val();
                
                // 2. สร้างรายการตัวเลือก (Dropdown Options) โดยเก็บข้อมูลประเภทและราคาไว้ในแท็ก html
                let optionsHtml = '<option value="">-- เลือกไอเท็มจากร้านค้า --</option>';
                for (const id in shopItems) {
                    const item = shopItems[id];
                    // แอบเก็บ data-type และ data-price ไว้เพื่อให้ javascript ดึงไปเช็คเงื่อนไขได้ง่ายๆ
                    optionsHtml += `
                        <option value="${id}" data-type="${item.type || ''}" data-price="${item.price || 0}">
                            [${item.type || 'ทั่วไป'}] ${item.name} - ${item.price === 0 ? 'ของฟรี' : item.price + ' คอยน์'}
                        </option>`;
                }

                // 3. แสดงหน้าต่างจัดการ
                const { value: formValues } = await Swal.fire({
                    title: 'เพิ่มไอเท็มเข้าตู้สุ่ม',
                    html: `
                        <div class="space-y-4 text-left text-sm font-sans">
                            <div>
                                <label class="font-bold text-gray-500">เลือกไอเท็ม</label>
                                <select id="gacha-item-select" class="w-full p-2 border rounded-lg mt-1">
                                    ${optionsHtml}
                                </select>
                            </div>
                            
                            <div id="gacha-amount-container">
                                <label class="font-bold text-gray-500">จำนวนที่ได้รับเมื่อสุ่มได้</label>
                                <input type="number" id="gacha-item-amount" class="w-full p-2 border rounded-lg mt-1" value="1" min="1">
                            </div>
                            
                            <div id="gacha-error-msg" class="text-red-500 text-xs hidden font-bold bg-red-50 p-2.5 rounded-lg border border-red-200"></div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'เพิ่มเข้าตู้',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' },
                    didOpen: () => {
                        // จับคู่ตัวแปร HTML Elements ข้างใน Swal
                        const itemSelect = document.getElementById('gacha-item-select');
                        const amountContainer = document.getElementById('gacha-amount-container');
                        const amountInput = document.getElementById('gacha-item-amount');
                        const errorMsg = document.getElementById('gacha-error-msg');
                        const confirmButton = Swal.getConfirmButton();

                        // ตรวจสอบทันทีเมื่อผู้ใช้งานกดเปลี่ยนการเลือกไอเท็ม (Change Event)
                        itemSelect.addEventListener('change', () => {
                            const selectedOption = itemSelect.options[itemSelect.selectedIndex];
                            
                            // หากยังไม่ได้เลือกไอเท็มใดๆ ให้รีเซ็ตหน้าต่างกลับเป็นสถานะปกติก่อน
                            if (!selectedOption || !selectedOption.value) {
                                amountContainer.classList.remove('hidden');
                                errorMsg.classList.add('hidden');
                                confirmButton.removeAttribute('disabled');
                                return;
                            }

                            // ดึงข้อมูลประเภท (type) และราคา (price) ของไอเท็มที่เลือกชิ้นนั้นขึ้นมา
                            const type = selectedOption.getAttribute('data-type'); 
                            const price = parseFloat(selectedOption.getAttribute('data-price')) || 0;

                            // รีเซ็ตค่ามาตรฐานก่อนเข้าเงื่อนไขตรวจสอบ
                            errorMsg.classList.add('hidden');
                            confirmButton.removeAttribute('disabled');
                            amountContainer.classList.remove('hidden');
                            amountInput.value = "1"; 

                            // 🔥 เงื่อนไขที่ 1: หากเลือกเป็น "กรอบโปรไฟล์"
                            if (type === 'frame' || type === 'กรอบโปรไฟล์') {
                                // ข้อห้าม: ถ้าเป็นของฟรี (ราคาเป็น 0) ห้ามเอาเข้าตู้เด็ดขาด
                                if (price === 0) {
                                    errorMsg.textContent = '❌ ไม่สามารถเลือกกรอบโปรไฟล์ที่เป็น "ของฟรี" มาเข้าตู้ได้ครับ!';
                                    errorMsg.classList.remove('hidden');
                                    confirmButton.setAttribute('disabled', 'true'); // ล็อกปุ่มตกลง
                                    amountContainer.classList.add('hidden');
                                    return;
                                }
                                // ข้อห้าม: หากไม่ใช่ของฟรี ให้นำเข้าได้แต่ "ไม่สามารถระบุจำนวนได้"
                                amountContainer.classList.add('hidden'); // ซ่อนกล่องกรอกจำนวน (ล็อกค่าภายในเป็น 1)
                            }
                            
                            // 🔥 เงื่อนไขที่ 2: หากเลือกเป็น "แมว" หรือ "ภาพพื้นหลัง"
                            else if (type === 'cat' || type === 'แมว' || type === 'bg' || type === 'ภาพพื้นหลัง' || type === 'background') {
                                // ข้อห้าม: ไม่สามารถระบุจำนวนได้
                                amountContainer.classList.add('hidden'); // ซ่อนกล่องกรอกจำนวน (ล็อกค่าภายในเป็น 1)
                            }
                            
                            // 🔥 เงื่อนไขที่ 3: ไอเท็มประเภทอื่นๆ ทั่วไป
                            else {
                                amountContainer.classList.remove('hidden'); // เปิดให้แสดงกล่องกรอกและแก้ไขตัวเลขได้อิสระ
                            }
                        });
                    },
                    preConfirm: () => {
                        const itemId = document.getElementById('gacha-item-select').value;
                        const amountContainer = document.getElementById('gacha-amount-container');
                        let amount = 1;

                        if (!itemId) {
                            Swal.showValidationMessage('กรุณาเลือกไอเท็มที่ต้องการก่อนครับ');
                            return false;
                        }

                        // ถ้ากล่องระบุจำนวนถูกแสดงอยู่ (แปลว่าเป็นไอเท็มประเภทอื่น) ค่อยดึงค่าตัวเลขมาใช้งาน
                        if (!amountContainer.classList.contains('hidden')) {
                            amount = parseInt(document.getElementById('gacha-item-amount').value) || 1;
                            if (amount < 1) {
                                Swal.showValidationMessage('จำนวนไอเท็มต้องระบุอย่างน้อย 1 ชิ้นขึ้นไป');
                                return false;
                            }
                        }

                        return { itemId, amount };
                    }
                });

                // 4. บันทึกข้อมูลลงฐานข้อมูล Firebase Gacha Banner
                if (formValues) {
                    Loader.show();
                    try {
                        const itemData = shopItems[formValues.itemId];
                        const newGachaItem = {
                            itemId: formValues.itemId,
                            name: itemData.name,
                            image: itemData.image || '',
                            type: itemData.type || 'item',
                            amount: formValues.amount, // จะเป็น 1 สำหรับกลุ่มที่ซ่อน หรือเป็นจำนวนที่กรอกมาสำหรับกลุ่มทั่วไป
                            rate: 1 // ค่าตั้งต้นของเรทสุ่มในตู้
                        };

                        // อัปเดตเพิ่มเข้าไปในกิ่ง items ของตู้นั้นๆ
                        await push(ref(db, `gacha_banners/${bId}/items`), newGachaItem);
                        Loader.hide();
                        Toast.fire({ icon: 'success', title: 'เพิ่มไอเท็มเข้าตู้สำเร็จ' });
                        
                        // สั่งอัปเดต Render ตารางหน้าจอไอเท็มใหม่ทันที
                        if (typeof this.manageGachaItems === 'function') {
                            this.manageGachaItems(bId);
                        } else {
                            this.renderGacha();
                        }
                    } catch (e) {
                        Loader.hide();
                        console.error(e);
                        Toast.fire({ icon: 'error', title: 'ไม่สามารถเพิ่มไอเท็มได้ เกิดข้อผิดพลาดในระบบ' });
                    }
                }
            },

            async removeGachaItem(bId, itemId) {
                Loader.show(); await remove(ref(db, `gacha_banners/${bId}/items/${itemId}`)); Loader.hide();
                Swal.close(); this.manageGachaBannerItems(bId);
            },

            // --- ระบบสุ่ม และแสดงเรทสำหรับนักเรียน ---

           showGachaDetails(bId) {
                get(ref(db, `gacha_banners/${bId}/items`)).then(snap => {
                    if(!snap.exists()) return Toast.fire({icon:'error', title:'ตู้ยังว่างเปล่า'});
                    const items = Object.values(snap.val());
                    const u = appState.user;
                    const catLevel = u?.catData?.level || 1;
                    
                    // 🌟 ดึงข้อมูลการ์ดแบนเกลือ
                    const equippedItems = Object.values(u.equippedSpecialItems || {});
                    const excludeA = equippedItems.includes('item_4');
                    const excludeAPlus = equippedItems.includes('item_5');

                    // 🌟 คำนวณน้ำหนักรวมเฉพาะไอเทมที่ "ไม่ถูกแบน" เท่านั้น
                    let baseTotalWeight = 0;
                    let adjustedTotalWeight = 0;

                    items.forEach(item => {
                        const isExcluded = (excludeA && item.rarity === 'A') || (excludeAPlus && item.rarity === 'A+');
                        if (!isExcluded) {
                            baseTotalWeight += (RARITY_WEIGHTS[item.rarity] || 0);
                            adjustedTotalWeight += getAdjustedRarityWeight(item.rarity, catLevel);
                        }
                    });
                    
                    let html = '<div class="max-h-[60vh] overflow-y-auto space-y-2 text-left font-sans mt-2">';
                    
                    items.sort((a,b) => (RARITY_WEIGHTS[a.rarity]||0) - (RARITY_WEIGHTS[b.rarity]||0)).forEach(it => {
                        const isExcluded = (excludeA && it.rarity === 'A') || (excludeAPlus && it.rarity === 'A+');

                        // --- ปรับปรุงการจัดการ URL ให้รองรับทั้ง Drive และ URL ปกติ ---
                        let rawUrl = it.driveId || it.image || it.img || '';
                        let finalImg = rawUrl;

                        if (rawUrl.includes('drive.google.com') || rawUrl.length > 20 && !rawUrl.startsWith('http')) {
                            const driveId = rawUrl.includes('id=') ? rawUrl.split('id=')[1].split('&')[0] : rawUrl;
                            finalImg = `https://drive.google.com/thumbnail?id=${driveId}&sz=s800`;
                        } else if (!rawUrl.startsWith('http')) {
                            finalImg = ITEM_IMAGES[rawUrl] || CAT_ASSETS[rawUrl] || ITEM_IMAGES.sc;
                        }

                        let chanceHtml = '';
                        let rowStyle = 'bg-gray-50 border border-gray-200';
                        let imgStyle = '';

                        // 🌟 แสดงผลกรณีที่ไอเทมถูกยกเลิก (แบน)
                        if (isExcluded) {
                            chanceHtml = `<div class="font-extrabold text-sm text-red-500 line-through">0%</div><div class="text-[9px] text-red-400">ถูกยกเลิก</div>`;
                            rowStyle = 'bg-gray-100 border border-gray-200 opacity-60 grayscale';
                            imgStyle = 'grayscale opacity-50';
                        } else {
                            const baseWeight = RARITY_WEIGHTS[it.rarity] || 0;
                            const adjustedWeight = getAdjustedRarityWeight(it.rarity, catLevel);
                            const baseChance = baseTotalWeight > 0 ? ((baseWeight / baseTotalWeight) * 100).toFixed(2) : 0;
                            const newChance = adjustedTotalWeight > 0 ? ((adjustedWeight / adjustedTotalWeight) * 100).toFixed(2) : 0;
                            
                            chanceHtml = parseFloat(newChance) > parseFloat(baseChance) ? 
                                `<div class="text-[13px] text-gray-400 line-through leading-none mb-0.5">${baseChance}%</div><div class="font-extrabold text-sm text-green-500 leading-none">${newChance}% <i class="fa-solid fa-arrow-up text-[10px]"></i></div>` :
                                (parseFloat(newChance) < parseFloat(baseChance) ? 
                                `<div class="text-[13px] text-gray-400 line-through leading-none mb-0.5">${baseChance}%</div><div class="font-extrabold text-sm text-gray-500 leading-none">${newChance}% <i class="fa-solid fa-arrow-down text-[10px]"></i></div>` :
                                `<div class="font-extrabold text-sm text-indigo-600">${baseChance}%</div>`);
                        }
                        
                        html += `
                            <div class="flex items-center gap-3 p-2.5 rounded-xl ${rowStyle}">
                                <div class="w-12 h-12 shrink-0 rounded-lg overflow-hidden bg-gray-200 flex items-center justify-center">
                                    <img src="${finalImg}" class="w-full h-full object-contain ${imgStyle}" onerror="this.src='https://via.placeholder.com/100'">
                                </div>
                                <div class="flex-1 min-w-0">
                                    <div class="font-bold text-sm text-dark truncate ${isExcluded ? 'line-through text-gray-500' : ''}">${it.name} ${it.amount ? 'x'+it.amount : ''}</div>
                                    <div class="text-[10px] text-gray-500 font-bold mt-0.5">Rarity: <span class="text-indigo-500">${it.rarity}</span> ${it.isGuarantee ? '<span class="bg-pink-100 text-pink-500 px-1 rounded ml-1">การันตี</span>':''}</div>
                                </div>
                                <div class="text-right shrink-0">
                                    ${chanceHtml}
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    Swal.fire({
                        title: '<span class="font-bold text-lg">อัตราการได้รับ (โชคแมว)</span>', 
                        html: html, 
                        showConfirmButton: false, 
                        showCloseButton: true, 
                        customClass: { popup: 'rounded-3xl w-[95%] max-w-sm' }
                    });
                });
            },

            async triggerGachaPull(bId, isTest = false) {
                const u = appState.user;
                
                // ถ้าเป็นครูกดปุ่มสุ่มปกติ (ไม่ใช่ปุ่มทดสอบ) ให้แจ้งเตือน
                if (u.role === 'teacher' && !isTest) return Toast.fire({icon:'info', title:'โปรดใช้ปุ่ม "ทดสอบสุ่ม" ด้านล่าง'});

                Loader.show();
                const [bSnap, uCardSnap, uPitySnap] = await Promise.all([
                    get(ref(db, `gacha_banners/${bId}`)),
                    get(ref(db, `users/${u.uid}/gacha_cards/${bId}`)),
                    get(ref(db, `users/${u.uid}/gacha_pity/${bId}`))
                ]);
                Loader.hide();

                const banner = bSnap.val();
                if (!banner || !banner.items) return Toast.fire({icon:'error', title:'ตู้สุ่มไม่มีไอเทม'});

                let cards = uCardSnap.exists() ? uCardSnap.val() : 0;
                let pity = uPitySnap.exists() ? uPitySnap.val() : 0;
                
                // ถ้านักเรียนสุ่มปกติ ต้องเช็คยอดการ์ด
                if (!isTest) {
                    if (cards < 1) {
                        const tickets = u.items?.ticket || 0;
                        if (tickets < 1) return Swal.fire({icon:'warning', title:'ไม่มีการ์ดและตั๋ว', text:`คุณต้องใช้ ${banner.cardName} 1 ใบในการสุ่ม หรือตั๋ว 1 ใบเพื่อแลก`, customClass:{popup:'rounded-3xl'}});
                            
                            const cardImgUrl = banner.cardImage.includes('http') ? banner.cardImage : `https://drive.google.com/thumbnail?id=${banner.cardImage}&sz=s800`;
                            
                            const res = await Swal.fire({
                                title: `<span style="font-family: 'Kanit'; font-weight: bold; color: #1f2937;">แลกการ์ดสุ่ม?</span>`, 
                                html: `
                                    <div class="flex items-center justify-center gap-8 my-6">
                                        <div class="flex flex-col items-center">
                                            <img src="${ITEM_IMAGES.ticket}" class="w-16 h-16 object-contain hover:scale-110 transition-transform">
                                            <span class="text-sm font-bold text-gray-600 mt-3">1 Ticket</span>
                                        </div>
                                        
                                        <div class="flex items-center justify-center text-primary mb-7">
                                            <i class="fa-solid fa-arrow-right text-3xl animate-pulse"></i>
                                        </div>
                                        
                                        <div class="flex flex-col items-center">
                                            <img src="${cardImgUrl}" class="w-16 h-16 object-contain hover:scale-110 transition-transform">
                                            <span class="text-sm font-bold text-indigo-600 mt-3">x${banner.ticketRate} ${banner.cardName}</span>
                                        </div>
                                    </div>
                                    <p class="text-xs text-gray-400 font-medium">*1 Ticket เพื่อแลกรับไอเท็มนี้</p>
                                `,
                                showCancelButton: true, 
                                confirmButtonText: 'แลกเปลี่ยน', 
                                cancelButtonText: 'ยกเลิก', 
                                customClass: { popup: 'rounded-[2rem]', confirmButton: 'rounded-xl font-bold py-2.5 px-6', cancelButton: 'rounded-xl font-bold py-2.5 px-6' }, 
                                confirmButtonColor: '#27D6F5'
                        });
                        
                        if (res.isConfirmed) {
                            Loader.show();
                            cards += banner.ticketRate;
                            await update(ref(db, `users/${u.uid}`), {
                                'items/ticket': tickets - 1,
                                [`gacha_cards/${bId}`]: cards
                            });
                            appState.user.items.ticket = tickets - 1;
                            appState.user.gacha_cards = appState.user.gacha_cards || {};
                            appState.user.gacha_cards[bId] = cards;
                            document.getElementById('gacha-main-ticket').innerText = (tickets - 1).toLocaleString();
                            Loader.hide();
                            // รีเฟรชยอดการ์ดใน UI ทันที
                            document.getElementById('gacha-view-card-count').innerText = cards;
                            return; 
                        } else {
                            return;
                        }
                    }
                }

                // 🌟 ดึงข้อมูลไอเทมที่สวมใส่อยู่เพื่อเช็คการ์ดแบนเรทเกลือ
                const equippedItems = Object.values(u.equippedSpecialItems || {});
                const excludeA = equippedItems.includes('item_4');
                const excludeAPlus = equippedItems.includes('item_5');

                let itemsList = Object.values(banner.items);
                
                // 🌟 กรองไอเทมตามเอฟเฟกต์ของการ์ด
                let activeItemsList = itemsList.filter(item => {
                    if (excludeA && item.rarity === 'A') return false;
                    if (excludeAPlus && item.rarity === 'A+') return false;
                    return true;
                });

                // ป้องกันกรณีที่ตู้มีแต่เกลือ แล้วโดนแบนหมดจน array ว่างเปล่า
                if (activeItemsList.length === 0) {
                    activeItemsList = itemsList; 
                }

                // เริ่มโลจิกสุ่ม
                let selectedItem = null;
                
                // Pity Check
                if (!isTest && pity + 1 >= banner.pity) {
                    const guaranteeItems = activeItemsList.filter(i => i.isGuarantee);
                    if(guaranteeItems.length > 0) {
                        selectedItem = guaranteeItems[Math.floor(Math.random() * guaranteeItems.length)];
                    }
                }

                // สุ่มปกติตาม Rarity Weight โดยใช้ list ที่ถูกกรองแล้ว (activeItemsList)
                if (!selectedItem) {
                    const catLevel = u.catData?.level || 1;
                    const totalWeight = activeItemsList.reduce((sum, i) => sum + getAdjustedRarityWeight(i.rarity, catLevel), 0);
                    let rand = Math.random() * totalWeight;
                    let sum = 0;
                    for (let i of activeItemsList) {
                        sum += getAdjustedRarityWeight(i.rarity, catLevel);
                        if (rand <= sum) { selectedItem = i; break; }
                    }
                }

                if (!selectedItem) selectedItem = activeItemsList[0]; 

                // ตัดยอดการ์ด และอัปเดต Pity (เฉพาะการสุ่มปกติ)
                if (!isTest) {
                    let newPity = selectedItem.isGuarantee ? 0 : pity + 1;
                    let updates = {
                        [`gacha_cards/${bId}`]: cards - 1,
                        [`gacha_pity/${bId}`]: newPity
                    };
                    await update(ref(db, `users/${u.uid}`), updates);
                    
                    // ** ต้องอัปเดตสถานะในแอพด้วย (สำคัญมากเพื่อให้รอบต่อไปคำนวณถูก) **
                    appState.user.gacha_cards[bId] = cards - 1;
                    appState.user.gacha_pity = appState.user.gacha_pity || {};
                    appState.user.gacha_pity[bId] = newPity;
                    
                    document.getElementById('gacha-view-card-count').innerText = cards - 1;
                } else {
                    Toast.fire({icon: 'info', title: 'โหมดทดสอบ', text: 'ผลการสุ่มจะไม่ถูกบันทึกลงคลังและไม่นับสถิติ'});
                }

                // เล่น Animation และแสดงผล
                window.app._pendingGachaReward = selectedItem;
                this.playGachaAnimation(selectedItem);
            },

            async closeGachaAnim() {
                const u = appState.user;
                const item = window.app._pendingGachaReward;

                // มอบของรางวัลให้ผู้เล่น
                if (item && u.role === 'student') {
                    Loader.show();
                    let updates = {};
                    
                    // ป้องกันบั๊ก Object ว่างเปล่า
                    if (!appState.user.unlocked_frames) appState.user.unlocked_frames = {};
                    if (!appState.user.catData) appState.user.catData = {};
                    if (!appState.user.catData.unlocked) appState.user.catData.unlocked = {};
                    if (!appState.user.catData.inventory) appState.user.catData.inventory = {};
                    if (!appState.user.items) appState.user.items = {};

                    // บันทึกของรางวัล (ถ้าได้ของซ้ำ โค้ดจะวิ่งไปเข้าหมวด currency อัตโนมัติ เพราะเราแอบเปลี่ยน type มันไว้ในขั้นตอนที่ 1 แล้ว)
                    if (['frame', 'cat_frame'].includes(item.type)) {
                        updates[`users/${u.uid}/unlocked_frames/${item.driveId}`] = true;
                        appState.user.unlocked_frames[item.driveId] = true; 
                        
                    } else if (['cat', 'bg'].includes(item.type)) {
                        updates[`users/${u.uid}/catData/unlocked/${item.driveId}`] = true;
                        appState.user.catData.unlocked[item.driveId] = true; 
                        
                    } else if (item.type === 'food') {
                        let foodKey = item.driveId; 
                        
                        if (!window.renderStore.catShop || Object.keys(window.renderStore.catShop).length === 0) {
                            const snap = await get(ref(db, 'cat_shop'));
                            window.renderStore.catShop = snap.exists() ? snap.val() : {};
                        }
                        for (const k in window.renderStore.catShop) {
                            if (window.renderStore.catShop[k].driveId === item.driveId) {
                                foodKey = k; break;
                            }
                        }

                        const cur = appState.user.catData.inventory[foodKey] || 0;
                        const finalAmt = cur + (item.amount || 1);
                        updates[`users/${u.uid}/catData/inventory/${foodKey}`] = finalAmt;
                        appState.user.catData.inventory[foodKey] = finalAmt; 
                        
                    } else if (item.type === 'card') {
                        if (!appState.user.my_cards) appState.user.my_cards = {};
                        
                        // 🔥 แก้ไขตรงนี้: แปลง URL ของการ์ดให้ปลอดภัยสำหรับตั้งเป็น Key ของ Firebase
                        // btoa() จะแปลงลิ้งก์ให้เป็นตัวอักษรและตัวเลขธรรมดา และแทนที่ตัว = ด้วยคำว่า _ เพื่อความปลอดภัย
                        const safeCardKey = btoa(item.driveId).replace(/=/g, '_'); 
                        
                        const cur = appState.user.my_cards[safeCardKey] || 0;
                        const finalAmt = cur + (item.amount || 1);
                        
                        // บันทึกลงตัวแปร updates และ appState โดยใช้ safeCardKey แทน item.driveId ตัวเดิม
                        updates[`users/${u.uid}/my_cards/${safeCardKey}`] = finalAmt;
                        appState.user.my_cards[safeCardKey] = finalAmt; 
                    }
                    
                    else if (item.type === 'currency') {
                        if (['cc', 'cd', 'ce'].includes(item.driveId)) {
                            const cur = appState.user.catData.inventory[item.driveId] || 0;
                            const finalAmt = cur + (item.amount || 1);
                            updates[`users/${u.uid}/catData/inventory/${item.driveId}`] = finalAmt;
                            appState.user.catData.inventory[item.driveId] = finalAmt; 
                        } else {
                            const cur = appState.user.items[item.driveId] || 0;
                            const finalAmt = cur + (item.amount || 1);
                            updates[`users/${u.uid}/items/${item.driveId}`] = finalAmt;
                            appState.user.items[item.driveId] = finalAmt; 
                        }
                    }
                    
                    await update(ref(db), updates);
                    Loader.hide();
                }

                // Reset Animation กลับเข้าสู่โหมดหน้าตู้ปกติ
                document.getElementById('gacha-reveal-state').classList.add('hidden');
                document.getElementById('gacha-reveal-state').classList.remove('flex');
                document.getElementById('gacha-card-inner').classList.remove('revealed');
                document.getElementById('gacha-reward-item').classList.add('scale-0', 'opacity-0');
                document.getElementById('gacha-reward-name').classList.add('opacity-0');
                document.getElementById('gacha-btn-claim').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('gacha-rays').classList.add('hidden');

                const floatingItem = document.getElementById('gacha-floating-item');
                floatingItem.classList.remove('gacha-shake', 'brightness-[1.5]', 'drop-shadow-[0_0_30px_rgba(255,255,255,1)]');
                floatingItem.classList.add('animate-gacha-float');

                const btnOpen = document.getElementById('gacha-btn-open');
                btnOpen.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');

                // รีเฟรชหน้าจอ
                const bId = appState.activeGachaBanner;
                if (bId) {
                    document.getElementById('gacha-view-card-count').innerText = appState.user.gacha_cards?.[bId] || 0;
                    const banner = appState.gachaBanners[bId];
                    const pity = appState.user.gacha_pity?.[bId] || 0;
                    const maxPity = banner.pity || 50;
                    const pullsLeft = maxPity - pity;
                    const pityBox = document.getElementById('gacha-pity-counter');
                    if (pityBox) {
                        if (pullsLeft > 0) {
                            pityBox.innerHTML = `<span class="bg-red-500/90 text-white text-xs font-bold px-3.5 py-1.5 rounded-full shadow-lg backdrop-blur-md border border-red-400">⭐ การันตีในอีก ${pullsLeft} ครั้ง</span>`;
                        } else {
                            pityBox.innerHTML = `<span class="bg-green-500/90 text-white text-xs font-bold px-3.5 py-1.5 rounded-full shadow-lg backdrop-blur-md border border-green-400 animate-pulse">🌟 การันตีออกในการสุ่มครั้งนี้!</span>`;
                        }
                    }
                }
            },

            async autoDistributeCards(bId) {
                // 1. เปิดกล่องเลือกประเภทการ์ดและตั้งค่า Rarity เป้าหมาย
                const { value: formValues } = await Swal.fire({
                    title: '<span class="text-base font-extrabold text-indigo-950">ตั้งค่าสุ่มการ์ดเข้าตู้</span>',
                    html: `
                        <div class="text-left font-sans text-sm space-y-4 mt-4 px-1">
                            <div>
                                <label class="font-bold text-gray-700 mb-2 block">เลือกประเภทการ์ดที่จะนำมาสุ่ม</label>
                                <select id="auto-card-type" class="w-full p-2.5 border border-gray-200 rounded-lg focus:outline-primary bg-gray-50 font-bold">
                                    <option value="A">สุ่มเฉพาะ การ์ดระดับ A</option>
                                    <option value="S">สุ่มเฉพาะ การ์ดระดับ S</option>
                                    <option value="BOTH">สุ่มทั้งระดับ A และ S</option>
                                </select>
                            </div>
                            <div id="target-rarity-container">
                                <label class="font-bold text-gray-700 mb-2 block">ตั้งค่า Rarity ในตู้ให้การ์ดกลุ่ม A</label>
                                <select id="auto-target-rarity" class="w-full p-2.5 border border-indigo-200 rounded-lg focus:outline-primary bg-indigo-50 font-bold text-indigo-700">
                                    <option value="A">ระดับ A (ปกติ)</option>
                                    <option value="A+">ระดับ A+</option>
                                    <option value="A++">ระดับ A++</option>
                                    <option value="S">ระดับ S</option>
                                    <option value="S+">ระดับ S+</option>
                                    <option value="S++">ระดับ S++</option>
                                </select>
                                <p class="text-[10px] text-gray-500 mt-1">*การ์ดระดับ A จากระบบหลัก จะถูกนำมาใส่ตู้ด้วย Rarity ที่เลือกนี้</p>
                            </div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'ดำเนินการต่อ',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { 
                        popup: 'rounded-[2rem]', 
                        confirmButton: 'rounded-xl bg-indigo-600 font-bold text-sm px-4', 
                        cancelButton: 'rounded-xl text-sm' 
                    },
                    didOpen: () => {
                        const typeSelect = document.getElementById('auto-card-type');
                        const targetContainer = document.getElementById('target-rarity-container');
                        
                        // ซ่อนตัวเลือก Rarity ของ A หากแอดมินเลือกสุ่มเฉพาะ S
                        typeSelect.addEventListener('change', (e) => {
                            if (e.target.value === 'S') {
                                targetContainer.style.display = 'none';
                            } else {
                                targetContainer.style.display = 'block';
                            }
                        });
                    },
                    preConfirm: () => {
                        const type = document.getElementById('auto-card-type').value;
                        const targetRarity = document.getElementById('auto-target-rarity').value;
                        return { rarityChoice: type, targetRarityA: targetRarity };
                    }
                });

                if (!formValues) return;
                const { rarityChoice, targetRarityA } = formValues;

                Loader.show();
                try {
                    // 2. ดึงข้อมูลการ์ดทั้งหมดจากระบบ
                    const snapCards = await get(ref(db, 'system_cards'));
                    if (!snapCards.exists()) {
                        Loader.hide();
                        return Toast.fire({ icon: 'error', title: 'ไม่พบฐานข้อมูลการ์ดระบบ (system_cards)' });
                    }

                    const allCards = snapCards.val();
                    let arrayA = [];
                    let arrayS = [];

                    Object.entries(allCards).forEach(([id, card]) => {
                        // เก็บตัวแปร originalSource ไว้เช็คที่มาเพื่อแปลง Rarity ในภายหลัง
                        if (card.rarity === 'A') arrayA.push({ id, ...card, originalSource: 'A' });
                        if (card.rarity === 'S') arrayS.push({ id, ...card, originalSource: 'S' });
                    });

                    const shuffleArray = (arr) => arr.sort(() => 0.5 - Math.random());

                    let finalSelectedCards = [];
                    let countA = 0;
                    let countS = 0;

                    if (rarityChoice === 'A' || rarityChoice === 'BOTH') {
                        const shuffledA = shuffleArray(arrayA);
                        const selectedA = shuffledA.slice(0, Math.ceil(shuffledA.length / 2));
                        finalSelectedCards.push(...selectedA);
                        countA = selectedA.length;
                    }
                    
                    if (rarityChoice === 'S' || rarityChoice === 'BOTH') {
                        const shuffledS = shuffleArray(arrayS);
                        const selectedS = shuffledS.slice(0, Math.ceil(shuffledS.length / 2));
                        finalSelectedCards.push(...selectedS);
                        countS = selectedS.length;
                    }

                    // 3. ดึงรายการของในตู้ปัจจุบันเพื่อเคลียร์การ์ดชุดเก่าออกก่อนม้วนใหม่
                    const snapBannerItems = await get(ref(db, `gacha_banners/${bId}/items`));
                    let currentItems = snapBannerItems.exists() ? snapBannerItems.val() : {};

                    Object.keys(currentItems).forEach(key => {
                        if (currentItems[key].type === 'card') {
                            if (rarityChoice === 'BOTH') {
                                delete currentItems[key];
                            } 
                            // ถ้าเลือก A ให้ลบการ์ดเดิมในตู้ที่เคยสุ่มมา (เช่น ลบทั้ง A เดิม หรือ A ที่เคยถูกตั้งเป้าหมายเป็น Rarity อื่น)
                            else if (rarityChoice === 'A' && ['A', 'A+', 'A++', 'S', 'S+', 'S++'].includes(currentItems[key].rarity)) {
                                delete currentItems[key];
                            } 
                            else if (rarityChoice === 'S' && currentItems[key].rarity === 'S') {
                                delete currentItems[key];
                            }
                        }
                    });

                    // 4. ม้วนการ์ดชุดใหม่เข้าตู้
                    finalSelectedCards.forEach(card => {
                        const newKey = push(ref(db, `gacha_banners/${bId}/items`)).key;
                        const cardImgUrl = card.image || card.img || card.driveId || '';
                        
                        // กำหนด Rarity ใหม่ให้การ์ด (ถ้าเป็นการ์ดจากกลุ่ม A ให้ใช้ Rarity ที่ตั้งเป้าหมายไว้)
                        let finalRarity = card.rarity;
                        if (card.originalSource === 'A') {
                            finalRarity = targetRarityA;
                        }

                        currentItems[newKey] = {
                            type: 'card',
                            driveId: cardImgUrl, 
                            name: card.name,
                            rarity: finalRarity, // ใช้ความ Rarity ที่คำนวณใหม่
                            amount: 1,
                            isGuarantee: false
                        };
                    });

                    // 5. อัปเดตข้อมูลเซฟลง Firebase
                    await update(ref(db, `gacha_banners/${bId}/items`), currentItems);

                    Loader.hide();
                    
                    let successMsg = 'สุ่มการ์ดลงตู้สำเร็จ! ';
                    if (countA > 0) successMsg += `[กลุ่ม A เข้าระดับ ${targetRarityA}: ${countA} ใบ] `;
                    if (countS > 0) successMsg += `[กลุ่ม S: ${countS} ใบ]`;
                    
                    Toast.fire({ icon: 'success', title: successMsg });

                    // สั่งให้รีเฟรชหน้ารายการไอเทมในตู้ของแอดมินทันที
                    this.manageGachaBannerItems(bId);

                } catch (error) {
                    Loader.hide();
                    console.error(error);
                    Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการสุ่มกระจายการ์ด' });
                }
            },
