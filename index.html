                            if (!selectedOpt || !selectedOpt.value) return;

                            const type = selectedOpt.getAttribute('data-type');
                            const price = parseFloat(selectedOpt.getAttribute('data-price'));
                            const category = selectedOpt.getAttribute('data-category');

                            errorMsg.classList.add('hidden');
                            confirmBtn.removeAttribute('disabled');
                            amountContainer.style.display = 'block';
                            customBox.style.display = 'none';

                            if (type === 'custom') {
                                customBox.style.display = 'block';
                            } 
                            else if (type === 'frame' || type === 'cat_frame') {
                                if (price === 0 && category === 'free') {
                                    errorMsg.innerHTML = '❌ ไม่สามารถนำ <b>"กรอบโปรไฟล์แจกฟรี"</b> มาใส่ในตู้สุ่มได้ครับ';
                                    errorMsg.classList.remove('hidden');
                                    confirmBtn.setAttribute('disabled', 'true'); 
                                    amountContainer.style.display = 'none'; 
                                } else {
                                    amountContainer.style.display = 'none'; 
                                }
                            }
                            // --- ส่วนที่แก้ไขเพิ่มเติม: ให้ประเภท card ถูกล็อคจำนวนด้วย ---
                            else if (type === 'cat' || type === 'bg' || type === 'card') {
                                amountContainer.style.display = 'none';
                            }
                        };

                        itemSelect.addEventListener('change', updateUI);
                        updateUI(); 
                    },
                    preConfirm: () => {
                        const itemSelect = document.getElementById('edit-gacha-item-preset');
                        const rawVal = itemSelect.value;
                        
                        let type, driveId, name;

                        if (rawVal === 'custom') {
                            type = 'custom';
                            driveId = extractDriveId(document.getElementById('edit-gacha-item-driveid').value.trim());
                            name = document.getElementById('edit-gacha-item-name').value.trim();
                        } else {
                            const parts = rawVal.split('|');
                            type = parts[0];
                            driveId = parts[1];
                            name = parts[2];
                        }

                        if(!name || !driveId) { Swal.showValidationMessage('กรุณาเลือกไอเทมหรือระบุข้อมูลให้ครบถ้วน'); return false; }

                        const rarity = document.getElementById('edit-gacha-item-rarity').value;
                        const isGuarantee = document.getElementById('edit-gacha-item-guarantee').checked;
                        
                        const amountContainer = document.getElementById('gacha-amount-container');
                        let amount = amountContainer.style.display === 'none' 
                            ? null 
                            : (parseInt(document.getElementById('edit-gacha-item-amount').value) || 1);

                        return { type, driveId, name, rarity, amount, isGuarantee };
                    }
                }).then(async (res) => {
                    if(res.isConfirmed) {
                        Loader.show();
                        const targetId = itemId || push(ref(db, `gacha_banners/${bId}/items`)).key;
                        await update(ref(db, `gacha_banners/${bId}/items/${targetId}`), res.value);
                        Loader.hide();
                        Toast.fire({ icon: 'success', title: 'บันทึกไอเทมลงตู้สุ่มสำเร็จแล้ว' });
                        this.manageGachaBannerItems(bId); 
                    }
                });
            },

                `;

                        itemOptions += `<option value="frame|${v.driveId}|${v.name}">กรอบ: ${v.name}</option>`;
                    });
                }
                itemOptions += `</optgroup><optgroup label="ร้านค้าแมว">`;
                if (catShopSnap.exists()) {
                    Object.entries(catShopSnap.val()).forEach(([k, v]) => {
                        if(v.type === 'cat_frame') {
                            itemOptions += `<option value="cat_frame|${v.driveId}|${v.name}">กรอบแมว: ${v.name}</option>`;
                        } else if (v.type === 'food' || v.type === 'cat' || v.type === 'bg') {
                            itemOptions += `<option value="${v.type}|${v.driveId || k}|${v.name}">${v.type.toUpperCase()}: ${v.name}</option>`;
                        }
                    });
                }
                itemOptions += `</optgroup>`;

                const { value: formValues } = await Swal.fire({
                    title: '<span style="font-family: \'Kanit\';">ตั้งค่าโหมดปรับปรุงระบบ</span>',
                    html: `
                        <div class="text-left font-sans text-sm mt-4 space-y-4 max-h-[65vh] overflow-y-auto no-scrollbar p-1">
                            <div class="flex items-center justify-between bg-red-50 p-4 rounded-xl border border-red-200 shadow-sm">
                                <div>
                                    <span class="font-bold text-red-600 block">เปิดใช้งาน Maintenance</span>
                                    <span class="text-[10px] text-red-400">นักเรียนทั่วไปจะล็อกอินเข้าแอปไม่ได้</span>
                                </div>
                                <input type="checkbox" id="maint-active" class="w-6 h-6 accent-red-500 cursor-pointer" ${config.isActive ? 'checked' : ''}>
                            </div>
                            
                            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200">
                                <label class="font-bold text-gray-700 mb-2 block text-xs">ข้อยกเว้น (Whitelist รหัสนักเรียน)</label>
                                <textarea id="maint-whitelist" class="w-full p-3 border border-gray-200 rounded-lg focus:outline-primary bg-white text-xs shadow-inner" rows="2" placeholder="เช่น 64001, 64002 (คั่นด้วยลูกน้ำ)">${whitelistStr}</textarea>
                            </div>

                            <div class="bg-pink-50 p-3 rounded-xl border border-pink-200">
                                <div class="flex justify-between items-center mb-2">
                                    <label class="font-bold text-pink-700 block text-xs"><i class="fa-solid fa-gift"></i> ของรางวัลแจกชดเชย (สูงสุด 5 อย่าง)</label>
                                    <button id="add-reward-row-btn" class="bg-pink-500 text-white px-2 py-1 rounded text-[10px] font-bold shadow-sm active:scale-95 transition"><i class="fa-solid fa-plus"></i> เพิ่ม</button>
                                </div>
                                <div id="maint-rewards-container" class="space-y-2">
                                    </div>
                                <p class="text-[10px] text-pink-500 mt-2">*กรอบโปรไฟล์, แมว และพื้นหลัง ไม่ต้องระบุจำนวน</p>
                            </div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'บันทึกการตั้งค่า',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#EF4444',
                    customClass: { popup: 'rounded-[2rem]', confirmButton: 'rounded-xl font-bold py-2.5 px-6', cancelButton: 'rounded-xl font-bold py-2.5 px-6' },
                    didOpen: () => {
                        const container = document.getElementById('maint-rewards-container');
                        const addBtn = document.getElementById('add-reward-row-btn');
                        
                        let rowCount = 0;

                        // ฟังก์ชันซ่อน/แสดงช่องใส่จำนวน
                        const handleTypeChange = (selectEl, amtInput) => {
                            const val = selectEl.value;
                            if (!val) { amtInput.style.display = 'block'; return; }
                            const type = val.split('|')[0];
                            
                            // กรอบ, แมว, พื้นหลัง ไม่ต้องระบุจำนวน
                            if (['frame', 'cat_frame', 'cat', 'bg'].includes(type)) {
                                amtInput.style.display = 'none';
                                amtInput.value = 0; // Set to 0 to indicate non-stackable
                            } else {
                                amtInput.style.display = 'block';
                                if (amtInput.value === '0') amtInput.value = 1;
                            }
                        };

                        // ฟังก์ชันสร้างแถว UI
                        const addRow = (initialData = null) => {
                            if (rowCount >= 5) {
                                Toast.fire({ icon: 'warning', title: 'เพิ่มของรางวัลได้สูงสุด 5 อย่างเท่านั้น' });
                                return;
                            }
                            rowCount++;

                            const rowDiv = document.createElement('div');
                            rowDiv.className = 'flex gap-2 items-start maint-reward-row';
                            
                            const selectId = `m-sel-${rowCount}`;
                            const amtId = `m-amt-${rowCount}`;

                            rowDiv.innerHTML = `
                                <select id="${selectId}" class="flex-1 p-2 border border-pink-200 rounded-lg text-xs bg-white focus:outline-pink-400 font-medium">
                                    ${itemOptions}
                                </select>
                                <input type="number" id="${amtId}" placeholder="จำนวน" min="1" class="w-16 p-2 border border-pink-200 rounded-lg text-xs text-center focus:outline-pink-400" value="${initialData ? initialData.amount : 1}">
                                <button class="bg-red-100 text-red-500 w-8 h-8 rounded-lg flex items-center justify-center shrink-0 border border-red-200 hover:bg-red-500 hover:text-white transition remove-row-btn"><i class="fa-solid fa-xmark"></i></button>
                            `;

                            container.appendChild(rowDiv);

                            const selectEl = rowDiv.querySelector(`#${selectId}`);
                            const amtInput = rowDiv.querySelector(`#${amtId}`);
                            
                            // ตั้งค่าเริ่มต้นถ้ามีข้อมูล
                            if (initialData) {
                                selectEl.value = `${initialData.type}|${initialData.id}|${initialData.name}`;
                                handleTypeChange(selectEl, amtInput);
                            }

                            // แนบ Event Listener
                            selectEl.addEventListener('change', () => handleTypeChange(selectEl, amtInput));
                            rowDiv.querySelector('.remove-row-btn').addEventListener('click', () => {
                                rowDiv.remove();
                                rowCount--;
                            });
                        };

                        // Render ข้อมูลเดิมที่เคยเซฟไว้
                        if (currentRewards.length > 0) {
                            currentRewards.forEach(r => addRow(r));
                        } else {
                            addRow(); // แสดง 1 แถวเปล่าๆ เป็นค่าเริ่มต้น
                        }

                        addBtn.addEventListener('click', () => addRow());
                    },
                    preConfirm: () => {
                        const isActive = document.getElementById('maint-active').checked;
                        const rawWhitelist = document.getElementById('maint-whitelist').value;
                        const whitelist = rawWhitelist.split(/[\n,]+/).map(id => id.trim()).filter(id => id !== '');
                        
                        let rewards = [];
                        const rows = document.querySelectorAll('.maint-reward-row');
                        
                        for (let row of rows) {
                            const select = row.querySelector('select');
                            const amtInput = row.querySelector('input[type="number"]');
                            
                            if (select.value) {
                                const [type, id, name] = select.value.split('|');
                                let amount = parseInt(amtInput.value);

                                    return false;
                                }

                                rewards.push({ type, id, name, amount });
                            }
                        }

                        return { isActive, whitelist, rewards };
                    }

                }
            },

            
        };

            exchangeTicketWithSC: async () => {
                const cost = 25000;
                const u = appState.user;
                const currentSCard = u.items?.sc || 0; 
                
                if (currentSCard < cost) {
                    Swal.fire({ 
                        icon: 'error', 
                        title: 'S-Card ไม่เพียงพอ', 
                        text: `คุณต้องมีอย่างน้อย ${cost.toLocaleString()} S-Card เพื่อแลกตั๋ว` 
                    });
                    return;
                }

                const result = await Swal.fire({
                    title: 'ยืนยันการแลกตั๋ว?',
                    text: `ใช้ ${cost.toLocaleString()} S-Card เพื่อแลก 1 Ticket`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#4f46e5',
                    cancelButtonColor: '#aaa',
                    confirmButtonText: 'ตกลงแลก',
                    cancelButtonText: 'ยกเลิก'
                });

                if (result.isConfirmed) {
                    try {
                        const newSCard = currentSCard - cost;
                        const newTickets = (u.items?.ticket || 0) + 1;

                        // 1. อัปเดตข้อมูลไปยัง Firebase
                        await update(ref(db, `users/${u.uid}`), {
                            'items/sc': newSCard,
                            'items/ticket': newTickets
                        });

                        // 2. อัปเดตข้อมูลใน State ของระบบ
                        if (!u.items) u.items = {};
                        u.items.sc = newSCard;
                        u.items.ticket = newTickets;

                        // 3. 🌟 อัปเดตแสดงผลตั๋วสุ่มรวมด้านบนสุดของตู้ Gacha เท่านั้น
                        const ticketDisplay = document.getElementById('gacha-main-ticket');
                        if (ticketDisplay) ticketDisplay.innerText = newTickets.toLocaleString();
                        
                        // ❌ (ลบบรรทัด gacha-view-card-count ออกไปแล้ว เพื่อไม่ให้ทับข้อมูลเฉพาะตู้)

                        Swal.fire({ 
                            icon: 'success', 
                            title: 'แลกสำเร็จ!', 
                            text: 'ได้รับ 1 Ticket เรียบร้อยแล้ว 🎟️', 
                            timer: 1500, 
                            showConfirmButton: false 
                        });
                    } catch (error) {
                        console.error(error);
                        Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'ไม่สามารถทำรายการได้ในขณะนี้' });
                    }
                }
            },
            async clearSalesHistory() {
            const u = appState.user;
            if (!u) return;

            // แสดงหน้าต่างยืนยันเพื่อป้องกันผู้เล่นกดพลาด
            const confirm = await Swal.fire({
                title: 'ยืนยันการลบประวัติ',
                text: 'คุณต้องการลบประวัติการขายทั้งหมดใช่หรือไม่? (การกระทำนี้ไม่สามารถย้อนกลับได้)',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                cancelButtonColor: '#6B7280',
                confirmButtonText: 'ใช่, ลบทั้งหมด',
                cancelButtonText: 'ยกเลิก',
                customClass: { popup: 'rounded-3xl' }
            });

            if (confirm.isConfirmed) {
                Loader.show();
                try {
                    // 1. ลบข้อมูลที่ Node ใน Firebase สำหรับผู้ใช้นี้
                    await set(ref(db, `users/${u.uid}/sales_history`), null);
                    
                    // 2. ล้างข้อมูลใน Local State เพื่อให้หน้าจออัปเดตทันที
                    u.sales_history = {};

                    Loader.hide();
                    Toast.fire({ icon: 'success', title: 'ล้างประวัติการขายเรียบร้อยแล้ว' });

                    // 3. สั่งโหลดหน้าจัดการร้านค้าซ้ำเพื่ออัปเดต UI ทันที
                    if (typeof Views !== 'undefined' && typeof Views.renderShop === 'function') {
                        Views.renderShop();
                    } else if (typeof this.renderShop === 'function') {
                        this.renderShop();
                    }
                } catch (err) {
                    Loader.hide();
                    console.error("Clear sales history error:", err);
                    Toast.fire({ icon: 'error', title: 'ระบบขัดข้อง ไม่สามารถลบประวัติได้' });
                }
            }
        },

            handleAttachTypeChange: (val) => {
                const con = document.getElementById('attach-value-container');
                if(!val) { con.innerHTML = ''; return; }
                const data = window.app._tempAttachData || {frames:[], cats:[], foods:[]};
                const att = data.currentAtt;
                
                if (val === 'frame') {
                    let opts = '<option value="">เลือกกรอบ...</option>';
                    data.frames.forEach(v => { opts += `<option value="${v.driveId}" ${att && att.type==='frame' && att.itemId===v.driveId ? 'selected':''}>${v.name}</option>`; });
                    con.innerHTML = `<select id="attach-item-id" class="w-full p-2.5 border rounded-xl text-sm bg-white font-bold" required>${opts}</select>`;
                } else if (val === 'cat') {
                    let opts = '<option value="">เลือกแมว...</option>';
                    data.cats.forEach(v => { opts += `<option value="${v.driveId}" ${att && att.type==='cat' && att.itemId===v.driveId ? 'selected':''}>${v.name}</option>`; });
                    con.innerHTML = `<select id="attach-item-id" class="w-full p-2.5 border rounded-xl text-sm bg-white font-bold" required>${opts}</select>`;
                } else if (val === 'food') {
                    let opts = '<option value="">เลือกอาหาร...</option>';
                    data.foods.forEach(v => { opts += `<option value="${v.id}" ${att && att.type==='food' && att.itemId===v.id ? 'selected':''}>${v.name}</option>`; });
                    con.innerHTML = `
                        <div class="flex gap-2">
                            <select id="attach-item-id" class="flex-1 p-2.5 border rounded-xl text-sm bg-white font-bold" required>${opts}</select>
                            <input type="number" id="attach-amount" value="${att && att.type==='food'?att.amount:1}" min="1" class="w-16 p-2.5 border rounded-xl text-sm text-center font-bold" required placeholder="ชิ้น">
                        </div>`;
                } else if (['cc', 'cd', 'ce'].includes(val)) {
                    con.innerHTML = `<input type="number" id="attach-amount" value="${att && att.type===val?att.amount:100}" min="1" class="w-full p-2.5 border rounded-xl text-sm font-bold" required placeholder="ใส่จำนวน">`;
                }
            },
            handleAttachStatusChange: (val) => {
                const sec = document.getElementById('attachment-section');
                if(val === 'ตรวจแล้ว') { sec.style.display = 'block'; } 
                else { sec.style.display = 'none'; document.getElementById('attach-type').value = ''; document.getElementById('attach-value-container').innerHTML = ''; }

            claimAssignmentGift: async (assignId) => {
                const uid = appState.user.uid;
                const sub = window.renderStore.submissions[assignId];
                if(!sub || !sub.attachment || sub.attachment.claimed) return;

                const att = sub.attachment;
                Loader.show();
                try {
                    let updates = {};
                    updates[`submissions/${assignId}/${uid}/attachment/claimed`] = true;

                    if(att.type === 'frame') {
                        updates[`users/${uid}/unlocked_frames/${att.itemId}`] = true;
                        appState.user.unlocked_frames = appState.user.unlocked_frames || {};
                        appState.user.unlocked_frames[att.itemId] = true;
                    } else if (att.type === 'cat' || att.type === 'bg') {
                        updates[`users/${uid}/catData/unlocked/${att.itemId}`] = true;
                        if(appState.user.catData) {
                            appState.user.catData.unlocked = appState.user.catData.unlocked || {};
                            appState.user.catData.unlocked[att.itemId] = true;
                        }
                    } else if (att.type === 'food') {
                        const cur = (appState.user.catData?.inventory?.[att.itemId]) || 0;
                        const addAmount = parseInt(att.amount) || 1;
                        updates[`users/${uid}/catData/inventory/${att.itemId}`] = cur + addAmount;
                        if(appState.user.catData) appState.user.catData.inventory[att.itemId] = cur + addAmount;
                    } else if (['cc', 'cd', 'ce'].includes(att.type)) {
                        const cur = (appState.user.catData?.inventory?.[att.type]) || 0;
                        const addAmount = parseInt(att.amount) || 0;
                        updates[`users/${uid}/catData/inventory/${att.type}`] = cur + addAmount;
                        if(appState.user.catData) appState.user.catData.inventory[att.type] = cur + addAmount;
                    }

                    await update(ref(db), updates);
                    window.renderStore.submissions[assignId].attachment.claimed = true;

                    Loader.hide();
                    Swal.fire({icon: 'success', title: 'สำเร็จ', text: `คุณได้รับ ${att.itemName} เรียบร้อยแล้ว!`, customClass: {popup: 'rounded-3xl'}});
                    Views.showAssignmentDetail(assignId); 

                    Views.checkTaskBadge(); // รีเฟรชจุดแดง
                    if(appState.currentView === 'tasks') Views.renderTasks(); // รีเฟรชลิสต์เพื่อให้ของขวัญเปลี่ยนเป็นสีเทา
                } catch(e) {
                    Loader.hide();
                    Swal.fire({icon: 'error', title: 'Error', text: 'เกิดข้อผิดพลาดในการรับของ', customClass: {popup: 'rounded-3xl'}});
                }
            },
