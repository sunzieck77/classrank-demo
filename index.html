            async claimCatMining(type) {
                const u = appState.user;
                const catData = u.catData;
                if (!catData || !catData.mining || !catData.mining[type] || !catData.mining[type].ready || catData.mining[type].claimed) return;

                let hungerWidth = Math.max(0, Math.min(100, catData.hunger || 0));
                let happyWidth = Math.max(0, Math.min(100, catData.happiness || 0));

                if (hungerWidth === 0) {
                    return Swal.fire({icon:'error', title:'แมวไม่มีแรง!', text:'ความหิว 0% โปรดให้อาหารก่อนสุ่มขุดแร่', customClass:{popup:'rounded-3xl'}});
                }

                let factor = happyWidth / 100;
                let yieldAmount = 0; let nameStr = '';
                if (type === 'cc') { yieldAmount = Math.floor(1000 + (500 * factor)); nameStr = 'Cat Coin'; }
                if (type === 'cd') { yieldAmount = Math.floor(1000 + (500 * factor)); nameStr = 'Cat Diamond'; }
                if (type === 'ce') { yieldAmount = Math.floor(250 + (50 * factor)); nameStr = 'Cat Emerald'; }

                Loader.show();
                try {
                    const currentInv = catData.inventory[type] || 0;
                    let updates = {};
                    updates[`users/${u.uid}/catData/inventory/${type}`] = currentInv + yieldAmount;
                    updates[`users/${u.uid}/catData/mining/${type}/claimed`] = true;
                    
                    await update(ref(db), updates);
                    appState.user.catData.inventory[type] = currentInv + yieldAmount;
                    appState.user.catData.mining[type].claimed = true;
                    
                    Loader.hide();
                    Toast.fire({ icon: 'success', title: `ได้รับ ${yieldAmount.toLocaleString()} ${nameStr}` });
                    
                    this.renderCatRoomMain(); 
                } catch(e) { Loader.hide(); Toast.fire({icon:'error', title:'เกิดข้อผิดพลาด'}); }
            },

            async feedCat(foodId, hPlus, hpPlus) {
                const u = appState.user;
                if (!u || !u.catData) return;
                let curFood = u.catData.inventory[foodId] || 0;
                if (curFood <= 0) return;

                Loader.show();
                try {
                    let curHunger = u.catData.hunger || 0;
                    let curHappy = u.catData.happiness || 0;
                    let curLevel = u.catData.level || 1;

                    curHunger = Math.min(100, curHunger + hPlus);
                    curHappy = Math.min(100, curHappy + hpPlus);
                    if (Math.random() > 0.8) curLevel += 1;

                    let updates = {};
                    updates[`users/${u.uid}/catData/inventory/${foodId}`] = curFood - 1;
                    updates[`users/${u.uid}/catData/hunger`] = curHunger;
                    updates[`users/${u.uid}/catData/happiness`] = curHappy;
                    updates[`users/${u.uid}/catData/level`] = curLevel;

                    await update(ref(db), updates);
                    appState.user.catData.inventory[foodId] = curFood - 1;
                    appState.user.catData.hunger = curHunger;
                    appState.user.catData.happiness = curHappy;
                    appState.user.catData.level = curLevel;

                    Loader.hide();
                    Toast.fire({ icon: 'success', title: 'อร่อยจังง้าวว~' });
                    this.renderCatProfile();
                } catch(e) { Loader.hide(); Toast.fire({icon:'error', title:'Error'}); }
            },

            async buyCatShopItem(key) {
                const u = appState.user; 
                const item = window.renderStore.catShop[key];
                if (!item || !u) return;

                // เช็คว่าเป็นไอเทม Limited หรือไม่
                if (item.isLimited && item.type !== 'food') {
                    return Swal.fire({ icon: 'warning', title: 'ยังไม่เปิดขาย', text: 'ไอเทมชิ้นนี้เป็นไอเทม Limited ยังไม่เปิดให้แลกในขณะนี้', customClass:{popup:'rounded-3xl'} });
                }

                const price = item.price || 0; 
                const sc = (u.items && u.items.sc) || 0;

                if (sc < price) return Swal.fire({ icon: 'error', title: 'SC ไม่พอ', text: 'คุณต้องแลก S-Card เพิ่ม', customClass:{popup:'rounded-3xl'} });

                const res = await Swal.fire({ title: `ซื้อ ${item.name}?`, text: `ใช้ ${price.toLocaleString()} SC`, showCancelButton: true, confirmButtonText: 'ซื้อเลย', cancelButtonText: 'ยกเลิก', customClass: { popup: 'rounded-3xl' }, confirmButtonColor: '#27D6F5' });

                if (res.isConfirmed) {
                    Loader.show();
                    try {
                        let updates = {}; updates[`users/${u.uid}/items/sc`] = sc - price;
                        
                        if (item.type === 'food') {
                            const cur = u.catData.inventory[key] || 0;
                            updates[`users/${u.uid}/catData/inventory/${key}`] = cur + 1;
                            appState.user.catData.inventory[key] = cur + 1;
                        } else if (item.type === 'cat' || item.type === 'bg') {
                            const curUnlocked = u.catData.unlocked || {};
                            updates[`users/${u.uid}/catData/unlocked/${item.driveId}`] = true;
                            appState.user.catData.unlocked = { ...curUnlocked, [item.driveId]: true };
                        } else if (item.type === 'cat_frame') {
                            const curFrames =
                                appState.user.unlocked_frames || {};
                            updates[
                                `users/${u.uid}/unlocked_frames/${item.driveId}`
                            ] = true;
                            appState.user.unlocked_frames = {
                                ...curFrames,
                                [item.driveId]: true
                            };
                        }
                        
                        await update(ref(db), updates); appState.user.items.sc = sc - price;
                        const scEl = document.getElementById('cat-sc-balance');
                        if (scEl) {
                            scEl.textContent =
                                appState.user.items.sc.toLocaleString();
                        }
                        Loader.hide(); Toast.fire({icon:'success', title:'ซื้อไอเทมสำเร็จ'});
                        this.renderCatShop();

                        // ถ้าอยู่หน้าโปรไฟล์ให้อัปเดตอาหารด้วย
                        if (appState.catRoomTab === 'profile') {
                            this.renderCatProfile();
                        }
                    } catch(e) { Loader.hide(); Toast.fire({icon:'error', title:'Error'}); }
                }
            },

            async processCatExchange(type) {
                const u = appState.user;

                // กัน undefined
                if (!u.items) u.items = {};
                if (!u.catData.inventory) u.catData.inventory = {};

                const inv = u.catData.inventory;

                let cost = 0, gain = 0, targetType = '';

                if (type === 'cc') {
                    cost = 1000;
                    gain = 10;
                    targetType = 'cs';
                }

                if (type === 'cd') {
                    cost = 1000;
                    gain = 10;
                    targetType = 'ct';
                }

                if (type === 'ce') {
                    cost = 500;
                    gain = 1;
                    targetType = 'ticket';
                }

                // ใช้ Swal.fire แทน
                if ((inv[type] || 0) < cost) {
                    return Swal.fire({
                        icon: 'error',
                        title: 'แร่ไม่พอ',
                        text: `ต้องการอย่างน้อย ${cost}`,
                        customClass: { popup: 'rounded-3xl' }
                    });
                }

                Loader.show();

                try {
                    const newMineral = (inv[type] || 0) - cost;
                    const curTarget = u.items[targetType] || 0;
                    const newTarget = curTarget + gain;

                    let updates = {};

                    updates[`users/${u.uid}/catData/inventory/${type}`] = newMineral;
                    updates[`users/${u.uid}/items/${targetType}`] = newTarget;

                    await update(ref(db), updates);

                    // sync state
                    appState.user.catData.inventory[type] = newMineral;
                    appState.user.items[targetType] = newTarget;

                    Loader.hide();

                    Swal.fire({
                        icon: 'success',
                        title: 'แลกเปลี่ยนสำเร็จ',
                        timer: 1500,
                        showConfirmButton: false,
                        customClass: { popup: 'rounded-3xl' }
                    });

                    // update UI
                    const ccEl = document.getElementById('cat-cc-balance');
                    const cdEl = document.getElementById('cat-cd-balance');
                    const ceEl = document.getElementById('cat-ce-balance');

                    if (ccEl) ccEl.innerText = appState.user.catData.inventory.cc.toLocaleString();
                    if (cdEl) cdEl.innerText = appState.user.catData.inventory.cd.toLocaleString();
                    if (ceEl) ceEl.innerText = appState.user.catData.inventory.ce.toLocaleString();

                    const invEl = document.getElementById(`cr-inv-${type}`);
                    if (invEl) {
                        invEl.innerText = appState.user.catData.inventory[type].toLocaleString();
                    }

                } catch (e) {
                    console.error(e);

                    Loader.hide();

                    Swal.fire({
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: e.message || 'ไม่สามารถแลกเปลี่ยนได้'
                    });
                }
            },

            async claimMail(mailId, category, driveId) {
                Loader.show();
                const uid = appState.user.uid;
                try {
                    let updates = {};
                    
                    // รับของเข้าตัว
                    if (category === 'frame' || category === 'cat_frame') {
                        updates[`users/${uid}/unlocked_frames/${driveId}`] = true;
                        if(!appState.user.unlocked_frames) appState.user.unlocked_frames = {};
                        appState.user.unlocked_frames[driveId] = true;
                    } else if (category === 'cat' || category === 'bg') {
                        updates[`users/${uid}/catData/unlocked/${driveId}`] = true;
                        if(appState.user.catData) {
                            if(!appState.user.catData.unlocked) appState.user.catData.unlocked = {};
                            appState.user.catData.unlocked[driveId] = true;
                        }
                    } else if (category === 'food') {
                        const mailSnap = await get(ref(db, `mailbox/${uid}/${mailId}`));
                        const amount = mailSnap.exists() ? mailSnap.val().amount : 1;
                        
                        // 1. ค้นหา Shop Key (เช่น food_1) จาก Drive ID 
                        let foodKey = driveId; 
                        if (!window.renderStore.catShop || Object.keys(window.renderStore.catShop).length === 0) {
                            const snap = await get(ref(db, 'cat_shop'));
                            window.renderStore.catShop = snap.exists() ? snap.val() : {};
                        }
                        for (const k in window.renderStore.catShop) {
                            if (window.renderStore.catShop[k].driveId === driveId) {
                                foodKey = k; 
                                break;
                            }
                        }

                        // 2. บันทึกข้อมูลด้วย foodKey แทน driveId
                        const cur = appState.user.catData?.inventory?.[foodKey] || 0;
                        updates[`users/${uid}/catData/inventory/${foodKey}`] = cur + amount;
                        
                        if(!appState.user.catData) appState.user.catData = {};
                        if(!appState.user.catData.inventory) appState.user.catData.inventory = {};
                        appState.user.catData.inventory[foodKey] = cur + amount;
                    }

                    // ลบจดหมายทิ้ง
                    updates[`mailbox/${uid}/${mailId}`] = null;
                    
                    await update(ref(db), updates);
                    Loader.hide();
                    Toast.fire({ icon: 'success', title: 'รับไอเทมสำเร็จ!' });
                    
                    // รีเฟรชหน้าจดหมายและ Badge
                    this.checkMailBadge();
                    this.showMailbox(); 
                    
                } catch(e) {
                    Loader.hide();
                    Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการรับของ' });
                }
            },

            toggleRewardAmount(val) {
                const amountInput = document.getElementById('rw-amount');
                if (!val || !amountInput) return;
                
                // โครงสร้าง value ที่เราตั้งไว้คือ "type|category|driveId|name"
                // เราเลยจะแยกข้อความด้วย '|' เพื่อเช็คแค่ตำแหน่งของ category (ตำแหน่งที่ 1)
                const parts = val.split('|');
                const category = parts[1];
                
                // เช็คเงื่อนไข: ถ้ารางวัลเป็น กรอบ(frame, cat_frame), แมว(cat), หรือ พื้นหลัง(bg)
                if (category === 'frame' || category === 'cat_frame' || category === 'cat' || category === 'bg') {
                    amountInput.style.display = 'none';
                    amountInput.value = 1; // ล็อคจำนวนไว้ที่ 1
                } else {
                    amountInput.style.display = 'block';
                }
            },

            // --- ระบบสุ่ม และแสดงเรทสำหรับนักเรียน ---

            showGachaDetails(bId) {
                get(ref(db, `gacha_banners/${bId}/items`)).then(snap => {
                    if(!snap.exists()) return Toast.fire({icon:'error', title:'ตู้ยังว่างเปล่า'});
                    const items = Object.values(snap.val());
                    const totalWeight = items.reduce((sum, item) => sum + (RARITY_WEIGHTS[item.rarity] || 0), 0);
                    
                    let html = '<div class="max-h-[60vh] overflow-y-auto space-y-2 text-left font-sans">';
                    // เรียงตาม Rarity (จาก SSS+ ลงไป A)
                    items.sort((a,b) => (RARITY_WEIGHTS[a.rarity]||0) - (RARITY_WEIGHTS[b.rarity]||0)).forEach(it => {
                        const chance = ((RARITY_WEIGHTS[it.rarity] / totalWeight) * 100).toFixed(2);
                        let img = it.driveId.length > 10 ? `https://drive.google.com/thumbnail?id=${it.driveId}&sz=s800` : (ITEM_IMAGES[it.driveId] || CAT_ASSETS[it.driveId] || ITEM_IMAGES.sc);
                        html += `
                            <div class="flex items-center gap-3 bg-gray-50 p-2 rounded-xl border border-gray-100">
                                <img src="${img}" class="w-10 h-10 object-contain drop-shadow-sm">
                                <div class="flex-1 min-w-0">
                                    <div class="font-bold text-sm text-dark truncate">${it.name} ${it.amount ? 'x'+it.amount : ''}</div>
                                    <div class="text-[10px] text-gray-500 font-bold">Rarity: <span class="text-indigo-500">${it.rarity}</span> ${it.isGuarantee ? '<span class="bg-pink-100 text-pink-500 px-1 rounded ml-1">การันตี</span>':''}</div>
                                </div>
                                <div class="font-extrabold text-sm text-indigo-600">${chance}%</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    Swal.fire({title: 'รายละเอียดและอัตราดรอป', html: html, showConfirmButton:false, showCloseButton:true, customClass:{popup:'rounded-3xl w-[95%] max-w-sm'}});
                });
            },

            async triggerGachaPull(bId, isTest = false) {
                const u = appState.user;
                
                // ถ้าเป็นครูกดปุ่มสุ่มปกติ (ไม่ใช่ปุ่มทดสอบ) ให้แจ้งเตือน
                if (u.role === 'teacher' && !isTest) return Toast.fire({icon:'info', title:'โปรดใช้ปุ่ม "ทดสอบสุ่ม" ด้านล่าง'});

                Loader.show();
                const [bSnap, uCardSnap, uPitySnap] = await Promise.all([
                    get(ref(db, `gacha_banners/${bId}`)),
                    get(ref(db, `users/${u.uid}/gacha_cards/${bId}`)),
                    get(ref(db, `users/${u.uid}/gacha_pity/${bId}`))
                ]);
                Loader.hide();

                const banner = bSnap.val();
                if (!banner || !banner.items) return Toast.fire({icon:'error', title:'ตู้สุ่มไม่มีไอเทม'});

                let cards = uCardSnap.exists() ? uCardSnap.val() : 0;
                let pity = uPitySnap.exists() ? uPitySnap.val() : 0;
                
                // ถ้านักเรียนสุ่มปกติ ต้องเช็คยอดการ์ด
                if (!isTest) {
                    if (cards < 1) {
                        const tickets = u.items?.ticket || 0;
                        if (tickets < 1) return Swal.fire({icon:'warning', title:'ไม่มีการ์ดและตั๋ว', text:`คุณต้องใช้ ${banner.cardName} 1 ใบในการสุ่ม หรือตั๋ว 1 ใบเพื่อแลก`, customClass:{popup:'rounded-3xl'}});
                            
                            const cardImgUrl = banner.cardImage.includes('http') ? banner.cardImage : `https://drive.google.com/thumbnail?id=${banner.cardImage}&sz=s800`;
                            
                            const res = await Swal.fire({
                                title: `<span style="font-family: 'Kanit'; font-weight: bold; color: #1f2937;">แลกการ์ดสุ่ม?</span>`, 
                                html: `
                                    <div class="flex items-center justify-center gap-8 my-6">
                                        <div class="flex flex-col items-center">
                                            <img src="${ITEM_IMAGES.ticket}" class="w-16 h-16 object-contain hover:scale-110 transition-transform">
                                            <span class="text-sm font-bold text-gray-600 mt-3">1 Ticket</span>
                                        </div>
                                        
                                        <div class="flex items-center justify-center text-primary mb-7">
                                            <i class="fa-solid fa-arrow-right text-3xl animate-pulse"></i>
                                        </div>
                                        
                                        <div class="flex flex-col items-center">
                                            <img src="${cardImgUrl}" class="w-16 h-16 object-contain hover:scale-110 transition-transform">
                                            <span class="text-sm font-bold text-indigo-600 mt-3">x${banner.ticketRate} ${banner.cardName}</span>
                                        </div>
                                    </div>
                                    <p class="text-xs text-gray-400 font-medium">*1 Ticket เพื่อแลกรับไอเท็มนี้</p>
                                `,
                                showCancelButton: true, 
                                confirmButtonText: 'แลกเปลี่ยน', 
                                cancelButtonText: 'ยกเลิก', 
                                customClass: { popup: 'rounded-[2rem]', confirmButton: 'rounded-xl font-bold py-2.5 px-6', cancelButton: 'rounded-xl font-bold py-2.5 px-6' }, 
                                confirmButtonColor: '#27D6F5'
                        });
                        
                        if (res.isConfirmed) {
                            Loader.show();
                            cards += banner.ticketRate;
                            await update(ref(db, `users/${u.uid}`), {
                                'items/ticket': tickets - 1,
                                [`gacha_cards/${bId}`]: cards
                            });
                            appState.user.items.ticket = tickets - 1;
                            appState.user.gacha_cards = appState.user.gacha_cards || {};
                            appState.user.gacha_cards[bId] = cards;
                            document.getElementById('gacha-main-ticket').innerText = (tickets - 1).toLocaleString();
                            Loader.hide();
                            // รีเฟรชยอดการ์ดใน UI ทันที
                            document.getElementById('gacha-view-card-count').innerText = cards;
                            return; 
                        } else {
                            return;
                        }
                    }
                }

                // เริ่มโลจิกสุ่ม
                let selectedItem = null;
                const itemsList = Object.values(banner.items);
                
                // Pity Check
                if (!isTest && pity + 1 >= banner.pity) {
                    const guaranteeItems = itemsList.filter(i => i.isGuarantee);
                    if(guaranteeItems.length > 0) {
                        selectedItem = guaranteeItems[Math.floor(Math.random() * guaranteeItems.length)];
                    }
                }

                // สุ่มปกติตาม Rarity Weight
                if (!selectedItem) {
                    const totalWeight = itemsList.reduce((sum, i) => sum + (RARITY_WEIGHTS[i.rarity] || 0), 0);
                    let rand = Math.random() * totalWeight;
                    let sum = 0;
                    for (let i of itemsList) {
                        sum += (RARITY_WEIGHTS[i.rarity] || 0);
                        if (rand <= sum) { selectedItem = i; break; }
                    }
                }

                if (!selectedItem) selectedItem = itemsList[0]; 

                // ตัดยอดการ์ด และอัปเดต Pity (เฉพาะการสุ่มปกติ)
                if (!isTest) {
                    let newPity = selectedItem.isGuarantee ? 0 : pity + 1;
                    let updates = {
                        [`gacha_cards/${bId}`]: cards - 1,
                        [`gacha_pity/${bId}`]: newPity
                    };
                    await update(ref(db, `users/${u.uid}`), updates);
                    
                    // ** ต้องอัปเดตสถานะในแอพด้วย (สำคัญมากเพื่อให้รอบต่อไปคำนวณถูก) **
                    appState.user.gacha_cards[bId] = cards - 1;
                    appState.user.gacha_pity = appState.user.gacha_pity || {};
                    appState.user.gacha_pity[bId] = newPity;
                    
                    document.getElementById('gacha-view-card-count').innerText = cards - 1;
                } else {
                    Toast.fire({icon: 'info', title: 'โหมดทดสอบ', text: 'ผลการสุ่มจะไม่ถูกบันทึกลงคลังและไม่นับสถิติ'});
                }

                // เล่น Animation และแสดงผล
                window.app._pendingGachaReward = selectedItem;
                this.playGachaAnimation(selectedItem);
            },

            async playGachaAnimation(item) {
                // === [ส่วนที่เพิ่มใหม่: เช็คและเปลี่ยน ID รูปภาพตาม Amount] ===
                const dynamicGachaImages = {
                    cs: {
                        200: '1U0_7YW6E_8m6mccGjcO8BjH4zmwLcbkf',
                        150: '1m_IaJbE4mqRvxqH15Cn1oZuQ-NSwc0aj',
                        100: '1fhwV0UJTme_jjnpPFIqHZE_cP3wwAp2Q',
                        50: '1aoS8o9XlcTBuba6jOpJeHMsq2STxte4j'
                    },
                    ct: {
                        200: '1HxrGW1KpV-SLlxM2VrbXEmdQQwuYNvvQ',
                        150: '1AGY1uTXkjXCuE2XmL4l2qotSXZH8nbKP',
                        100: '1FTJEJiFqMN5m1ZPMMxWqhEugkesymf5W',
                        50: '1ATOP5iFnhzjETKrtDxAxUW7jwoR2zgZH'

                };

                let finalDriveId = item.driveId;
                // ถ้ามีประเภท (cs/ct) และตรงกับจำนวน (amount) ที่ตั้งไว้ ให้ใช้ ID รูปใหม่

                // =======================================================

                // 1. เริ่ม Preload รูปภาพพื้นหลังการ์ดใหม่ไว้ในหน่วยความจำทันที
                const bgDriveId = RARITY_CARD_BGS[item.rarity] || '1TjXV2MeCjbCXqSppl_lda6IFxq_bg0Cj';
                const targetBgUrl = `https://drive.google.com/thumbnail?id=${bgDriveId}&sz=s800`;
                const imgPreload = new Image();
                imgPreload.src = targetBgUrl;

                // 2. รีเซ็ตแอนิเมชันและเคลียร์รูปภาพเก่าออกจากการ์ดจริงเพื่อไม่ให้ค้าง
                const cardInner = document.getElementById('gacha-card-inner');

                const cardBg = document.getElementById('gacha-card-bg');
                if (cardBg) cardBg.src = ''; 
                
                const itemImg = document.getElementById('gacha-reward-item');

                const rays = document.getElementById('gacha-rays');

                // ซ่อนปุ่ม Open
                btnOpen.classList.add('scale-90', 'opacity-0', 'pointer-events-none');
                await sleep(300);

                // เขย่าไอเทมตรงกลาง
                gold.classList.remove('hidden');

            async playDuplicateAnimation() {
                const item = window.app._pendingGachaReward;
                if (!item) return;

                let isDuplicate = false;
                const rewardImg = document.getElementById('gacha-reward-item');
                const rewardName = document.getElementById('gacha-reward-name');
                const claimBtn = document.getElementById('gacha-btn-claim');

                // 1. เช็กว่ามีไอเทมนี้หรือยัง (เช็กเฉพาะของสวมใส่ กรอบ, แมว, พื้นหลัง)
                if (['frame', 'cat_frame'].includes(item.type)) {
                    if (appState.user.unlocked_frames && appState.user.unlocked_frames[item.driveId]) isDuplicate = true;
                } else if (['cat', 'bg'].includes(item.type)) {
                    if (appState.user.catData && appState.user.catData.unlocked && appState.user.catData.unlocked[item.driveId]) isDuplicate = true;
                }

                if (isDuplicate) {
                    // [กรณีได้ของซ้ำ]
                    claimBtn.classList.add('opacity-0', 'pointer-events-none'); // ซ่อนปุ่มไว้ก่อน
                    
                    rewardImg.classList.add('transition-all', 'duration-500', 'ease-in-out');
                    rewardName.classList.add('transition-all', 'duration-500', 'ease-in-out');

                    // รอให้เด็กๆ เห็นไอเทมแป๊บนึง (1.5 วิ)
                    await sleep(1500);

                    // Fade Out: ย่อและจางหายไป
                    rewardImg.classList.remove('scale-100'); 
                    rewardImg.classList.add('scale-50', 'opacity-0');
                    rewardName.classList.add('opacity-0');

                    // รอ Fade Out เสร็จ (0.5 วิ)
                    await sleep(500);

                    // เปลี่ยนรูปและชื่อเป็น CatCoin (ใช้ลิงก์จากตัวแปร CAT_ASSETS.cc ในระบบของคุณ)
                    rewardImg.src = CAT_ASSETS.cc || 'https://drive.google.com/thumbnail?id=1uDb_-PIaIlLMwfWu6ZRNcAT_S1ZzRQTj&sz=s800'; 
                    rewardName.innerText = 'เปลี่ยนเป็น 10 CC';

                    // Fade In: เด้งรูปลงมาใหม่
                    rewardImg.classList.remove('opacity-0', 'scale-50');
                    rewardImg.classList.add('scale-70'); 
                    rewardName.classList.remove('opacity-0');

                    // รอ Fade In เสร็จ (0.5 วิ)
                    await sleep(500);

                    // โชว์แจ้งเตือน
                    await Swal.fire({
                        icon: 'info',
                        title: 'อ๊ะ! คุณมีไอเท็มนี้แล้ว',
                        text: `เปลี่ยนเป็น Catcoin 10 CC อัตโนมัติ!`,
                        confirmButtonColor: '#f59e0b',
                        confirmButtonText: 'รับรางวัล',
                        customClass: { popup: 'rounded-[2rem]' }
                    });

                    // แอบเปลี่ยนข้อมูลของรางวัลให้กลายเป็น CatCoin เพื่อให้บันทึกเข้ากระเป๋าได้ถูกต้อง
                    window.app._pendingGachaReward = {
                        type: 'currency',
                        driveId: 'cc',
                        amount: 10,
                        name: 'CatCoin'
                    };

                    // โชว์ปุ่มรับรางวัล
                    claimBtn.classList.remove('opacity-0', 'pointer-events-none');

                } else {
                    // [กรณีได้ของใหม่] โชว์ปุ่มรับรางวัลตามปกติ
                    await sleep(500);
                    claimBtn.classList.remove('opacity-0', 'pointer-events-none');
                }
            },

            async closeGachaAnim() {
                const u = appState.user;
                const item = window.app._pendingGachaReward;

                // มอบของรางวัลให้ผู้เล่น
                if (item && u.role === 'student') {
                    Loader.show();
                    let updates = {};
                    
                    // ป้องกันบั๊ก Object ว่างเปล่า
                    if (!appState.user.unlocked_frames) appState.user.unlocked_frames = {};
                    if (!appState.user.catData) appState.user.catData = {};
                    if (!appState.user.catData.unlocked) appState.user.catData.unlocked = {};
                    if (!appState.user.catData.inventory) appState.user.catData.inventory = {};
                    if (!appState.user.items) appState.user.items = {};

                    // บันทึกของรางวัล (ถ้าได้ของซ้ำ โค้ดจะวิ่งไปเข้าหมวด currency อัตโนมัติ เพราะเราแอบเปลี่ยน type มันไว้ในขั้นตอนที่ 1 แล้ว)
                    if (['frame', 'cat_frame'].includes(item.type)) {
                        updates[`users/${u.uid}/unlocked_frames/${item.driveId}`] = true;
                        appState.user.unlocked_frames[item.driveId] = true; 
                        
                    } else if (['cat', 'bg'].includes(item.type)) {
                        updates[`users/${u.uid}/catData/unlocked/${item.driveId}`] = true;
                        appState.user.catData.unlocked[item.driveId] = true; 
                        
                    } else if (item.type === 'food') {
                        let foodKey = item.driveId; 
                        
                        if (!window.renderStore.catShop || Object.keys(window.renderStore.catShop).length === 0) {
                            const snap = await get(ref(db, 'cat_shop'));
                            window.renderStore.catShop = snap.exists() ? snap.val() : {};
                        }
                        for (const k in window.renderStore.catShop) {
                            if (window.renderStore.catShop[k].driveId === item.driveId) {
                                foodKey = k; break;
                            }
                        }

                        const cur = appState.user.catData.inventory[foodKey] || 0;
                        const finalAmt = cur + (item.amount || 1);
                        updates[`users/${u.uid}/catData/inventory/${foodKey}`] = finalAmt;
                        appState.user.catData.inventory[foodKey] = finalAmt; 
                        
                    } else if (item.type === 'currency') {
                        if (['cc', 'cd', 'ce'].includes(item.driveId)) {
                            const cur = appState.user.catData.inventory[item.driveId] || 0;
                            const finalAmt = cur + (item.amount || 1);
                            updates[`users/${u.uid}/catData/inventory/${item.driveId}`] = finalAmt;
                            appState.user.catData.inventory[item.driveId] = finalAmt; 
                        } else {
                            const cur = appState.user.items[item.driveId] || 0;
                            const finalAmt = cur + (item.amount || 1);
                            updates[`users/${u.uid}/items/${item.driveId}`] = finalAmt;
                            appState.user.items[item.driveId] = finalAmt; 
                        }
                    }
                    
                    await update(ref(db), updates);
                    Loader.hide();
                }

                // Reset Animation กลับเข้าสู่โหมดหน้าตู้ปกติ
                document.getElementById('gacha-reveal-state').classList.add('hidden');
                document.getElementById('gacha-reveal-state').classList.remove('flex');
                document.getElementById('gacha-card-inner').classList.remove('revealed');
                document.getElementById('gacha-reward-item').classList.add('scale-0', 'opacity-0');
                document.getElementById('gacha-reward-name').classList.add('opacity-0');
                document.getElementById('gacha-btn-claim').classList.add('opacity-0', 'pointer-events-none');
                document.getElementById('gacha-rays').classList.add('hidden');

                const floatingItem = document.getElementById('gacha-floating-item');
                floatingItem.classList.remove('gacha-shake', 'brightness-[1.5]', 'drop-shadow-[0_0_30px_rgba(255,255,255,1)]');
                floatingItem.classList.add('animate-gacha-float');

                const btnOpen = document.getElementById('gacha-btn-open');
                btnOpen.classList.remove('scale-90', 'opacity-0', 'pointer-events-none');

                // รีเฟรชหน้าจอ
                const bId = appState.activeGachaBanner;
                if (bId) {
                    document.getElementById('gacha-view-card-count').innerText = appState.user.gacha_cards?.[bId] || 0;
                    const banner = appState.gachaBanners[bId];
                    const pity = appState.user.gacha_pity?.[bId] || 0;
                    const maxPity = banner.pity || 50;
                    const pullsLeft = maxPity - pity;
                    const pityBox = document.getElementById('gacha-pity-counter');
                    if (pityBox) {
                        if (pullsLeft > 0) {
                            pityBox.innerHTML = `<span class="bg-red-500/90 text-white text-xs font-bold px-3.5 py-1.5 rounded-full shadow-lg backdrop-blur-md border border-red-400">⭐ การันตีในอีก ${pullsLeft} ครั้ง</span>`;
                        } else {
                            pityBox.innerHTML = `<span class="bg-green-500/90 text-white text-xs font-bold px-3.5 py-1.5 rounded-full shadow-lg backdrop-blur-md border border-green-400 animate-pulse">🌟 การันตีออกในการสุ่มครั้งนี้!</span>`;
                        }
                    }
                }
            },

                                    // หากเป็น Event (ราคาอาจจะ 0) หรือเป็นกรอบเสียเงิน ให้นำเข้าได้ แต่ห้ามระบุจำนวน
                                    amountContainer.style.display = 'none'; 
                                }
                            }
                            else if (type === 'cat' || type === 'bg') {
                                // แมว และ พื้นหลัง ห้ามระบุจำนวน
                                amountContainer.style.display = 'none';
                            }
                        };

                        itemSelect.addEventListener('change', updateUI);
                        updateUI(); 
                    },
                    preConfirm: () => {
                        const itemSelect = document.getElementById('edit-gacha-item-preset');
                        const selectedOpt = itemSelect.options[itemSelect.selectedIndex];
                        const rawVal = itemSelect.value;
                        
                        let type, driveId, name;

                        if (rawVal === 'custom') {
                            type = 'custom';
                            driveId = extractDriveId(document.getElementById('edit-gacha-item-driveid').value.trim());
                            name = document.getElementById('edit-gacha-item-name').value.trim();
                        } else {
                            const parts = rawVal.split('|');
                            type = parts[0];
                            driveId = parts[1];
                            name = parts[2];
                        }

                        if(!name || !driveId) { Swal.showValidationMessage('กรุณาเลือกไอเทมหรือระบุข้อมูลให้ครบถ้วน'); return false; }

                        const rarity = document.getElementById('edit-gacha-item-rarity').value;
                        const isGuarantee = document.getElementById('edit-gacha-item-guarantee').checked;
                        
                        // ตรวจสอบว่าช่อง Amount ถูกซ่อนไว้หรือไม่ (ถ้าถูกซ่อน = ให้เป็น null)
                        const amountContainer = document.getElementById('gacha-amount-container');
                        let amount = amountContainer.style.display === 'none' 
                            ? null 
                            : (parseInt(document.getElementById('edit-gacha-item-amount').value) || 1);

                        return { type, driveId, name, rarity, amount, isGuarantee };
                    }
                }).then(async (res) => {
                    if(res.isConfirmed) {
                        Loader.show();
                        const targetId = itemId || push(ref(db, `gacha_banners/${bId}/items`)).key;
                        await update(ref(db, `gacha_banners/${bId}/items/${targetId}`), res.value);
                        Loader.hide();
                        Toast.fire({ icon: 'success', title: 'บันทึกไอเทมลงตู้สุ่มสำเร็จแล้ว' });
                        this.manageGachaBannerItems(bId); 
                    }
                });
            }
            
        };

            handleAttachTypeChange: (val) => {

                const att = data.currentAtt;
                
                if (val === 'frame') {
                    let opts = '<option value="">เลือกกรอบ...</option>';
                    data.frames.forEach(v => { opts += `<option value="${v.driveId}" ${att && att.type==='frame' && att.itemId===v.driveId ? 'selected':''}>${v.name}</option>`; });
                    con.innerHTML = `<select id="attach-item-id" class="w-full p-2.5 border rounded-xl text-sm bg-white font-bold" required>${opts}</select>`;
                } else if (val === 'cat') {
                    let opts = '<option value="">เลือกแมว...</option>';
                    data.cats.forEach(v => { opts += `<option value="${v.driveId}" ${att && att.type==='cat' && att.itemId===v.driveId ? 'selected':''}>${v.name}</option>`; });
                    con.innerHTML = `<select id="attach-item-id" class="w-full p-2.5 border rounded-xl text-sm bg-white font-bold" required>${opts}</select>`;
                } else if (val === 'food') {
                    let opts = '<option value="">เลือกอาหาร...</option>';

                }
            },
            handleAttachStatusChange: (val) => {

                if(val === 'ตรวจแล้ว') { sec.style.display = 'block'; } 
                else { sec.style.display = 'none'; document.getElementById('attach-type').value = ''; document.getElementById('attach-value-container').innerHTML = ''; }
            },
            claimAssignmentGift: async (assignId) => {
                const uid = appState.user.uid;
                const sub = window.renderStore.submissions[assignId];
                if(!sub || !sub.attachment || sub.attachment.claimed) return;

                const att = sub.attachment;
                Loader.show();
                try {
                    let updates = {};
                    updates[`submissions/${assignId}/${uid}/attachment/claimed`] = true;

                    if(att.type === 'frame') {
                        updates[`users/${uid}/unlocked_frames/${att.itemId}`] = true;
                        appState.user.unlocked_frames = appState.user.unlocked_frames || {};
                        appState.user.unlocked_frames[att.itemId] = true;
                    } else if (att.type === 'cat' || att.type === 'bg') {
                        updates[`users/${uid}/catData/unlocked/${att.itemId}`] = true;
                        if(appState.user.catData) {
                            appState.user.catData.unlocked = appState.user.catData.unlocked || {};
                            appState.user.catData.unlocked[att.itemId] = true;
                        }
                    } else if (att.type === 'food') {
                        const cur = (appState.user.catData?.inventory?.[att.itemId]) || 0;
                        const addAmount = parseInt(att.amount) || 1;
                        updates[`users/${uid}/catData/inventory/${att.itemId}`] = cur + addAmount;
                        if(appState.user.catData) appState.user.catData.inventory[att.itemId] = cur + addAmount;
                    } else if (['cc', 'cd', 'ce'].includes(att.type)) {
                        const cur = (appState.user.catData?.inventory?.[att.type]) || 0;
                        const addAmount = parseInt(att.amount) || 0;
                        updates[`users/${uid}/catData/inventory/${att.type}`] = cur + addAmount;
                        if(appState.user.catData) appState.user.catData.inventory[att.type] = cur + addAmount;
                    }

                    await update(ref(db), updates);
                    window.renderStore.submissions[assignId].attachment.claimed = true;

                    Loader.hide();
                    Swal.fire({icon: 'success', title: 'สำเร็จ', text: `คุณได้รับ ${att.itemName} เรียบร้อยแล้ว!`, customClass: {popup: 'rounded-3xl'}});
                    Views.showAssignmentDetail(assignId); 
                } catch(e) {
                    Loader.hide();
                    Swal.fire({icon: 'error', title: 'Error', text: 'เกิดข้อผิดพลาดในการรับของ', customClass: {popup: 'rounded-3xl'}});
                }
            },
            
            loadStudentsForReward: () => Views.loadStudentsForReward(),
            submitReward: (i, a) => Views.submitReward(i, a),
            showEditProfile: () => Views.showEditProfile(), showChangePassword: () => Views.showChangePassword(),
            showClassroomManager: () => Views.showClassroomManager(),
            openClassroomModal: (isE, id, c, r) => Views.openClassroomModal(isE, id, c, r), deleteClassroom: (id, c, r) => Views.deleteClassroom(id, c, r),
            showClassroomDetail: (c, r) => Views.showClassroomDetail(c, r), openStudentModal: (isE, uid, c, r) => Views.openStudentModal(isE, uid, c, r),
            deleteStudent: (uid, c, r) => Views.deleteStudent(uid, c, r), handleExcelUpload: (e, c, r) => Views.handleExcelUpload(e, c, r),

            showBagModal: () => Views.showBagModal(), showFramesModal: () => Views.showFramesModal(), equipFrame: (url) => Views.equipFrame(url),
            showExchangeModal: () => Views.showExchangeModal(), showStudentProfileDetail: (uid) => Views.showStudentProfileDetail(uid),
            showRankCriteria: () => Views.showRankCriteria(),
            changeRankingCriteria: (c) => { appState.rankingCriteria = c; appState.rankingPage = 1; Views.renderHome(); },
            changeRankingPage: (dir) => { appState.rankingPage = (appState.rankingPage || 1) + dir; Views.renderLeaderboard(); },
            toggleTeacherProfile: () => Views.toggleTeacherProfile(), editHomeConfig: () => Views.editHomeConfig(),
            
            // Cat Room Specific Overlays
            switchCatRoomTab: (tab) => {
                document.querySelectorAll('.cr-nav-btn').forEach(btn => { btn.classList.remove('text-primary'); btn.classList.add('text-gray-500'); });
                document.getElementById(`cr-btn-${tab}`).classList.remove('text-gray-500');
                document.getElementById(`cr-btn-${tab}`).classList.add('text-primary');
                if(tab === 'main') Views.renderCatRoomMain();
                else if(tab === 'shop') Views.renderCatShop();
                else if(tab === 'profile') Views.renderCatProfile();
            },
            claimCatMining: (t) => Views.claimCatMining(t),
            setCatShopCategory: (cat) => { appState.catShopCategory = cat; Views.renderCatShop(); },
            buyCatShopItem: (k) => Views.buyCatShopItem(k),
            editCatShopItem: (k) => Views.editCatShopItem(k), deleteCatShopItem: (k) => Views.deleteCatShopItem(k),
            addCatShopItem: () => Views.addCatShopItem(),
            deleteCatShopItem: (k) => Views.deleteCatShopItem(k),
            feedCat: (id, h, hp) => Views.feedCat(id, h, hp),
            showEquipModal: (t) => Views.showEquipModal(t),
            equipCatItem: (t, id) => Views.equipCatItem(t, id),
            renameCat: () => Views.renameCat(),
            exchangeCatCurrency: () => Views.exchangeCatCurrency(),
            processCatExchange: (t) => Views.processCatExchange(t),

            setShopCategory: (cat) => { appState.shopActiveCategory = cat; Views.renderShop(); }, buyShopFrame: (k) => Views.buyShopFrame(k),
            addShopFrame: () => Views.addShopFrame(), editShopFrame: (k) => Views.editShopFrame(k), deleteShopFrame: (k) => Views.deleteShopFrame(k),
            toggleShopPriceInput: (cat, suf = '') => {
                const con = document.getElementById(`sh-price-container${suf}`);
                if (con) { if (cat === 'free' || cat === 'event') con.classList.add('hidden'); else con.classList.remove('hidden'); }
            },
            toggleLoginPassword: () => {
                const pwd = document.getElementById('login-password'); const icon = document.getElementById('toggle-password').querySelector('i');
                if (pwd.type === 'password') { pwd.type = 'text'; icon.classList.remove('ri-eye-line'); icon.classList.add('ri-eye-off-line'); } 
                else { pwd.type = 'password'; icon.classList.remove('ri-eye-off-line'); icon.classList.add('ri-eye-line'); }
            },
            setMyFramesCategoryUI: (cat, btn) => {
                appState.myFramesActiveCategory = cat;
                Array.from(document.getElementById('my-frames-categories').children).forEach(b => b.className = "px-4 py-1.5 bg-gray-100 text-gray-500 hover:text-dark text-xs font-bold rounded-xl shrink-0 transition");
                btn.className = "px-4 py-1.5 bg-primary text-white shadow-sm text-xs font-bold rounded-xl shrink-0 transition";
                window.app.filterMyFramesUI();
            },
            filterMyFramesUI: () => {
                const query = document.getElementById('my-frames-search')?.value.toLowerCase() || '';
                const act = appState.myFramesActiveCategory || 'all';
                document.querySelectorAll('#my-frames-grid .frame-item').forEach(item => {
                    const match = item.getAttribute('data-name').includes(query) && (act === 'all' || item.getAttribute('data-category') === act);
                    item.style.display = match ? 'flex' : 'none';
                });
            },
            setShopCategoryUI: (cat, btn) => {
                appState.shopActiveCategory = cat;
                document.querySelectorAll('.shop-cat-btn').forEach(b => b.className = "shop-cat-btn flex-1 py-2.5 text-xs font-bold rounded-xl transition text-gray-500 hover:text-dark");
                btn.className = "shop-cat-btn flex-1 py-2.5 text-xs font-bold rounded-xl transition bg-primary text-white shadow-md";
                window.app.filterShopUI();
            },
            filterShopUI: () => {
                const query = document.getElementById('shop-search')?.value.toLowerCase() || '';
                const act = appState.shopActiveCategory || 'free';
                document.querySelectorAll('#shop-grid .shop-item').forEach(item => {
                    const match = item.getAttribute('data-name').includes(query) && item.getAttribute('data-category') === act; 
                    item.style.display = match ? 'flex' : 'none';
                });
            },
            
            // --- GACHA CORE LOGIC ---
            startGachaPull: () => Views.startGachaPull(),
            claimGacha: () => Views.claimGacha()
        };

        document.getElementById('login-form').addEventListener('submit', window.app.login);

        Auth.initAdmin().then(() => { Auth.checkSession(); });

    </script>
</body>
</html>
