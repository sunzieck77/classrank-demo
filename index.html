    <style>
        :root {
            color-scheme: light;
        }
        /* Fixed Mobile App Viewport Constraints */
        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            background-color: #f3f4f6;
            color: #1f2937;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            display: flex;
            justify-content: center;
        }
        
        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: white;
            height: 100dvh;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.1);
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #f3f4f6;
        }

        .item-card-shadow { box-shadow: 0 4px 15px -3px rgba(39, 214, 245, 0.2); }

        @keyframes floatSlow {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }
        .animate-bounce-slow { animation: floatSlow 3.5s ease-in-out infinite; }

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 1000px 100%;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite;
            animation-name: shimmer;
            animation-timing-function: linear;
        }

        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }

        /* Floating Cat Background Animation (Login) */
        @keyframes bubbleFloat {
            0% { transform: translateY(110dvh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(-20dvh) rotate(360deg) scale(1.25); opacity: 0; }
        }
        .floating-cat-bg {
            position: absolute;
            bottom: -150px;
            color: rgba(147, 162, 255, 0.45);
            pointer-events: none;
            z-index: 0;
            animation: bubbleFloat 15s linear infinite;
        }

        /* AAA Gacha Animation Styles */
        .gacha-bg-pastel { background: radial-gradient(circle at 50% 30%, #fff, #ffe6f2 40%, #e6f7ff 80%, #f3e6ff 100%); }
        @keyframes gachaFloating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .animate-gacha-float { animation: gachaFloating 4s ease-in-out infinite; }
        
        .gacha-btn-gradient {
            background: linear-gradient(90deg, #FFF580, #B8FBFF, #FFB8DC);
            background-size: 200% 200%;
            animation: gachaLiquid 3s ease infinite;
        }
        @keyframes gachaLiquid { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        @keyframes bgStarFloat {
            0% { transform: translateY(110dvh) scale(var(--s)) rotate(0deg); opacity: 0; }
            10% { opacity: var(--o); }
            90% { opacity: var(--o); }
            100% { transform: translateY(-10dvh) scale(var(--s)) rotate(360deg); opacity: 0; }
        }
        .gacha-bg-star {
            position: absolute;
            bottom: -50px;
            color: white;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
            animation: bgStarFloat var(--d) linear infinite;
        }
        .gacha-shake { animation: gachaShake 0.1s linear infinite; }
        @keyframes gachaShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
        .gacha-rays {
            background: conic-gradient(from 0deg, rgba(255,251,214,0) 0deg, rgba(255,251,214,0.8) 20deg, rgba(255,251,214,0) 40deg, rgba(152,122,255,0) 60deg, rgba(152,122,255,0.8) 80deg, rgba(152,122,255,0) 100deg, rgba(27,145,255,0) 120deg, rgba(27,145,255,0.8) 140deg, rgba(27,145,255,0) 160deg, rgba(255,251,214,0.8) 180deg, rgba(255,251,214,0) 200deg, rgba(152,122,255,0.8) 220deg, rgba(152,122,255,0) 240deg, rgba(27,145,255,0.8) 260deg, rgba(27,145,255,0) 280deg, rgba(255,251,214,0.8) 300deg, rgba(255,251,214,0) 320deg, rgba(152,122,255,0.8) 340deg, rgba(152,122,255,0) 360deg);
            border-radius: 50%;
            filter: blur(8px);
            mix-blend-mode: screen;
            animation: spinRays 8s linear infinite;
        }
        @keyframes spinRays { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 3D Card Reveal */
        .gacha-perspective { perspective: 1200px; }
        .gacha-card-wrapper {
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotateY(-180deg) scale(0.5);
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.8));
        }
        .gacha-card-wrapper.revealed { transform: rotateY(0deg) scale(1); }
        .gacha-card-face {
            backface-visibility: hidden;
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
        }
        .gacha-card-back {
            transform: rotateY(180deg);
            background: #fff;
            box-shadow: 0 0 50px #fff;
            border-radius: 20px;
        }
        
        .gacha-particle {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center;
            mix-blend-mode: screen;
            animation: explosionBurst var(--d) cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }
        @keyframes explosionBurst {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--s)) rotate(var(--rot)); opacity: 0; }
        }

        /* Draggable Floating Cat */
        #floating-pet-widget {
            position: absolute;
            z-index: 45;
            touch-action: none;
            cursor: grab;
        }
        #floating-pet-widget:active { cursor: grabbing; }
        
        .pet-bubble {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>

        const CAT_ASSETS = {

        const RANK_DATA = [

        const processDailyCatStats = (catData) => {
            if (!catData) return null;
            const now = new Date();
            const last = new Date(catData.lastUpdate || Date.now());
            let data = { ...catData };

            // If a different calendar day
            if (now.toDateString() !== last.toDateString()) {
                // Drop hunger to 20-30% if it was high, else drop more
                let dropHunger = Math.floor(Math.random() * 11) + 70; // 70 to 80 drop
                data.hunger = Math.max(0, data.hunger - dropHunger);
                
                // Happiness drops 15-20%
                let dropHappy = Math.floor(Math.random() * 6) + 15;
                data.happiness = Math.max(0, data.happiness - dropHappy);

                if (data.hunger === 0) {
                    data.level = Math.max(1, data.level - 5);
                } else {
                    data.level += 2;
                }

                // Ready mining
                data.mining = {
                    cc: { ready: true, claimed: false },
                    cd: { ready: true, claimed: false },
                    ce: { ready: true, claimed: false }
                };

                data.lastUpdate = now.getTime();
            }
            return data;
        };

                const msg = greetings[Math.floor(Math.random() * greetings.length)];
                document.getElementById('pet-speech-text').textContent = msg;
                bubble.classList.remove('hidden');
                setTimeout(() => { bubble.classList.add('hidden'); }, 6500);

                // Basic drag functionality
                let isDragging = false;
                let startY, startX, initialTop, initialLeft;

                const startDrag = (e) => {
                    isDragging = true;
                    const evt = e.type.includes('mouse') ? e : e.touches[0];
                    startY = evt.clientY;
                    startX = evt.clientX;
                    const rect = widget.getBoundingClientRect();
                    initialTop = rect.top;
                    initialLeft = rect.left;
                    widget.style.bottom = 'auto'; // switch to top/left positioning
                    widget.style.right = 'auto';
                };

                const moveDrag = (e) => {
                    if (!isDragging) return;
                    e.preventDefault(); // prevent scroll
                    const evt = e.type.includes('mouse') ? e : e.touches[0];
                    const dy = evt.clientY - startY;
                    const dx = evt.clientX - startX;
                    
                    let newTop = initialTop + dy;
                    let newLeft = initialLeft + dx;
                    
                    // Constrain to screen
                    const maxTop = window.innerHeight - widget.offsetHeight - 70; // 70 nav height
                    const maxLeft = window.innerWidth - widget.offsetWidth;
                    newTop = Math.max(60, Math.min(newTop, maxTop));
                    newLeft = Math.max(0, Math.min(newLeft, maxLeft));

                    widget.style.top = `${newTop}px`;
                    widget.style.left = `${newLeft}px`;
                };

                const stopDrag = () => { isDragging = false; };

                widget.addEventListener('mousedown', startDrag);
                window.addEventListener('mousemove', moveDrag);
                window.addEventListener('mouseup', stopDrag);
                
                widget.addEventListener('touchstart', startDrag, {passive: false});
                window.addEventListener('touchmove', moveDrag, {passive: false});
                window.addEventListener('touchend', stopDrag);

                // Tap to talk
                widget.addEventListener('click', () => {
                    if(!isDragging) {
                        const msg = greetings[Math.floor(Math.random() * greetings.length)];
                        document.getElementById('pet-speech-text').textContent = msg;
                        bubble.classList.remove('hidden');
                        setTimeout(() => { bubble.classList.add('hidden'); }, 6000);
                    }
                });

            async renderLeaderboard() {
                const listContainer = document.getElementById('leaderboard-list');
                const pagContainer = document.getElementById('leaderboard-pagination');
                if (!listContainer || !pagContainer) return;

                const criteria = appState.rankingCriteria || 'cs';
                const page = appState.rankingPage || 1;
                const limit = 10;

                try {
                    const usersRef = ref(db, 'users');
                    const snap = await get(usersRef);
                    
                    let students = [];
                    if (snap.exists()) {
                        const allUsers = snap.val();
                        for (const uid in allUsers) {
                            const u = allUsers[uid];
                            if (u.role === 'student') {
                                students.push({ uid, ...u });
                            }
                        }
                    }

                    students.sort((a, b) => {
                        const scoreA = (a.items && a.items[criteria]) || 0;
                        const scoreB = (b.items && b.items[criteria]) || 0;
                        return scoreB - scoreA;
                    });

                    if (students.length === 0) {
                        listContainer.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">ยังไม่มีข้อมูลนักเรียนในระบบ</div>`;
                        pagContainer.innerHTML = '';
                        return;
                    }

                    const totalItems = students.length;
                    const totalPages = Math.ceil(totalItems / limit);
                    const currentPage = Math.min(Math.max(page, 1), totalPages);
                    appState.rankingPage = currentPage; 

                    const startIndex = (currentPage - 1) * limit;
                    const endIndex = Math.min(startIndex + limit, totalItems);
                    const pageData = students.slice(startIndex, endIndex);

                    let listHtml = '';
                    pageData.forEach((st, idx) => {
                        const absoluteRank = startIndex + idx + 1;
                        const score = (st.items && st.items[criteria]) || 0;
                        const avatar = st.profileImage || DEFAULT_AVATAR;
                        const currentFrame = getProfileFrame(st);
                        const displayN = st.displayName || st.fullName;
                        const catImg = st.catData?.equippedCat || CAT_ASSETS.starterCat;

                        const scoreIcon = criteria === 'cs' ? `<img src="${ITEM_IMAGES.cs}" class="w-5 h-5 object-contain">` : `<img src="${ITEM_IMAGES.ct}" class="w-5 h-5 object-contain">`;

                        listHtml += `
                            <div onclick="app.showStudentProfileDetail('${st.uid}')" class="p-2 sm:p-3.5 rounded-2xl border ${rankBg} flex items-center justify-between transition-all duration-200 shadow-sm cursor-pointer hover:border-primary/50 active:scale-[0.98]">
                                <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0 pr-2">
                                    <div class="w-6 sm:w-8 flex justify-center items-center shrink-0">
                                        ${rankBadge}
                                    </div>
                                    <div class="relative w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center shrink-0 select-none">
                                        <img src="${avatar}" 
                                             class="w-[90%] h-[90%] rounded-full object-cover bg-white shadow-inner"
                                             onerror="this.onerror=null; this.src='${DEFAULT_AVATAR}'"
                                             alt="${st.fullName}">
                                        <img src="${currentFrame}" class="absolute inset-0 w-full h-full pointer-events-none object-contain scale-[1.18]" alt="Profile Frame">
                                        <!-- Cat Mini Icon overlay -->
                                        <div class="absolute -right-2 -bottom-1 w-6 h-6 bg-white rounded-full p-0.5 shadow-sm border border-gray-100">
                                            <img src="https://drive.google.com/thumbnail?id=${catImg}&sz=s800" class="w-full h-full object-contain">
                                        </div>
                                    </div>
                                    <div class="min-w-0 flex-1 pl-1">
                                        <div class="font-bold text-xs sm:text-sm text-dark truncate">${displayN}</div>
                                        <div class="text-[9px] sm:text-[10px] text-gray-400 font-medium truncate">ม.${st.class}/${st.room} • เลขที่ ${st.number}</div>
                                    </div>

                                    <span>${score.toLocaleString()}</span>
                                    ${scoreIcon}
                                </div>
                            </div>
                        `;
                    });
                    listContainer.innerHTML = listHtml;

                    pagContainer.innerHTML = `
                        <button onclick="app.changeRankingPage(-1)" 
                                ${currentPage === 1 ? 'disabled class="text-gray-300 cursor-not-allowed px-3 py-1.5 rounded-lg text-xs font-bold"' : 'class="text-gray-600 hover:text-primary active:scale-95 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1"'} >

                            ถัดไป <i class="fa-solid fa-chevron-right"></i>

                } catch (error) {

            async showFramesModal() {
                const u = appState.user || {};
                const unlocked = u.unlocked_frames || {};
                const selectedFrame = getProfileFrame(u);

                try {
                    Loader.show();
                    const [shopSnap, catSnap] = await Promise.all([
                        get(ref(db, 'shop_frames')),
                        get(ref(db, 'cat_shop'))
                    ]);
                    Loader.hide();

                    let frames = [
                        { id: 'default', name: 'กรอบเริ่มต้น', driveId: '1QnONkq-Ygy7Vk_lL2hq8FGvb2LEFnhnK', category: 'free' }
                    ];

                    let allFrames = {};

                    // โหลดกรอบจาก shop_frames
                    if (shopSnap.exists()) {
                        Object.assign(allFrames, shopSnap.val());
                    }

                    // โหลดกรอบจาก cat_shop
                    if (catSnap.exists()) {
                        const catItems = catSnap.val();
                        Object.entries(catItems).forEach(([k,v]) => {

                            if(v.type === 'cat_frame'){

                                allFrames[k] = {
                                    ...v,
                                    category: v.category || 'reward'
                                };
                            }
                        });
                    }
                    // render frame ทั้งหมด
                    Object.entries(allFrames).forEach(([key, val]) => {

                        const driveId = val.driveId;

                        const isFree = val.category === 'free';

                        const isUnlocked =
                            unlocked[driveId] === true;

                        if (isFree || isUnlocked) {

                            if (!frames.some(f => f.driveId === driveId)) {

                                frames.push({
                                    id: key,
                                    name: val.name || 'กรอบรูป',
                                    driveId: driveId,
                                    category: val.category || 'reward'
                                });

                            }

                        }
                    });
                    

                    window.appState.myFramesActiveCategory = 'all';

            async showExchangeModal() {
                const u = appState.user || {};
                if (u.role === 'teacher') {
                    return Swal.fire({
                        icon: 'info',
                        title: 'ฟังก์ชันสำหรับนักเรียน',
                        text: 'บัญชีอาจารย์ไม่จำเป็นต้องใช้ระบบแลกเปลี่ยนไอเทม',
                        confirmButtonColor: '#27D6F5',
                        customClass: { popup: 'rounded-[2rem]' }
                    });
                }

                const items = u.items || { cs: 0, ct: 0, ticket: 0, sc: 0 };
                const currentCS = items.cs || 0;
                const currentSC = items.sc || 0;
                const maxCS = Math.floor(currentCS / 2) * 2;

                let modalContentHtml = `
                    <div class="text-left font-sans text-sm space-y-4 mt-2 max-h-[65vh] overflow-y-auto no-scrollbar pb-2">
                        <div class="flex items-center justify-between bg-gradient-to-r from-yellow-50/50 to-purple-50/50 p-4 rounded-2xl border border-gray-100 shadow-sm shrink-0">
                            <div class="flex flex-col items-center flex-1">
                                <img src="${ITEM_IMAGES.cs}" class="w-12 h-12 object-contain mb-1 drop-shadow-sm">
                                <span class="text-[10px] text-gray-400 font-bold uppercase">คุณมี</span>
                                <span class="font-extrabold text-amber-500">${currentCS.toLocaleString()} CS</span>
                            </div>
                            <div class="flex flex-col items-center justify-center px-2">
                                <div class="w-8 h-8 rounded-full bg-white shadow-sm border border-gray-100 flex items-center justify-center text-primary">
                                    <i class="ri-arrow-right-line text-lg animate-pulse"></i>
                                </div>
                                <span class="text-[9px] text-gray-400 font-bold mt-1">2 CS = 1,000 SC</span>
                            </div>
                            <div class="flex flex-col items-center flex-1">
                                <img src="${ITEM_IMAGES.sc}" class="w-12 h-12 object-contain mb-1 drop-shadow-sm">
                                <span class="text-[10px] text-gray-400 font-bold uppercase">คุณมี</span>
                                <span class="font-extrabold text-purple-600">${currentSC.toLocaleString()} SC</span>
                            </div>
                        </div>

                        ${maxCS < 2 ? `
                            <div class="p-3 bg-red-50 text-red-700 rounded-xl text-xs flex items-center gap-2 border border-red-100 font-semibold shrink-0">
                                <i class="fa-solid fa-circle-exclamation text-sm"></i>
                                <span>คุณต้องการ ClassStar อย่างน้อย 2 CS เพื่อทำการแลกเปลี่ยน S-Card</span>
                            </div>
                        ` : `

                            <div class="bg-gray-50/70 p-4 rounded-2xl border border-gray-100 space-y-4 shrink-0">
                                <div class="flex justify-between items-center">
                                    <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">ใส่จำนวนที่ต้องการ</span>
                                    <div class="flex items-center gap-1.5 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-sm">
                                        <input type="number" id="exch-cs-input" min="0" max="${maxCS}" step="2" value="2" class="w-12 text-center font-bold text-dark text-sm bg-transparent border-none outline-none focus:ring-0 p-0">
                                        <span class="text-xs text-gray-400 font-bold">CS</span>
                                    </div>
                                </div>
                                <div class="relative pt-1">
                                    <input type="range" id="exch-slider" min="2" max="${maxCS}" step="2" value="2" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-primary focus:outline-none">
                                </div>
                            </div>

                            <div class="bg-purple-50/50 p-4 rounded-2xl border border-purple-100 flex items-center justify-between shrink-0">
                                <div class="flex items-center gap-2">
                                    <img src="${ITEM_IMAGES.sc}" class="w-10 h-10 object-contain drop-shadow-sm animate-bounce">
                                    <div>
                                        <div class="text-[9px] text-purple-400 font-bold uppercase tracking-wider">สิทธิประโยชน์ที่ได้รับ</div>
                                        <div class="font-bold text-purple-950 text-xs">ได้รับทั้งหมด</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span id="exch-sc-gained" class="text-2xl font-extrabold text-purple-600">1,000</span>
                                    <span class="text-xs font-bold text-purple-500">SC</span>
                                </div>
                            </div>
                        `}
                    </div>
                `;

                const { value: csToExchange } = await Swal.fire({
                    title: '<span style="font-family: \'Kanit\'; font-weight: bold; color: #1f2937;">แลก S-Card</span>',
                    html: modalContentHtml,
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยันการแลกเปลี่ยน',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#27D6F5',
                    customClass: {
                        popup: 'rounded-[2rem] p-5 w-[95%] max-w-sm',
                        confirmButton: 'rounded-xl font-bold py-2.5 px-6',
                        cancelButton: 'rounded-xl font-bold py-2.5 px-6'
                    },
                    didOpen: () => {
                        if (maxCS < 2) return;
                        
                        const slider = document.getElementById('exch-slider');
                        const numInput = document.getElementById('exch-cs-input');
                        const gainedSpan = document.getElementById('exch-sc-gained');

                        const updateValues = (val) => {
                            let num = parseInt(val) || 0;
                            if (num > maxCS) num = maxCS;
                            if (num < 2) num = 2;
                            num = Math.round(num / 2) * 2;
                            if (num > maxCS) num = maxCS;

                            slider.value = num;
                            numInput.value = num;
                            
                            const gained = (num / 2) * 1000;
                            gainedSpan.innerText = gained.toLocaleString();
                        };

                        slider.addEventListener('input', (e) => updateValues(e.target.value));
                        numInput.addEventListener('change', (e) => updateValues(e.target.value));
                        numInput.addEventListener('keyup', (e) => {
                            if (e.key === 'Enter') {
                                updateValues(e.target.value);
                            }
                        });
                    },
                    preConfirm: () => {
                        if (maxCS < 2) {
                            Swal.showValidationMessage('คุณมี ClassStar ไม่เพียงพอสำหรับการแลกเปลี่ยน');
                            return false;
                        }
                        const numInput = document.getElementById('exch-cs-input');
                        const val = parseInt(numInput.value);
                        if (!val || val <= 0) {
                            Swal.showValidationMessage('กรุณากรอกจำนวน ClassStar ที่ต้องการแลก');
                            return false;
                        }
                        if (val % 2 !== 0) {
                            Swal.showValidationMessage('กรุณากรอกเฉพาะเลขคู่ (เช่น 2, 4, 6 ...)');
                            return false;
                        }
                        if (val > currentCS) {
                            Swal.showValidationMessage(`คุณมี ClassStar ไม่เพียงพอ (มี ${currentCS} CS)`);
                            return false;
                        }
                        return val;
                    }
                });

                if (csToExchange) {
                    Loader.show();
                    try {
                        const scGained = (csToExchange / 2) * 1000;
                        const newCS = currentCS - csToExchange;
                        const newSC = currentSC + scGained;

                        const updates = {};
                        updates[`users/${u.uid}/items/cs`] = newCS;
                        updates[`users/${u.uid}/items/sc`] = newSC;

                        await update(ref(db), updates);
                        appState.user.items.cs = newCS;
                        appState.user.items.sc = newSC;

                        Loader.hide();
                        Swal.fire({
                            icon: 'success',
                            title: 'แลกเปลี่ยนสำเร็จ!',
                            text: `ใช้ ${csToExchange} CS แลกรับ ${scGained.toLocaleString()} SC เรียบร้อยแล้ว`,
                            confirmButtonColor: '#27D6F5',
                            customClass: { popup: 'rounded-[2rem]' }
                        });
                        this.navigate('profile');
                    } catch (err) {
                        Loader.hide();
                        Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการแลกเปลี่ยนข้อมูล' });
                    }
                }
            },

                const sortedRanks = [...RANK_DATA].reverse();
                
                let html = '<div class="flex overflow-x-auto gap-4 pb-4 pt-2 px-2 snap-x snap-mandatory no-scrollbar" style="scroll-behavior: smooth;">';
                
                sortedRanks.forEach(r => {
                    html += `

            async renderStudentPersonalTasks(assignments) {
                const subContainer = document.getElementById('student-task-sub-content');
                if (!subContainer) return;

                let listHtml = '';
                if (Object.keys(assignments).length === 0) {
                    listHtml = `<div class="flex-1 flex flex-col items-center justify-center text-gray-400 pb-10"><i class="fa-regular fa-folder-open text-4xl mb-3 block"></i>ไม่มีงานที่สั่งในขณะนี้</div>`;
                } else {
                    const subsRef = ref(db, `submissions`);
                    const subSnap = await get(subsRef);
                    const allSubs = subSnap.exists() ? subSnap.val() : {};

                    window.renderStore.assignments = {};
                    window.renderStore.submissions = {};

                    let itemsHtml = '';
                    for (const [aId, aData] of Object.entries(assignments)) {
                        const mySub = allSubs[aId] && allSubs[aId][appState.user.uid] ? allSubs[aId][appState.user.uid] : { status: 'ยังไม่ส่ง', crystal: 0, note: '-' };
                        window.renderStore.assignments[aId] = aData;
                        window.renderStore.submissions[aId] = mySub;

                        let statusColor = 'bg-gray-100 text-gray-600';
                        if(mySub.status === 'ตรวจแล้ว') statusColor = 'bg-green-100 text-green-700';
                        if(mySub.status === 'ต้องแก้ไข') statusColor = 'bg-red-100 text-red-700';
                        if(mySub.status === 'รอตรวจ') statusColor = 'bg-yellow-100 text-yellow-700';

                        itemsHtml += `

            },

            async renderStudentAllTasks(assignments) {
                const subContainer = document.getElementById('student-task-sub-content');
                if (!subContainer) return;

                const assignIds = Object.keys(assignments);
                if (assignIds.length === 0) {
                    subContainer.innerHTML = `<div class="flex-1 flex flex-col items-center justify-center text-gray-400 pb-10"><i class="fa-regular fa-folder-open text-4xl mb-3 block"></i>ไม่มีงานที่สั่งในห้องเรียนขณะนี้</div>`;
                    return;
                }

                if (!appState.selectedTaskForView || !assignments[appState.selectedTaskForView]) {
                    appState.selectedTaskForView = assignIds[0];
                }

                const optionsHtml = assignIds.map(id => `
                    <option value="${id}" ${id === appState.selectedTaskForView ? 'selected' : ''}>${assignments[id].title}</option>
                `).join('');

                subContainer.innerHTML = `
                    <div class="shrink-0 px-5 mb-2">
                        <select id="student-all-task-select" onchange="app.changeSelectedTaskForView(this.value)" class="w-full p-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-primary transition font-bold text-dark shadow-sm">
                            ${optionsHtml}
                        </select>
                    </div>
                    <div id="student-list-container" class="flex-1 flex flex-col min-h-0 overflow-hidden w-full relative">
                        <div class="flex justify-center pt-8"><div class="w-8 h-8 border-4 border-primary border-t-accent rounded-full animate-spin"></div></div>
                    </div>
                `;

                await this.renderStudentAllTasksList(appState.selectedTaskForView);
            },

            async renderStudentAllTasksList(assignId) {
                const listContainer = document.getElementById('student-list-container');
                if (!listContainer) return;

                try {
                    const usersRef = ref(db, 'users');
                    const uSnap = await get(usersRef);
                    const allUsers = uSnap.exists() ? uSnap.val() : {};

                    let classmates = [];
                    const myClass = appState.user.class;
                    const myRoom = appState.user.room;

                    for (const uid in allUsers) {
                        const u = allUsers[uid];
                        if (u.role === 'student' && u.class === myClass && u.room === myRoom) {
                            classmates.push({ uid, ...u });
                        }
                    }

                    classmates.sort((a, b) => parseInt(a.number) - parseInt(b.number));
                    const subRef = ref(db, `submissions/${assignId}`);
                    const subSnap = await get(subRef);
                    const submissions = subSnap.exists() ? subSnap.val() : {};

                    if (classmates.length === 0) {
                        listContainer.innerHTML = `<div class="text-center py-6 text-gray-400 text-sm">ไม่พบรายชื่อเพื่อนร่วมห้อง</div>`;
                        return;
                    }

                    let html = `<div class="flex-1 overflow-y-auto no-scrollbar px-4 sm:px-5 pb-24 space-y-2">`;
                    classmates.forEach(st => {
                        const sub = submissions[st.uid] || { status: 'ยังไม่ส่ง' };
                        let statusColor = 'bg-gray-100 text-gray-600 border-gray-100';
                        if (sub.status === 'ตรวจแล้ว') statusColor = 'bg-green-50 text-green-700 border-green-200';
                        if (sub.status === 'ต้องแก้ไข') statusColor = 'bg-red-50 text-red-700 border-red-200';
                        if (sub.status === 'รอตรวจ') statusColor = 'bg-yellow-50 text-yellow-700 border-yellow-200';

                        const isSelf = st.uid === appState.user.uid;
                        const cardHighlight = isSelf ? 'border-primary shadow-sm bg-cyan-50/20' : 'border-gray-100 bg-white shadow-sm';
                        const avatar = st.profileImage || DEFAULT_AVATAR;
                        const currentFrame = getProfileFrame(st);

                        html += `
                            <div class="p-2.5 sm:p-3 rounded-xl border ${cardHighlight} flex items-center justify-between transition">
                                <div class="flex items-center gap-2 sm:gap-3 min-w-0 pr-2 flex-1">
                                    <span class="w-5 sm:w-6 text-center text-[10px] sm:text-[10px] font-bold text-gray-400 shrink-0">${st.number}</span>
                                    <div class="relative w-9 h-9 sm:w-11 sm:h-11 flex items-center justify-center shrink-0 select-none">
                                        <img src="${avatar}" class="w-[90%] h-[90%] rounded-full object-cover bg-white shadow-inner" onerror="this.onerror=null; this.src='${DEFAULT_AVATAR}'">
                                        <img src="${currentFrame}" class="absolute inset-0 w-full h-full pointer-events-none object-contain scale-[1.18]">
                                    </div>
                                    <div class="min-w-0 flex-1">
                                        <span class="font-bold text-[11px] sm:text-sm text-dark truncate ${isSelf ? 'text-primary' : ''} block">${st.fullName}</span>
                                        ${isSelf ? '<span class="px-1.5 py-0.5 bg-primary/15 text-primary text-[8px] font-bold rounded-md">คุณ</span>' : ''}
                                    </div>
                                </div>
                                <span class="${statusColor} shrink-0 px-2 sm:px-2.5 py-0.5 sm:py-1 rounded-full text-[9px] sm:text-xs font-bold border whitespace-nowrap">
                                    ${sub.status}
                                </span>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    listContainer.innerHTML = html;

                } catch (error) {
                    console.error("Error:", error);
                    listContainer.innerHTML = `<div class="text-center py-6 text-red-500 text-sm">เกิดข้อผิดพลาด</div>`;
                }
            },

                            <div class="flex justify-between items-center border-b pb-2">

            async loadTeacherAssignments() {
                const selectVal = document.getElementById('task-classroom-select').value;
                if(!selectVal) return Toast.fire({icon:'warning', title:'กรุณาเลือกห้องเรียน'});
                const [c, r] = selectVal.split('|');
                const classIdSafe = `${c}-${r}`.replace(/\./g, '_');
                
                Loader.show();
                const assignsRef = ref(db, `assignments/${classIdSafe}`);
                const snap = await get(assignsRef);
                Loader.hide();

                const container = document.getElementById('teacher-assignments-container');
                let html = `
                    <div class="shrink-0 px-5 pb-3 mb-2 flex justify-between items-center border-b border-gray-200">
                        <h3 class="font-bold text-dark">รายการงาน ${c}/${r}</h3>
                        <button onclick="app.createNewAssignment('${classIdSafe}')" class="bg-primary text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow hover:bg-cyan-400 transition active:scale-95"><i class="fa-solid fa-plus mr-1"></i>สั่งงานใหม่</button>
                    </div>
                `;

                if(!snap.exists()) {
                    html += `<div class="text-center py-8 mt-4 text-gray-400 text-sm border-2 border-dashed border-gray-200 rounded-xl mx-5">ยังไม่มีงานในห้องนี้</div>`;
                } else {
                    const data = snap.val();
                    window.renderStore.assignments = window.renderStore.assignments || {};

                    html += `<div class="flex-1 overflow-y-auto no-scrollbar px-5 pb-24 space-y-3">`;
                    for(const [id, a] of Object.entries(data)) {
                        window.renderStore.assignments[id] = a;
                        html += `
                            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                                <div class="flex justify-between items-start mb-2">
                                    <h4 class="font-bold text-sm truncate flex-1 pr-2">${a.title}</h4>
                                    <button onclick="app.deleteAssignment('${classIdSafe}', '${id}')" class="text-red-400 hover:text-red-600 transition active:scale-90 shrink-0"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                                <p class="text-xs text-gray-500 truncate mb-3">${a.detail}</p>
                                <button onclick="app.gradeAssignment('${c}', '${r}', '${id}')" class="w-full bg-secondary text-dark py-2 rounded-lg text-xs font-bold hover:bg-yellow-400 transition shadow-sm active:scale-[0.98]">
                                    <i class="fa-solid fa-clipboard-user mr-1"></i> ตรวจงานนักเรียน
                                </button>
                            </div>
                        `;
                    }
                    html += `</div>`;
                }
                container.innerHTML = html;
            },
            
            async createNewAssignment(classId) {
                const { value: formValues } = await Swal.fire({
                    title: '<span style="font-family: \'Kanit\'; font-weight: bold;">สั่งงานใหม่</span>',
                    html: `
                        <input id="swal-input1" class="swal2-input !w-[85%] !text-sm" placeholder="ชื่องาน">
                        <textarea id="swal-input2" class="swal2-textarea !w-[85%] !text-sm" placeholder="รายละเอียดงาน"></textarea>
                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'บันทึก',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' },
                    preConfirm: () => {
                        return [
                            document.getElementById('swal-input1').value,
                            document.getElementById('swal-input2').value
                        ]
                    }
                });

                if (formValues && formValues[0]) {
                    Loader.show();
                    const newRef = push(ref(db, `assignments/${classId}`));
                    await set(newRef, { title: formValues[0], detail: formValues[1], createdAt: Date.now() });
                    Loader.hide();
                    Toast.fire({icon:'success', title:'สร้างงานสำเร็จ'});
                    this.loadTeacherAssignments();
                }
            },
            
            async deleteAssignment(classId, assignId) {
                Swal.fire({
                    title: 'ต้องการลบงานนี้ใช่หรือไม่?',
                    text: 'ข้อมูลการส่งงานจะหายไปด้วยอย่างถาวร',
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#F5275B',
                    confirmButtonText: 'ลบงาน',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { popup: 'rounded-3xl' }
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        Loader.show();
                        await remove(ref(db, `assignments/${classId}/${assignId}`));
                        await remove(ref(db, `submissions/${assignId}`));
                        Loader.hide();
                        this.loadTeacherAssignments();
                    }
                });
            },

            async gradeAssignment(c, r, assignId) {
                const title = (window.renderStore.assignments[assignId] && window.renderStore.assignments[assignId].title) || 'ตรวจงาน';
                UI.setHeader('ตรวจงาน');
                const content = document.getElementById('content-area');
                content.innerHTML = UI.renderSkeleton('list');

                const usersRef = ref(db, 'users');
                const uSnap = await get(usersRef);
                const subRef = ref(db, `submissions/${assignId}`);
                const subSnap = await get(subRef);
                const submissions = subSnap.exists() ? subSnap.val() : {};

                let students = [];
                if(uSnap.exists()) {
                    const allUsers = uSnap.val();
                    for(const uid in allUsers) {
                        const u = allUsers[uid];
                        if(u.role === 'student' && u.class === c && u.room === r) {
                            students.push({uid, ...u});
                        }
                    }
                }
                students.sort((a,b) => parseInt(a.number) - parseInt(b.number));

                let listHtml = `
                    <div class="flex-1 flex flex-col w-full h-full min-h-0 overflow-hidden">
                        <div class="shrink-0 px-4 sm:px-5 pt-4 sm:pt-5 pb-2 sm:pb-3 border-b border-gray-200 flex items-center gap-2 sm:gap-3">
                            <button onclick="app.navigate('tasks')" class="text-gray-500 hover:text-dark bg-white w-8 h-8 sm:w-9 sm:h-9 rounded-full shadow-sm flex items-center justify-center shrink-0 border border-gray-100 transition active:scale-90"><i class="fa-solid fa-arrow-left"></i></button>
                            <div class="flex-1 min-w-0">
                                <h3 class="font-bold text-base sm:text-lg text-dark truncate leading-tight">${title}</h3>
                                <p class="text-[9px] sm:text-[10px] text-gray-500 font-bold tracking-wider uppercase mt-0.5">ตรวจงานห้อง ${c}/${r}</p>
                            </div>
                        </div>
                `;

                if(students.length === 0) {
                    listHtml += `<div class="flex-1 flex flex-col items-center justify-center text-gray-400 pb-10">ไม่พบรายชื่อนักเรียนในห้องนี้</div>`;
                } else {
                    listHtml += `<div class="flex-1 overflow-y-auto no-scrollbar px-4 sm:px-5 py-2 sm:py-3 pb-24 space-y-2.5 sm:space-y-3">`;
                    window.renderStore.students = window.renderStore.students || {};
                    window.renderStore.submissions = window.renderStore.submissions || {};

                    students.forEach(st => {
                        const sub = submissions[st.uid] || { status: 'รอตรวจ', crystal: 0, note: '' };
                        let stColor = sub.status === 'ตรวจแล้ว' ? 'text-green-500 border-green-200 bg-green-50' : (sub.status === 'ต้องแก้ไข' ? 'text-red-500 border-red-200 bg-red-50' : 'text-gray-400 border-gray-200 bg-white');
                        window.renderStore.students[st.uid] = st;
                        window.renderStore.submissions[`${assignId}_${st.uid}`] = sub;

                        listHtml += `
                            <div class="p-2.5 sm:p-3.5 rounded-xl border ${stColor} shadow-sm flex items-center justify-between transition-all" id="student-row-${st.uid}">
                                <div class="min-w-0 pr-2 flex-1">
                                    <div class="text-[9px] sm:text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-0.5">เลขที่ ${st.number}</div>

            async buyShopFrame(frameKey) {
                const u = appState.user || {};
                const frame = window.renderStore.shopFrames[frameKey];
                if (!frame) return;

                const price = parseInt(frame.price) || 0;
                const currentSC = (u.items && u.items.sc) || 0;
                const driveId = frame.driveId;

                if (currentSC < price) {
                    return Swal.fire({
                        icon: 'error',
                        title: 'ยอด S-Card ไม่พอ',
                        text: `คุณต้องการ ${price.toLocaleString()} SC แต่ตอนนี้คุณมีเพียง ${currentSC.toLocaleString()} SC เท่านั้น`,
                        confirmButtonColor: '#F5275B',
                        customClass: { popup: 'rounded-3xl' }
                    });
                }

                const confirmResult = await Swal.fire({
                    title: 'ต้องการซื้อกรอบนี้ใช่หรือไม่?',
                    text: `ใช้จำนวน ${(price).toLocaleString()} SC เพื่อปลดล็อกกรอบ "${frame.name}"`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยันการซื้อ',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (confirmResult.isConfirmed) {
                    Loader.show();
                    try {
                        const newSC = currentSC - price;
                        const updates = {};
                        updates[`users/${u.uid}/items/sc`] = newSC;
                        updates[`users/${u.uid}/unlocked_frames/${driveId}`] = true;

                        await update(ref(db), updates);
                        appState.user.items.sc = newSC;
                        appState.user.unlocked_frames = appState.user.unlocked_frames || {};
                        appState.user.unlocked_frames[driveId] = true;

                        Loader.hide();
                        await Swal.fire({
                            icon: 'success',
                            title: 'ปลดล็อกสำเร็จ!',
                            text: `ทำการซื้อสิทธิ์สวมใส่กรอบ "${frame.name}" เรียบร้อยแล้ว`,
                            confirmButtonColor: '#27D6F5',
                            customClass: { popup: 'rounded-3xl' }
                        });
                        this.renderShop();

                    } catch(err) {
                        Loader.hide();
                        Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในขั้นตอนการทำธุรกรรม' });
                    }
                }
            },

            async startGachaPull() {
                const u = appState.user || {};
                const currentTickets = (u.items && u.items.ticket) || 0;

                if (currentTickets < 1 && u.role === 'student') {
                    return Swal.fire({
                        icon: 'warning',
                        title: 'ไม่มีตั๋วสุ่ม Gacha',
                        text: 'คุณต้องมี Gacha Ticket อย่างน้อย 1 ใบในการสุ่ม',
                        confirmButtonColor: '#27D6F5',
                        customClass: { popup: 'rounded-[2rem]' }
                    });
                }

                if (u.role === 'student') {
                    const newTicketCount = currentTickets - 1;
                    await set(ref(db, `users/${u.uid}/items/ticket`), newTicketCount);
                    appState.user.items.ticket = newTicketCount;
                    document.getElementById('gacha-ticket-balance').innerText = newTicketCount;
                }

                // รีเซ็ตการ์ดให้คว่ำลงก่อนเผื่อค้างจากรอบที่แล้ว
                const cardInner = document.getElementById('gacha-card-inner');
                if (cardInner) cardInner.classList.remove('revealed');

                // Weighted Randomize Reward
                const rand = Math.random() * 100;
                let sum = 0;
                let reward = GACHA_REWARDS[0]; // fallback
                for (let r of GACHA_REWARDS) {
                    sum += r.weight;
                    if (rand <= sum) {
                        reward = r;
                        break;
                    }
                }
                
                // Clone Object ป้องกันการแก้ไขข้อมูลต้นทาง
                reward = { ...reward };
                window.currentGachaReward = reward;
                
                // Clear old image early to prevent flashing & Apply dynamic card background based on rarity
                document.getElementById('gacha-reward-item').src = "";
                document.getElementById('gacha-card-bg').src = `https://drive.google.com/thumbnail?id=${reward.cardImg}&sz=s800`;
                
                // 1. Hide Button smoothly
                document.getElementById('gacha-btn-open').classList.add('scale-90', 'opacity-0', 'pointer-events-none');
                await sleep(300);

                // 2. Overlay & Shaking Ticket
                document.getElementById('gacha-gold-overlay').classList.remove('hidden');
                document.getElementById('gacha-gold-overlay').classList.add('opacity-100');
                
                const ticketImg = document.getElementById('gacha-ticket');
                ticketImg.classList.remove('animate-gacha-float');
                ticketImg.classList.add('gacha-shake', 'brightness-[1.5]', 'drop-shadow-[0_0_30px_rgba(255,255,255,1)]');
                
                // 3. Radial Rays
                document.getElementById('gacha-rays').classList.remove('hidden');

                await sleep(1500); // Wait for shaking climax

                // 4. White Flash
                const flash = document.getElementById('gacha-flash');
                flash.classList.remove('hidden');
                flash.classList.add('opacity-100');

                await sleep(400);

                // 5. Change state to Reveal during flash
                document.getElementById('gacha-idle-state').classList.add('hidden');
                document.getElementById('gacha-reveal-state').classList.remove('hidden', 'opacity-0');
                document.getElementById('gacha-reveal-state').classList.add('flex');
                document.getElementById('gacha-gold-overlay').classList.add('hidden');
                
                flash.classList.remove('opacity-100');
                flash.classList.add('opacity-0');

                await sleep(300);
                flash.classList.add('hidden');
                
                // 6. Flip Card Animation
                cardInner.classList.add('revealed');

                await sleep(1000); // Wait for flip transition

                // 7. Particle Explosion
                this.createGachaParticles();

                // 8. Reveal Items & Text (ดัดแปลงเพิ่มแอนิเมชันของซ้ำที่นี่)
                const rewardItemImg = document.getElementById('gacha-reward-item');
                const rewardName = document.getElementById('gacha-reward-name');
                const claimBtn = document.getElementById('gacha-btn-claim');
                
                // เพิ่ม transition เตรียมไว้สำหรับทำแอนิเมชัน Fade เข้า/ออก
                rewardItemImg.classList.add('transition-all', 'duration-500', 'ease-in-out');
                rewardName.classList.add('transition-all', 'duration-500', 'ease-in-out');

                // ใส่ Cache buster ให้รูปโชว์เสมอ
                const cacheBuster = new Date().getTime();
                rewardItemImg.src = `https://drive.google.com/thumbnail?id=${reward.img || reward.driveId}&sz=s800&t=${cacheBuster}`;
                
                rewardItemImg.classList.remove('scale-0', 'opacity-0');
                rewardItemImg.classList.add('scale-100', 'opacity-100');

                rewardName.innerText = reward.name;
                rewardName.classList.remove('opacity-0');
                
                // ตรวจสอบว่าไอเท็มที่สุ่มได้ ผู้เล่นมีแล้วหรือยัง?
                let isDuplicate = false;
                let checkId = reward.img || reward.driveId;

                if (['frame', 'cat_frame'].includes(reward.type)) {
                    if (appState.user.unlocked_frames && appState.user.unlocked_frames[checkId]) isDuplicate = true;

                    if (appState.user.catData && appState.user.catData.unlocked && appState.user.catData.unlocked[checkId]) isDuplicate = true;
                }

                if (isDuplicate) {
                    // [กรณีได้ของซ้ำ] 
                    // 1. ให้เวลาเด็กได้ดีใจดูไอเท็มแป๊บนึง (1.5 วินาที)
                    await sleep(1500);

                    // 2. เริ่ม Fade Out (ย่อรูปภาพและข้อความให้หายไป)
                    rewardItemImg.classList.remove('scale-100');
                    rewardItemImg.classList.add('scale-50', 'opacity-0');
                    rewardName.classList.add('opacity-0');

                    // 3. รอให้ภาพหายไปสนิท 0.5 วินาที
                    await sleep(500);

                    // 4. เปลี่ยนภาพและข้อความเป็น CatCoin
                    rewardItemImg.src = `https://drive.google.com/thumbnail?id=1uDb_-PIaIlLMwfWu6ZRNcAT_S1ZzRQTj&sz=s800`; // Link รูป CC ของคุณ
                    rewardName.innerText = '10 CatCoin (ไอเท็มซ้ำ)';

                    // 5. เริ่ม Fade In (เด้งภาพ CatCoin ขึ้นมา)
                    rewardItemImg.classList.remove('opacity-0', 'scale-50');
                    rewardItemImg.classList.add('scale-100');
                    rewardName.classList.remove('opacity-0');

                    // 6. รอให้ภาพ CatCoin เด้งเสร็จ 0.5 วินาที
                    await sleep(500);

                    // 7. แจ้งเตือนเด้งให้ทราบ
                    await Swal.fire({
                        icon: 'info',
                        title: 'คุณมีไอเท็มนี้แล้ว!',
                        text: `ระบบได้เปลี่ยน ${reward.name} เป็น 10 CatCoin ให้โดยอัตโนมัติ 🪙`,
                        confirmButtonColor: '#f59e0b',

                    // 8. แอบแก้ไขตัวแปรรางวัล ให้เปลี่ยนเป็น CC เพื่อให้ฟังก์ชันกดรับ (claimGacha) เซฟเข้ากระเป๋าได้ถูกต้อง
                    reward.type = 'currency';
                    reward.driveId = 'cc';
                    reward.amount = 10;
                    reward.name = 'CatCoin';
                    window.currentGachaReward = reward;

                    // 9. แสดงปุ่มให้กดรับรางวัล
                    claimBtn.classList.remove('opacity-0', 'pointer-events-none');
                } else {

            createGachaParticles() {
                const container = document.getElementById('gacha-reveal-particles');
                container.innerHTML = ''; // clear old

                const particleCount = 40;
                for (let i = 0; i < particleCount; i++) {
                    const p = document.createElement('div');
                    p.className = 'gacha-particle';
                    
                    // Shape: Mix of 4-point and 5-point stars
                    p.innerHTML = Math.random() > 0.5 ? '<i class="ri-sparkling-fill"></i>' : '<i class="fa-solid fa-star"></i>';
                    
                    // Physics properties
                    const angle = Math.random() * 360;
                    const distance = 100 + Math.random() * 250; // Random spread distance (px)
                    const tx = Math.cos(angle * Math.PI / 180) * distance;
                    const ty = Math.sin(angle * Math.PI / 180) * distance;
                    
                    const size = 0.5 + Math.random() * 1.5;
                    const duration = 1 + Math.random() * 2; // 1s to 3s fade out
                    const rot = (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 360);

                    // Colors & Glow
                    p.style.color = Math.random() > 0.5 ? '#fff' : '#ffe28a';
                    p.style.filter = `drop-shadow(0 0 ${2 + Math.random() * 5}px rgba(255,255,255,0.8))`;
                    
                    p.style.setProperty('--tx', `${tx}px`);
                    p.style.setProperty('--ty', `${ty}px`);
                    p.style.setProperty('--s', size);
                    p.style.setProperty('--rot', `${rot}deg`);
                    p.style.setProperty('--d', `${duration}s`);
                    
                    container.appendChild(p);
                }
            },

            async loadStudentsForReward() {
                const selectVal = document.getElementById('rw-classroom-select').value;
                const itemType = document.getElementById('rw-item').value;
                const amount = parseInt(document.getElementById('rw-amount').value);

                if(!selectVal || !itemType || !amount || amount <= 0) return Toast.fire({icon:'warning', title:'กรอกข้อมูลให้ครบถ้วนและถูกต้อง'});

                const [c, r] = selectVal.split('|');

                Loader.show();
                const usersRef = ref(db, 'users');
                const uSnap = await get(usersRef);
                Loader.hide();

                let students = [];
                if(uSnap.exists()) {
                    const allUsers = uSnap.val();
                    for(const uid in allUsers) {
                        const u = allUsers[uid];
                        if(u.role === 'student' && u.class === c && u.room === r) {
                            students.push({uid, ...u});
                        }
                    }
                }
                students.sort((a,b) => parseInt(a.number) - parseInt(b.number));

                let html = `<div class="shrink-0 px-5 pb-2"><h4 class="font-bold text-sm text-gray-500">เลือกนักเรียนที่ต้องการให้ของรางวัล</h4></div>`;
                if(students.length===0) {
                    html += `<div class="flex-1 flex items-center justify-center text-sm text-red-400 font-medium py-4">ไม่พบรายชื่อนักเรียนในห้องเรียนนี้</div>`;
                } else {
                    html += `<div class="flex-1 overflow-y-auto no-scrollbar px-5 pb-2 space-y-2">`;
                    students.forEach(st => {
                        html += `
                            <label class="flex items-center p-3 bg-white border border-gray-100 rounded-xl shadow-sm cursor-pointer hover:border-primary/50 transition">
                                <input type="checkbox" class="rw-checkbox mr-3 w-5 h-5 accent-primary rounded-lg" value="${st.uid}">
                                <div class="flex-1 min-w-0">
                                    <div class="text-xs text-gray-400 font-bold uppercase tracking-wider mb-0.5">เลขที่ ${st.number}</div>
                                    <div class="font-bold text-sm text-dark truncate">${st.fullName}</div>
                                </div>
                            </label>
                        `;
                    });
                    html += `</div>`;
                    html += `<div class="shrink-0 px-5 pb-24 pt-3"><button onclick="app.submitReward('${itemType}', ${amount})" class="w-full bg-gradient-to-r from-primary to-blue-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-cyan-200 transition active:scale-95">ยืนยันการแจกรางวัล</button></div>`;
                }
                document.getElementById('rw-student-list').innerHTML = html;
            },

            async submitReward(itemVal, amount) {
                const checkboxes = document.querySelectorAll('.rw-checkbox:checked');
                if(checkboxes.length === 0) return Toast.fire({icon:'warning', title:'กรุณาเลือกนักเรียนอย่างน้อย 1 คน'});

                Loader.show();
                const [type, itemCategory, driveId, itemName] = itemVal.split('|');

                try {
                    for (let cb of checkboxes) {
                        const uid = cb.value;

                        if (type === 'currency') {
                            // ให้สกุลเงินเข้าตัวโดยตรง
                            const currencyType = itemCategory;
                            const itemRef = ref(db, `users/${uid}/items/${currencyType}`);
                            const snap = await get(itemRef);
                            await set(itemRef, (snap.exists() ? snap.val() : 0) + amount);
                        } else if (type === 'item') {
                            // ส่งไอเทมเข้าจดหมาย
                            const mailRef = ref(db, `mailbox/${uid}`);
                            const mailSnap = await get(mailRef);
                            const currentMails = mailSnap.exists() ? mailSnap.val() : {};
                            
                            // เช็คโควต้า 10 ฉบับ
                            if (Object.keys(currentMails).length >= 10) {
                                continue; // ข้ามคนนี้ไปถ้ากล่องจดหมายเต็ม
                            }

                            await push(mailRef, {
                                itemCategory: itemCategory,
                                driveId: driveId,
                                itemName: itemName,
                                amount: amount,
                                timestamp: Date.now()
                            });
                        }
                    }
                    
                    Toast.fire({icon:'success', title: 'แจกรางวัลสำเร็จ'});
                    document.getElementById('rw-student-list').innerHTML = '';
                    document.getElementById('rw-amount').value = '1';
                } catch(e) {
                    Toast.fire({icon:'error', title:'เกิดข้อผิดพลาด'});
                }
                Loader.hide();
            },

                                value="${appState.user.displayName || appState.user.fullName || ''}" 
                                maxlength="20" 
                                placeholder="ใส่ชื่อเท่ๆ ของคุณ"
                            >
                        </div>

                        <div class="text-left text-sm space-y-2 mb-3">
                            <label class="text-xs text-gray-500 font-bold">
                                ลิ้งก์รูปโปรไฟล์ (Google Drive Link หรือ URL รูปปกติ)
                            </label>
                            <input 
                                id="swal-pfp" 
                                class="swal2-input !w-[90%] !text-sm !mt-0"
                                value="${appState.user.profileImage || ''}"
                                placeholder="วางลิงก์ Google Drive Link หรือ URL รูปปกติ" 
                            >
                        </div>

                        <div class="text-left text-sm space-y-2">
                            <label class="text-xs text-gray-500 font-bold">
                                ลิ้งก์รูปปก (Google Drive Link หรือ URL รูปปกติ)
                            </label>
                            <input 
                                id="swal-banner" 
                                class="swal2-input !w-[90%] !text-sm !mt-0"
                                value="${appState.user.bannerImage || ''}"
                                placeholder="วางลิงก์ Google Drive Link หรือ URL รูปปกติ"
                            >
                        </div>

                        <p class="animate-pulse animate-infinite animate-ease-in-out text-[14px] text-red-400 mt-6 text-left px-4">
                           <i class="ri-error-warning-fill"></i> จะต้องเป็น Google Drive Link ที่เป็นสาธารณะเท่านั้น หรือ Image URL ที่ตรงๆ เท่านั้น (เช่น https://example.com/image.jpg) ไม่รองรับลิงก์จากเว็บฝากรูปทั่วไปที่มีหน้าแสดงรูปอีกที
                        </p>
                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'บันทึก',
                    cancelButtonText: 'ยกเลิก',
                    customClass: {
                        popup: 'rounded-3xl'
                    },

                    preConfirm: () => {
                        const dname = document.getElementById('swal-dname')
                            .value
                            .trim()
                            .substring(0, 20);

                        const pfpInput = document.getElementById('swal-pfp')
                            .value
                            .trim();

                        const bannerInput = document.getElementById('swal-banner')
                            .value
                            .trim();

                        // helper
                        const parseImageUrl = (url, size = 's800') => {

                            if (!url) return '';

                            // ถ้าเป็น Google Drive
                            if (
                                url.includes('drive.google.com') ||
                                /^[a-zA-Z0-9_-]{20,}$/.test(url)
                            ) {

                                const driveId = extractDriveId(url);

                                return `https://drive.google.com/thumbnail?id=${driveId}&sz=${size}`;
                            }

                            // ถ้าเป็น image url ปกติ
                            return url;
                        };

                        return {
                            dname,
                            profileImage: parseImageUrl(pfpInput, 's800') || DEFAULT_AVATAR,
                            bannerImage: parseImageUrl(bannerInput, 's1600')
                        };
                    }
                });

                if (formValues) {
                    Loader.show();

                    try {

                        await update(ref(db, `users/${appState.user.uid}`), {
                            displayName: formValues.dname,
                            profileImage: formValues.profileImage,
                            bannerImage: formValues.bannerImage
                        });

                        // sync state
                        appState.user.displayName = formValues.dname;
                        appState.user.profileImage = formValues.profileImage;
                        appState.user.bannerImage = formValues.bannerImage;

                        Loader.hide();

                        Toast.fire({
                            icon: 'success',
                            title: 'อัปเดตโปรไฟล์สำเร็จ'
                        });

                        this.renderProfile();

                    } catch (e) {

                        console.error(e);

                        Loader.hide();

                        Toast.fire({
                            icon: 'error',
                            title: 'เกิดข้อผิดพลาด'
                        });
                    }
                }

                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' },
                    preConfirm: () => {
                        const c = document.getElementById('cr-class').value;
                        const r = document.getElementById('cr-room').value;
                        if (!r || r <= 0) {
                            Swal.showValidationMessage('กรุณากรอกหมายเลขห้องให้ถูกต้อง');
                            return false;
                        }
                        return { class: c, room: r };
                    }
                });

                if (formValues) {
                    Loader.show();
                    const newId = `${formValues.class}-${formValues.room}`.replace(/\./g, '_');
                    
                    if (isEdit && currentId && currentId !== newId) {
                        await remove(ref(db, `classrooms/${currentId}`));
                        
                        const usersRef = ref(db, 'users');
                        const snap = await get(usersRef);
                        let updates = {};
                        if(snap.exists()) {
                            for(const uid in snap.val()) {
                                const u = snap.val()[uid];
                                if(u.class === currentC && u.room === currentR) {
                                    updates[`users/${uid}/class`] = formValues.class;
                                    updates[`users/${uid}/room`] = formValues.room;
                                }
                            }
                        }
                        if(Object.keys(updates).length > 0) {
                            await update(ref(db), updates);
                        }
                    }

                    await set(ref(db, `classrooms/${newId}`), {
                        class: formValues.class,
                        room: formValues.room,
                        updatedAt: Date.now()
                    });
                    
                    Loader.hide();
                    Toast.fire({icon: 'success', title: isEdit ? 'อัปเดตห้องเรียนสำเร็จ' : 'เพิ่มห้องเรียนสำเร็จ'});

            async deleteClassroom(id, c, r) {
                Swal.fire({
                    title: 'ยืนยันการลบ?',
                    html: `<p class="text-sm text-gray-600 mt-2">คุณต้องการลบห้อง <b>${c}/${r}</b> ใช่หรือไม่?<br><br><span class="text-red-500 font-bold bg-red-50 p-2 rounded-lg block"><i class="fa-solid fa-triangle-exclamation"></i> บัญชีนักเรียนในห้องนี้จะถูกลบทั้งหมด</span></p>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#F5275B',
                    confirmButtonText: 'ใช่, ลบข้อมูล',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { popup: 'rounded-3xl' }
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        Loader.show();
                        await remove(ref(db, `classrooms/${id}`));
                        
                        const usersRef = ref(db, 'users');
                        const snap = await get(usersRef);
                        
                        if(snap.exists()) {
                            let updates = {};
                            for(const uid in snap.val()) {
                                const u = snap.val()[uid];
                                if(u.role === 'student' && u.class === c && u.room === r) {
                                    updates[`users/${uid}`] = null;
                                }
                            }
                            if(Object.keys(updates).length > 0) {
                                await update(ref(db), updates);
                            }
                        }
                        Loader.hide();
                        Toast.fire({icon: 'success', title: 'ลบห้องเรียนสำเร็จ'});
                        this.showClassroomManager();
                    }
                });
            },

            async handleExcelUpload(event, c, r) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    Loader.show();
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const excelData = XLSX.utils.sheet_to_json(firstSheet, {header: 1}); 
                        
                        let added = 0;
                        let skipped = 0;
                        
                        const usersRef = ref(db, 'users');
                        const snap = await get(usersRef);
                        const existingUsers = snap.exists() ? snap.val() : {};

                        for(let i=1; i<excelData.length; i++) { 
                            const row = excelData[i];
                            if(row && row.length >= 3) {
                                const num = row[0];
                                const sId = String(row[1]).trim();
                                const name = row[2];

                                if(sId && name) {
                                    let isDuplicate = false;
                                    for(const key in existingUsers) {
                                        if(existingUsers[key].studentId === sId) {
                                            isDuplicate = true;
                                            break;
                                        }
                                    }

                                    if(!isDuplicate) {
                                        const newRef = push(ref(db, `users`));
                                        await set(newRef, {
                                            role: 'student', class: c, room: r,
                                            number: num, studentId: sId, fullName: name,
                                            password: hashStr('00000'), 
                                            profileImage: DEFAULT_AVATAR,
                                            items: {cs:0, ct:0, ticket:0, sc:0}
                                        });
                                        added++;
                                    } else {
                                        skipped++;
                                    }
                                }
                            }
                        }
                        
                        if (added > 0) {
                            Toast.fire({icon:'success', title:`นำเข้าสำเร็จ ${added} คน (ข้ามซ้ำ ${skipped} คน)`});
                        } else if (skipped > 0) {
                            Swal.fire({title: 'แจ้งเตือน', text: `พบรหัสนักเรียนซ้ำในระบบทั้งหมด ${skipped} คน ไม่มีข้อมูลใหม่ถูกเพิ่ม`, icon: 'warning', confirmButtonColor: '#27D6F5', customClass: {popup: 'rounded-3xl'}});
                        } else {
                            Toast.fire({icon:'info', title:'ไม่มีข้อมูลถูกนำเข้า โปรดตรวจสอบไฟล์'});
                        }
                    } catch(err) {
                        console.error(err);
                        Swal.fire({title: 'Error', text: 'รูปแบบไฟล์ไม่ถูกต้อง คอลัมน์ต้องเป็น: เลขที่ | รหัสนักเรียน | ชื่อสกุล', icon: 'error', confirmButtonColor: '#27D6F5', customClass: {popup: 'rounded-3xl'}});
                    }
                    Loader.hide();
                    this.showClassroomDetail(c, r);
                };
                reader.readAsArrayBuffer(file);
                event.target.value = ''; // Reset input
            },
