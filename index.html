            async renderShop() {
                UI.setHeader('ตลาดซื้อขายและร้านค้า');
                const content = document.getElementById('content-area');
                const isTeacher = appState.user.role === 'teacher';
                const tab = appState.shopTab || 'market'; 
                const u = appState.user || {};
                const myCards = u.my_cards || {};

                Loader.show();
                let marketData = {};
                let allFrames = {};

                try {
                    if (tab === 'market' || tab === 'manage') {
                        // โหลดข้อมูลตลาด (Marketplace)
                        const snap = await get(ref(db, 'market/listings'));
                        if (snap.exists()) marketData = snap.val();
                    } else if (tab === 'frames') {
                        // โหลดข้อมูลร้านขายกรอบโปรไฟล์ (Shop Frames)
                        const shopRef = ref(db, 'shop_frames');
                        let snap = await get(shopRef);

                        if (!snap.exists()) {
                            const defaultFrames = {
                                "free_1": { driveId: "1QnONkq-Ygy7Vk_lL2hq8FGvb2LEFnhnK", name: "กรอบเริ่มต้นน้ำเงิน", category: "free", price: 0, isLimited: false },
                                "rare_1": { driveId: "1PKnOS-SBOyctWPlt4rzcEfxINHC2M4Od", name: "กรอบออร่าส้ม", category: "rare", price: 1500, isLimited: false },
                                "rare_2": { driveId: "1c6NFzUS8PV0ult83La1L-BTtVnoJmdEt", name: "กรอบนีออนคราม", category: "rare", price: 1800, isLimited: false },
                                "event_1": { driveId: "1eoJs2mDQfZK-UvVMkhMp0Qifb9YNkiMS", name: "กรอบอีเวนต์ฮาโลวีน", category: "event", price: 0, isLimited: true },
                                "reward_1": { driveId: "1TmQy6AIwuNMhwN1zQHU1jNUHrqWWuU-O", name: "กรอบแชมป์ ClassStar", category: "reward", price: 4500, isLimited: false }
                            };
                            await set(shopRef, defaultFrames);
                            snap = await get(shopRef);
                        }
                        allFrames = snap.val() || {};
                        window.renderStore.shopFrames = allFrames;
                    }
                } catch(e) {
                    console.error("Error loading shop data:", e);
                }
                Loader.hide();

                let contentHtml = '';

                if (tab === 'market') {
                    // --- 1. ตลาดส่วนกลาง (Marketplace) ---
                    
                    // กำหนดค่าเริ่มต้นให้กับตัวแปรการค้นหาและฟิลเตอร์ (หากยังไม่มี)
                    if (typeof window.hideMyMarketListings === 'undefined') window.hideMyMarketListings = true;
                    if (typeof appState.marketSearchCard === 'undefined') appState.marketSearchCard = '';
                    if (typeof appState.marketSearchSeller === 'undefined') appState.marketSearchSeller = '';
                    if (typeof appState.marketFilterGrade === 'undefined') appState.marketFilterGrade = 'all';

                    let listings = Object.entries(marketData);

                    // [กรองขั้นที่ 1] ซ่อนรายการของฉัน
                    if (window.hideMyMarketListings) {
                        listings = listings.filter(([_, data]) => data.sellerId !== u.uid);
                    }

                    // [กรองขั้นที่ 2] ค้นหาชื่อการ์ด, ชื่อผู้ขาย และ ระดับการ์ด (Grade)
                    listings = listings.filter(([_, data]) => {
                        // ค้นชื่อการ์ด
                        const cardName = data.cardName ? String(data.cardName).toLowerCase() : '';
                        const matchesCardName = appState.marketSearchCard === '' || cardName.includes(appState.marketSearchCard.toLowerCase());
                        
                        // ค้นชื่อผู้ขาย
                        const sellerName = data.sellerName ? String(data.sellerName).toLowerCase() : '';
                        const matchesSellerName = appState.marketSearchSeller === '' || sellerName.includes(appState.marketSearchSeller.toLowerCase());
                        
                        // ฟิลเตอร์ระดับการ์ด
                        let matchesGrade = true;
                        if (appState.marketFilterGrade !== 'all') {
                            const currentGrade = data.cardGrade ? String(data.cardGrade).toUpperCase() : '';
                            if (appState.marketFilterGrade === 'SPECIAL') {
                                matchesGrade = currentGrade.includes('SPECIAL') || currentGrade.includes('พิเศษ') || data.isSpecial === true;
                            } else {
                                matchesGrade = currentGrade.startsWith(appState.marketFilterGrade);
                            }
                        }

                        return matchesCardName && matchesSellerName && matchesGrade;
                    });
                    
                    // สร้าง UI ควบคุม (เพิ่มปุ่มค้นหา และปุ่มล้างข้อมูล)
                    let filterControlHtml = `
                        <div class="col-span-3 bg-white p-2.5 rounded-xl border border-gray-100 shadow-sm mb-1 space-y-2">

            async sellMarketCard() {
                const cardId = document.getElementById('sell-card-id').value;
                const priceStr = document.getElementById('sell-price').value;
                const password = document.getElementById('sell-password').value.trim();
                
                const price = parseInt(priceStr);
                if (!cardId) return Toast.fire({icon: 'warning', title: 'กรุณาเลือกการ์ดที่ต้องการขาย'});
                if (isNaN(price) || price <= 0) return Toast.fire({icon: 'warning', title: 'กรุณาระบุราคาที่ถูกต้อง'});

                const u = appState.user;
                if ((u.my_cards[cardId] || 0) < 1) {
                    return Toast.fire({icon: 'error', title: 'การ์ดในคลังไม่เพียงพอ'});
                }

                Loader.show();
                try {
                    // สร้าง ID แบบสุ่มเพื่อให้ไม่ซ้ำ
                    const listingId = 'list_' + Date.now() + '_' + Math.floor(Math.random()*10000);
                    const listingData = {
                        sellerId: u.uid,
                        sellerName: u.displayName || 'ผู้เล่นนิรนาม',
                        cardId: cardId,
                        price: price,
                        password: password || null,
                        timestamp: Date.now()
                    };

                    let updates = {};
                    
                    // 1. หักการ์ดออกจากคลัง
                    const remain = u.my_cards[cardId] - 1;
                    if (remain <= 0) {
                        updates[`users/${u.uid}/my_cards/${cardId}`] = null;
                        delete appState.user.my_cards[cardId];
                    } else {
                        updates[`users/${u.uid}/my_cards/${cardId}`] = remain;
                        appState.user.my_cards[cardId] = remain;
                    }
                    
                    // 2. เพิ่มรายการลงฐานข้อมูลตลาด
                    updates[`market/cards/${listingId}`] = listingData;

                    await update(ref(db), updates);
                    Loader.hide();
                    
                    Swal.fire({
                        icon: 'success', 
                        title: 'ลงขายสำเร็จ', 
                        text: 'การ์ดของคุณเข้าสู่ตลาดส่วนกลางแล้ว', 
                        confirmButtonColor: '#4F46E5',
                        customClass: { popup: 'rounded-3xl' }
                    });
                    this.renderShop();
                } catch(e) {
                    Loader.hide();
                    Toast.fire({icon: 'error', title: 'เกิดข้อผิดพลาดในการลงขาย'});
                }
            },

            async buyMarketCard(listingId) {
                Loader.show();
                try {
                    // 1. ดึงข้อมูลจาก Path หลักของตลาด (market/listings)
                    const marketRef = ref(db, `market/listings/${listingId}`);
                    const snap = await get(marketRef);
                    if (!snap.exists()) {
                        Loader.hide();
                        Swal.fire('ผิดพลาด', 'ไม่พบสินค้า การ์ดนี้อาจถูกผู้เล่นอื่นซื้อไปแล้ว หรือผู้ขายยกเลิกการขาย', 'error');
                        return;
                    }
                    const data = snap.val();
                    Loader.hide();

                    const u = appState.user;

                    // ป้องกันการซื้อของตัวเอง
                    if (u.uid === data.sellerId) {
                        return Toast.fire({icon: 'warning', title: 'คุณไม่สามารถซื้อการ์ดของตัวเองได้'});
                    }

                    // เช็กรหัสผ่าน (ถ้ามีการตั้งไว้)
                    if (data.code) { 
                        const { value: inputPass } = await Swal.fire({
                            title: '<span class="text-red-500"><i class="fa-solid fa-lock"></i> สินค้าถูกล็อกรหัส</span>',
                            html: '<p class="text-sm text-gray-500 mb-2">กรุณากรอกรหัสผ่านที่ได้รับจากผู้ขาย</p>',
                            input: 'text',
                            inputPlaceholder: 'กรอกรหัสผ่าน',
                            showCancelButton: true,
                            confirmButtonText: 'ยืนยันรหัส',
                            cancelButtonText: 'ยกเลิก',
                            confirmButtonColor: '#4F46E5',
                            customClass: { popup: 'rounded-3xl' }
                        });
                        
                        if (inputPass === undefined) {
                            Loader.hide();
                            return; // ผู้ใช้กดยกเลิก
                        }
                        
                        if (!inputPass || inputPass !== data.code) {
                            return Swal.fire({
                                icon: 'error', 
                                title: 'รหัสผ่านไม่ถูกต้อง', 
                                text: 'ไม่สามารถซื้อการ์ดใบนี้ได้ เนื่องจากรหัสผ่านผิดพลาด',
                                customClass: { popup: 'rounded-3xl' }
                            });
                        }
                    }

                    // คำนวณราคารวมทั้งหมด (ราคาต่อหน่วย x จำนวน)
                    const totalQty = parseInt(data.quantity) || 1;
                    const totalPrice = data.price * totalQty;

                    // เช็กเงิน S-Card (SC)
                    const currentSC = (u.items && u.items.sc) || 0;
                    if (currentSC < totalPrice) {
                        return Swal.fire({
                            icon: 'error', 
                            title: 'S-Card (SC) ไม่พอ', 
                            text: `คุณต้องการอีก ${(totalPrice - currentSC).toLocaleString()} SC เพื่อซื้อสินค้านี้`, 
                            customClass: { popup: 'rounded-3xl' }
                        });
                    }

                    // ยืนยันการซื้อครั้งสุดท้าย
                    const confirm = await Swal.fire({
                        title: 'ยืนยันการทำรายการ',
                        html: `ซื้อการ์ด <b>${data.cardName}</b> (จำนวน ${totalQty} ใบ)<br>ราคารวม <span class="text-orange-500 font-bold">${totalPrice.toLocaleString()} SC</span> ใช่หรือไม่?`,
                        showCancelButton: true,
                        confirmButtonColor: '#10B981',
                        confirmButtonText: 'ยืนยันการซื้อ',
                        cancelButtonText: 'ยกเลิก',
                        customClass: { popup: 'rounded-3xl' }
                    });

                    if (confirm.isConfirmed) {
                        Loader.show();
                        
                        // เช็กข้อมูลซ้ำอีกครั้งก่อนทำรายการป้องกันคนอื่นแย่งซื้อ
                        const checkSnap = await get(ref(db, `market/listings/${listingId}`));
                        if (!checkSnap.exists()) {
                            Loader.hide();
                            return Swal.fire({icon: 'error', title: 'เสียใจด้วย!', text: 'การ์ดนี้เพิ่งถูกซื้อไปเมื่อสักครู่', customClass: { popup: 'rounded-3xl' }});
                        }

                        // ดึง SC ของผู้ขายเพื่อเตรียมโอนเงินให้
                        const sellerSnap = await get(ref(db, `users/${data.sellerId}/items/sc`));
                        const sellerSC = sellerSnap.exists() ? parseInt(sellerSnap.val()) || 0 : 0;

                        let updates = {};
                        
                        // 1. หัก SC คนซื้อ
                        updates[`users/${u.uid}/items/sc`] = currentSC - totalPrice;
                        if(!u.items) u.items = {};
                        u.items.sc = currentSC - totalPrice;

                        // แยกแยะคลังเก็บการ์ดและไอเทมพิเศษให้ตรงประเภท
                        let cardPath = 'my_cards';
                        let targetKey = data.cardKey || btoa(data.cardImage).replace(/=/g, '_');

                        if (targetKey.startsWith('item_')) {
                            cardPath = 'special_items';
                        }

                        // ดึงจำนวนปัจจุบันจากคลังที่ถูกต้องของผู้ซื้อ
                        const myCurrentInventory = u[cardPath] || {};
                        const myCurrentCardAmt = myCurrentInventory[targetKey] || 0;
                        
                        // 2. เพิ่มการ์ดเข้าคลังผู้ซื้อใน Firebase
                        updates[`users/${u.uid}/${cardPath}/${targetKey}`] = myCurrentCardAmt + totalQty;
                        
                        // อัปเดตข้อมูลใน Local State
                        if(!u[cardPath]) u[cardPath] = {};
                        u[cardPath][targetKey] = myCurrentCardAmt + totalQty;

                        // 3. เพิ่ม SC ให้ผู้ขาย
                        updates[`users/${data.sellerId}/items/sc`] = sellerSC + totalPrice;

                        // 4. ลบสินค้านี้ออกจากตลาดกลาง
                        updates[`market/listings/${listingId}`] = null;

                        // 🌟 5. ดึงประวัติเก่าของผู้ขายมาจัดการเพื่อควบคุมขนาดให้ไม่เกิน 10 แถว
                        const historySnap = await get(ref(db, `users/${data.sellerId}/sales_history`));
                        let currentHistory = historySnap.exists() ? Object.entries(historySnap.val()) : [];
                        
                        // ข้อมูลประวัติใบใหม่
                        const newHistoryKey = push(ref(db, `users/${data.sellerId}/sales_history`)).key;
                        const newHistoryData = {
                            cardName: data.cardName,
                            cardImage: data.cardImage,
                            quantity: totalQty,
                            totalPrice: totalPrice,
                            buyerName: u.displayName || u.fullName || 'ผู้เล่นนิรนาม',
                            buyerImage: u.profileImage || '',
                            timestamp: Date.now()
                        };

                        // ใส่ข้อมูลใบใหม่เข้าไปในอาร์เรย์ประวัติก่อนคำนวณตัดแถว
                        currentHistory.push([newHistoryKey, newHistoryData]);

                        // เรียงลำดับจากเก่าไปใหม่ตามเวลา (Timestamp น้อยไปมาก) เพื่อเตรียมปัดแถวที่เก่าเกินออก
                        currentHistory.sort((a, b) => (a[1].timestamp || 0) - (b[1].timestamp || 0));

                        // หากมีความยาวตั้งแต่แถวที่ 11 ขึ้นไป ให้กำหนดให้ตัวเก่าสุดเป็น null (เป็นการลบทิ้งในระบบ Firebase update)
                        if (currentHistory.length > 10) {
                            const itemsToDelete = currentHistory.slice(0, currentHistory.length - 10);
                            itemsToDelete.forEach(([oldKey, _]) => {
                                updates[`users/${data.sellerId}/sales_history/${oldKey}`] = null;
                            });
                        }

                        // เพิ่มประวัติแถวใหม่ล่าสุดเข้าไปในคำสั่ง updates
                        updates[`users/${data.sellerId}/sales_history/${newHistoryKey}`] = newHistoryData;

                        // ส่งข้อมูลทั้งหมดไปเซฟใน Firebase ทีเดียวแบบปลอดภัย (Atomic Update)
                        await update(ref(db), updates);
                        Loader.hide();

                        Swal.fire({
                            icon: 'success', 
                            title: 'สั่งซื้อสำเร็จ!', 
                            text: `การ์ด ${data.cardName} จำนวน ${totalQty} ใบ ถูกส่งเข้าคลังของคุณแล้ว`, 
                            confirmButtonColor: '#10B981',
                            customClass: { popup: 'rounded-3xl' }
                        });
                        
                        // เรียก Render หน้าจอใหม่ทั้งหมดเพื่อให้ข้อมูลอัปเดตทันที
                        if (typeof Views !== 'undefined' && typeof Views.renderShop === 'function') {
                            Views.renderShop();
                        } else {
                            this.renderShop();
                        }
                    }
                } catch(e) {
                    Loader.hide();
                    console.error("Buy error:", e);
                    Toast.fire({icon: 'error', title: 'ระบบขัดข้อง โปรดลองใหม่'});
                }
            },

            async cancelMarketCard(listingId) {
                const confirm = await Swal.fire({
                    title: 'ยกเลิกการขาย',
                    text: 'การ์ดใบนี้จะถูกนำกลับเข้าคลังของคุณ ยืนยันหรือไม่?',
                    showCancelButton: true,
                    confirmButtonColor: '#EF4444',
                    confirmButtonText: 'ดึงกลับ',
                    cancelButtonText: 'ปิด',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (confirm.isConfirmed) {
                    Loader.show();
                    try {
                        // ดึงข้อมูลรายการจากตลาดออนไลน์
                        const snap = await get(ref(db, `market/listings/${listingId}`));
                        
                        if (snap.exists()) {
                            const data = snap.val();
                            const u = appState.user;
                            
                            let updates = {};
                            
                            // ⭐ [จุดแก้ไขสำคัญ] เช็กประเภทการ์ดเพื่อสลับ Path คลังสินค้าให้ถูกต้องตามโครงสร้าง
                            // ถ้าไอดีการ์ดขึ้นต้นด้วย 'item_' หรือเป็นไอเท็มพิเศษ ให้ปรับปลายทางเป็น 'special_items'
                            let cardPath = 'my_cards';
                            if (data.cardKey && (data.cardKey.startsWith('item_') || (u.special_items && u.special_items[data.cardKey] !== undefined))) {
                                cardPath = 'special_items';
                            }

                            // คืนการ์ดให้ผู้ใช้ (ดึงจำนวนปัจจุบันจากคลังที่ถูกต้อง แล้วบวกเพิ่มตามจำนวนที่ตั้งขายไว้ data.quantity)
                            const currentCardAmt = (u[cardPath] && u[cardPath][data.cardKey]) || 0;
                            
                            // 1. เพิ่มจำนวนกลับเข้าคลังของผู้เล่นใน Firebase ตาม Path ที่ถูกต้อง
                            updates[`users/${u.uid}/${cardPath}/${data.cardKey}`] = currentCardAmt + data.quantity;
                            
                            // 2. อัปเดตจำนวนการ์ดใน Local State (appState) ของหน้าเว็บให้ถูกต้องแม่นยำ
                            if (!u[cardPath]) u[cardPath] = {};
                            u[cardPath][data.cardKey] = currentCardAmt + data.quantity;
                            
                            // 3. ลบข้อมูลรายการสินค้าใบนี้ออกตลาดออนไลน์
                            updates[`market/listings/${listingId}`] = null;

                            // บันทึกคำสั่ง Multi-path update ขึ้นระบบพร้อมกัน
                            await update(ref(db), updates);
                            
                            Loader.hide();
                            Toast.fire({icon: 'success', title: 'ดึงการ์ดกลับเข้าคลังแล้ว'});
                            
                            // 4. สั่งสั่งรีเฟรชหน้าจอแสดงผล UI ใหม่ทั้งหมดเพื่อให้จำนวนเลขอัปเดตตามจริงทันที
                            this.renderShop(); 
                            if (typeof this.renderCardInventory === 'function') this.renderCardInventory();
                            if (typeof this.renderMyCards === 'function') this.renderMyCards();

            async buyShopFrame(frameKey) {
                const u = appState.user || {};
                const frame = window.renderStore.shopFrames[frameKey];
                if (!frame) return;

                const price = parseInt(frame.price) || 0;
                const currentSC = (u.items && u.items.sc) || 0;
                const driveId = frame.driveId;

                if (currentSC < price) {
                    return Swal.fire({
                        icon: 'error',
                        title: 'ยอด S-Card ไม่พอ',
                        text: `คุณต้องการ ${price.toLocaleString()} SC แต่ตอนนี้คุณมีเพียง ${currentSC.toLocaleString()} SC เท่านั้น`,
                        confirmButtonColor: '#F5275B',
                        customClass: { popup: 'rounded-3xl' }
                    });
                }

                const confirmResult = await Swal.fire({
                    title: 'ต้องการซื้อกรอบนี้ใช่หรือไม่?',
                    text: `ใช้จำนวน ${(price).toLocaleString()} SC เพื่อปลดล็อกกรอบ "${frame.name}"`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยันการซื้อ',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (confirmResult.isConfirmed) {
                    Loader.show();
                    try {
                        const newSC = currentSC - price;
                        const updates = {};
                        updates[`users/${u.uid}/items/sc`] = newSC;
                        updates[`users/${u.uid}/unlocked_frames/${driveId}`] = true;

                        await update(ref(db), updates);
                        appState.user.items.sc = newSC;
                        appState.user.unlocked_frames = appState.user.unlocked_frames || {};
                        appState.user.unlocked_frames[driveId] = true;

                        Loader.hide();
                        await Swal.fire({
                            icon: 'success',
                            title: 'ปลดล็อกสำเร็จ!',
                            text: `ทำการซื้อสิทธิ์สวมใส่กรอบ "${frame.name}" เรียบร้อยแล้ว`,
                            confirmButtonColor: '#27D6F5',
                            customClass: { popup: 'rounded-3xl' }
                        });
                        this.renderShop();

                    } catch(err) {
                        Loader.hide();
                        Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในขั้นตอนการทำธุรกรรม' });
                    }
                }
            },

            async startGachaPull() {
                const u = appState.user || {};
                const currentTickets = (u.items && u.items.ticket) || 0;

                if (currentTickets < 1 && u.role === 'student') {
                    return Swal.fire({
                        icon: 'warning',
                        title: 'ไม่มีตั๋วสุ่ม Gacha',
                        text: 'คุณต้องมี Gacha Ticket อย่างน้อย 1 ใบในการสุ่ม',
                        confirmButtonColor: '#27D6F5',
                        customClass: { popup: 'rounded-[2rem]' }
                    });
                }

                if (u.role === 'student') {
                    const newTicketCount = currentTickets - 1;
                    await set(ref(db, `users/${u.uid}/items/ticket`), newTicketCount);
                    appState.user.items.ticket = newTicketCount;
                    document.getElementById('gacha-ticket-balance').innerText = newTicketCount;
                }

                // รีเซ็ตการ์ดให้คว่ำลงก่อนเผื่อค้างจากรอบที่แล้ว
                const cardInner = document.getElementById('gacha-card-inner');
                if (cardInner) cardInner.classList.remove('revealed');

                // Weighted Randomize Reward
                const rand = Math.random() * 100;
                let sum = 0;
                let reward = GACHA_REWARDS[0]; // fallback
                for (let r of GACHA_REWARDS) {
                    sum += r.weight;
                    if (rand <= sum) {
                        reward = r;
                        break;
                    }
                }
                
                // Clone Object ป้องกันการแก้ไขข้อมูลต้นทาง
                reward = { ...reward };
                window.currentGachaReward = reward;
                
                // Clear old image early to prevent flashing & Apply dynamic card background based on rarity
                document.getElementById('gacha-reward-item').src = "";
                
                // [แก้ไขที่ 1: รองรับ URL ทั่วไปสำหรับรูปพื้นหลังของการ์ด]
                let bgSource = reward.cardImg || '1TjXV2MeCjbCXqSppl_lda6IFxq_bg0Cj';
                document.getElementById('gacha-card-bg').src = bgSource.startsWith('http') 
                    ? bgSource 
                    : `https://drive.google.com/thumbnail?id=${bgSource}&sz=s800`;
                
                // 1. Hide Button smoothly
                document.getElementById('gacha-btn-open').classList.add('scale-90', 'opacity-0', 'pointer-events-none');
                await sleep(300);

                // 2. Overlay & Shaking Ticket
                document.getElementById('gacha-gold-overlay').classList.remove('hidden');
                document.getElementById('gacha-gold-overlay').classList.add('opacity-100');
                
                const ticketImg = document.getElementById('gacha-ticket');
                ticketImg.classList.remove('animate-gacha-float');
                ticketImg.classList.add('gacha-shake', 'brightness-[1.5]', 'drop-shadow-[0_0_30px_rgba(255,255,255,1)]');
                
                // 3. Radial Rays
                document.getElementById('gacha-rays').classList.remove('hidden');

                await sleep(1500); // Wait for shaking climax

                // 4. White Flash
                const flash = document.getElementById('gacha-flash');
                flash.classList.remove('hidden');
                flash.classList.add('opacity-100');

                await sleep(400);

                // 5. Change state to Reveal during flash
                document.getElementById('gacha-idle-state').classList.add('hidden');
                document.getElementById('gacha-reveal-state').classList.remove('hidden', 'opacity-0');
                document.getElementById('gacha-reveal-state').classList.add('flex');
                document.getElementById('gacha-gold-overlay').classList.add('hidden');
                
                flash.classList.remove('opacity-100');
                flash.classList.add('opacity-0');

                await sleep(300);
                flash.classList.add('hidden');
                
                // 6. Flip Card Animation
                cardInner.classList.add('revealed');

                await sleep(1000); // Wait for flip transition

                // 7. Particle Explosion
                this.createGachaParticles();

                // 8. Reveal Items & Text 
                const rewardItemImg = document.getElementById('gacha-reward-item');
                const rewardName = document.getElementById('gacha-reward-name');
                const claimBtn = document.getElementById('gacha-btn-claim');
                
                // เพิ่ม transition เตรียมไว้สำหรับทำแอนิเมชัน Fade เข้า/ออก
                rewardItemImg.classList.add('transition-all', 'duration-500', 'ease-in-out');
                rewardName.classList.add('transition-all', 'duration-500', 'ease-in-out');

                // [แก้ไขที่ 2: รองรับ URL รูปภาพทั่วไปสำหรับไอเทมที่สุ่มได้]
                const cacheBuster = new Date().getTime();
                let rImage = reward.img || reward.driveId || '';
                let finalRewardImg = ITEM_IMAGES.sc; // Fallback ป้องกันรูปพัง
                
                if (rImage.startsWith('http')) {
                    finalRewardImg = rImage; // ถ้าเป็น HTTP/HTTPS (เช่น Cloudinary) ใช้ตรงๆ เลย
                } else if (rImage.length > 10) {
                    finalRewardImg = `https://drive.google.com/thumbnail?id=${rImage}&sz=s800&t=${cacheBuster}`; // ถ้าเป็น Drive ID
                } else {
                    finalRewardImg = ITEM_IMAGES[rImage] || CAT_ASSETS[rImage] || ITEM_IMAGES.sc; // ของระบบ
                }
                
                rewardItemImg.src = finalRewardImg;
                
                rewardItemImg.classList.remove('scale-0', 'opacity-0');
                rewardItemImg.classList.add('scale-100', 'opacity-100');

                rewardName.innerText = reward.name;
                rewardName.classList.remove('opacity-0');
                
                // ตรวจสอบว่าไอเท็มที่สุ่มได้ ผู้เล่นมีแล้วหรือยัง?
                let isDuplicate = false;
                let checkId = reward.img || reward.driveId;

                // [แก้ไขที่ 3: เช็คของซ้ำเฉพาะของสวมใส่ (กรอบ, แมว, พื้นหลัง)] 
                // หมายเหตุ: หาก reward.type === 'card' จะไม่เข้าเงื่อนไขนี้ และ isDuplicate จะเป็น false ทำให้ได้การ์ดสะสมซ้ำได้
                if (['frame', 'cat_frame'].includes(reward.type)) {
                    if (appState.user.unlocked_frames && appState.user.unlocked_frames[checkId]) isDuplicate = true;
                } else if (['cat', 'bg'].includes(reward.type)) {
                    if (appState.user.catData && appState.user.catData.unlocked && appState.user.catData.unlocked[checkId]) isDuplicate = true;

                if (isDuplicate) {
                    // [กรณีได้ของซ้ำที่ "ไม่ใช่การ์ด"]

                        text: `ระบบได้เปลี่ยน ${reward.name} เป็น 10 CatCoin ให้โดยอัตโนมัติ 🪙`,

                        customClass: { popup: 'rounded-[2rem]' }

                    // แอบแก้ไขตัวแปรรางวัล ให้เปลี่ยนเป็น CC เพื่อให้ฟังก์ชันกดรับ (claimGacha) เซฟเข้ากระเป๋าได้ถูกต้อง

            createGachaParticles() {
                const container = document.getElementById('gacha-reveal-particles');
                container.innerHTML = ''; // clear old

                const particleCount = 40;
                for (let i = 0; i < particleCount; i++) {
                    const p = document.createElement('div');
                    p.className = 'gacha-particle';
                    
                    // Shape: Mix of 4-point and 5-point stars
                    p.innerHTML = Math.random() > 0.5 ? '<i class="ri-sparkling-fill"></i>' : '<i class="fa-solid fa-star"></i>';
                    
                    // Physics properties
                    const angle = Math.random() * 360;
                    const distance = 100 + Math.random() * 250; // Random spread distance (px)
                    const tx = Math.cos(angle * Math.PI / 180) * distance;
                    const ty = Math.sin(angle * Math.PI / 180) * distance;
                    
                    const size = 0.5 + Math.random() * 1.5;
                    const duration = 1 + Math.random() * 2; // 1s to 3s fade out
                    const rot = (Math.random() > 0.5 ? 1 : -1) * (180 + Math.random() * 360);

                    // Colors & Glow
                    p.style.color = Math.random() > 0.5 ? '#fff' : '#ffe28a';
                    p.style.filter = `drop-shadow(0 0 ${2 + Math.random() * 5}px rgba(255,255,255,0.8))`;
                    
                    p.style.setProperty('--tx', `${tx}px`);
                    p.style.setProperty('--ty', `${ty}px`);
                    p.style.setProperty('--s', size);
                    p.style.setProperty('--rot', `${rot}deg`);
                    p.style.setProperty('--d', `${duration}s`);
                    
                    container.appendChild(p);
                }
            },

            async loadStudentsForReward() {
                const selectVal = document.getElementById('rw-classroom-select').value;
                const itemType = document.getElementById('rw-item').value;
                const amount = parseInt(document.getElementById('rw-amount').value);

                if(!selectVal || !itemType || !amount || amount <= 0) return Toast.fire({icon:'warning', title:'กรอกข้อมูลให้ครบถ้วนและถูกต้อง'});

                Loader.show();

                    for(const uid in allUsers) {
                        const u = allUsers[uid];
                        if(u.role === 'student' && u.class === c && u.room === r) {
                            students.push({uid, ...u});
                        }

                }
                students.sort((a,b) => parseInt(a.number) - parseInt(b.number));

                let html = `<div class="shrink-0 px-5 pb-2"><h4 class="font-bold text-sm text-gray-500">เลือกนักเรียนที่ต้องการให้ของรางวัล</h4></div>`;

                    html += `<div class="shrink-0 px-5 pb-24 pt-3"><button onclick="app.submitReward('${itemType}', ${amount})" class="w-full bg-gradient-to-r from-primary to-blue-500 text-white py-3.5 rounded-xl font-bold shadow-lg shadow-cyan-200 transition active:scale-95">ยืนยันการแจกรางวัล</button></div>`;

            async submitReward(itemVal, amount) {
                const checkboxes = document.querySelectorAll('.rw-checkbox:checked');
                if(checkboxes.length === 0) return Toast.fire({icon:'warning', title:'กรุณาเลือกนักเรียนอย่างน้อย 1 คน'});

                Loader.show();
                const [type, itemCategory, driveId, itemName] = itemVal.split('|');

                try {
                    for (let cb of checkboxes) {
                        const uid = cb.value;

                        if (type === 'currency') {
                            // ให้สกุลเงินเข้าตัวโดยตรง
                            const currencyType = itemCategory;
                            const itemRef = ref(db, `users/${uid}/items/${currencyType}`);
                            const snap = await get(itemRef);
                            await set(itemRef, (snap.exists() ? snap.val() : 0) + amount);
                        } else if (type === 'item') {
                            // ส่งไอเทมเข้าจดหมาย
                            const mailRef = ref(db, `mailbox/${uid}`);
                            const mailSnap = await get(mailRef);
                            const currentMails = mailSnap.exists() ? mailSnap.val() : {};
                            
                            // เช็คโควต้า 10 ฉบับ
                            if (Object.keys(currentMails).length >= 10) {
                                continue; // ข้ามคนนี้ไปถ้ากล่องจดหมายเต็ม
                            }

                            await push(mailRef, {
                                itemCategory: itemCategory,
                                driveId: driveId,
                                itemName: itemName,
                                amount: amount,
                                timestamp: Date.now()
                            });
                        }
                    }
                    
                    Toast.fire({icon:'success', title: 'แจกรางวัลสำเร็จ'});
                    document.getElementById('rw-student-list').innerHTML = '';
                    document.getElementById('rw-amount').value = '1';
                } catch(e) {
                    Toast.fire({icon:'error', title:'เกิดข้อผิดพลาด'});
                }
                Loader.hide();
            },

                        // คัดเฉพาะคนที่โดนแบนอยู่
                        const bannedUsers = Object.entries(users).filter(([uid, u]) => u.banInfo && u.banInfo.isBanned);
                        
                        if (bannedUsers.length === 0) {
                            listHtml = `<div class="text-center py-10 text-gray-400 font-bold"><i class="fa-solid fa-check-circle text-4xl mb-3 text-green-400 block"></i>ไม่มีนักเรียนที่ถูกแบนในขณะนี้</div>`;
                        } else {
                            bannedUsers.sort((a, b) => a[1].banInfo.unbanTime - b[1].banInfo.unbanTime).forEach(([uid, u]) => {
                                const ban = u.banInfo;
                                const remainingMs = ban.unbanTime - Date.now();
                                
                                if (remainingMs <= 0) {
                                    listHtml += `
                                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-green-200 mb-3 relative overflow-hidden">
                                            <div class="absolute right-0 top-0 w-2 h-full bg-green-500"></div>
                                            <div class="flex justify-between items-center mb-2">
                                                <div class="font-bold text-dark text-sm">${u.fullName} <span class="text-xs text-gray-400">(${u.studentId})</span></div>
                                            </div>
                                            <div class="text-xs font-bold text-green-600 bg-green-50 px-2 py-1.5 rounded-lg mb-2 border border-green-100 w-max">หมดระยะเวลาการแบนแล้ว</div>
                                            <button onclick="app.unbanUser('${uid}')" class="w-full bg-gray-100 text-gray-600 py-2.5 rounded-xl text-xs font-bold hover:bg-gray-200 transition">อัปเดต / ล้างสถานะให้เป็นปกติ</button>
                                        </div>
                                    `;
                                } else {
                                    const days = Math.floor(remainingMs / (1000 * 60 * 60 * 24));
                                    const hours = Math.floor((remainingMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                                    const mins = Math.floor((remainingMs % (1000 * 60 * 60)) / (1000 * 60));
                                    
                                    listHtml += `
                                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-red-200 mb-3 relative overflow-hidden">
                                            <div class="absolute right-0 top-0 w-2 h-full bg-red-500"></div>
                                            <div class="font-bold text-dark text-sm mb-1">${u.fullName} <span class="text-xs text-gray-400">(${u.studentId})</span></div>
                                            <div class="text-[11px] text-red-500 font-extrabold mb-1">หัวข้อ: ${ban.reasonTitle}</div>
                                            <div class="text-[10px] text-gray-600 mb-3 bg-gray-50 p-2 rounded-lg border border-gray-100 leading-relaxed">${ban.reasonDetail}</div>
                                            
                                            <div class="text-[10px] font-bold text-orange-600 bg-orange-50 border border-orange-100 p-2 rounded-lg mb-3">
                                                <div class="mb-1"><i class="fa-solid fa-hourglass-half"></i> ระยะเวลาคงเหลือ: ${days} วัน ${hours} ชม. ${mins} นาที</div>
                                                <div><i class="fa-solid fa-unlock-keyhole"></i> ปลดแบนเวลา: ${new Date(ban.unbanTime).toLocaleString('th-TH')}</div>
                                            </div>
                                            
                                            <button onclick="app.unbanUser('${uid}')" class="w-full bg-red-50 text-red-600 py-2.5 rounded-xl text-xs font-bold hover:bg-red-500 hover:text-white transition border border-red-200">
                                                <i class="fa-solid fa-user-check"></i> ยกเลิกการแบนทันที
                                            </button>
                                        </div>
                                    `;
                                }
                            });
                        }
                    }
                    document.getElementById('ban-content').innerHTML = listHtml;
                }
            },

            async openClassroomModal(isEdit = false, currentId = null, currentC = 'ม.1', currentR = '') {
                const title = isEdit ? 'แก้ไขห้องเรียน' : 'เพิ่มห้องเรียนใหม่';
                
                const { value: formValues } = await Swal.fire({
                    title: `<span style="font-family: 'Kanit';">${title}</span>`,
                    html: `
                        <div class="text-left font-sans text-sm space-y-4 mt-4">
                            <div>
                                <label class="text-xs font-bold text-gray-500 mb-1 block uppercase tracking-wider">ระดับชั้น</label>

                                    <option value="ม.2" ${currentC==='ม.2'?'selected':''}>ม.2</option>
                                    <option value="ม.3" ${currentC==='ม.3'?'selected':''}>ม.3</option>
                                    <option value="ม.4" ${currentC==='ม.4'?'selected':''}>ม.4</option>
                                    <option value="ม.5" ${currentC==='ม.5'?'selected':''}>ม.5</option>

                                </select>
                            </div>

                                <label class="text-xs font-bold text-gray-500 mb-1 block uppercase tracking-wider">ห้อง (กรอกตัวเลข)</label>
                                <input type="number" id="cr-room" value="${currentR}" class="w-full p-3 border-2 border-gray-100 rounded-xl text-sm bg-gray-50 outline-none focus:border-primary focus:bg-white transition" placeholder="เช่น 1, 2, 3">
                            </div>
                        </div>
                    `,
                    showCancelButton: true,
                    confirmButtonText: 'บันทึกข้อมูล',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' },
                    preConfirm: () => {
                        const c = document.getElementById('cr-class').value;
                        const r = document.getElementById('cr-room').value;
                        if (!r || r <= 0) {
                            Swal.showValidationMessage('กรุณากรอกหมายเลขห้องให้ถูกต้อง');
                            return false;
                        }
                        return { class: c, room: r };
                    }
                });

                if (formValues) {
                    Loader.show();
                    const newId = `${formValues.class}-${formValues.room}`.replace(/\./g, '_');
                    
                    if (isEdit && currentId && currentId !== newId) {
                        await remove(ref(db, `classrooms/${currentId}`));
                        
                        const usersRef = ref(db, 'users');
                        const snap = await get(usersRef);
                        let updates = {};
                        if(snap.exists()) {
                            for(const uid in snap.val()) {
                                const u = snap.val()[uid];
                                if(u.class === currentC && u.room === currentR) {
                                    updates[`users/${uid}/class`] = formValues.class;
                                    updates[`users/${uid}/room`] = formValues.room;
                                }
                            }
                        }
                        if(Object.keys(updates).length > 0) {
                            await update(ref(db), updates);
                        }
                    }

                    await set(ref(db, `classrooms/${newId}`), {
                        class: formValues.class,
                        room: formValues.room,
                        updatedAt: Date.now()
                    });
                    
                    Loader.hide();
                    Toast.fire({icon: 'success', title: isEdit ? 'อัปเดตห้องเรียนสำเร็จ' : 'เพิ่มห้องเรียนสำเร็จ'});
                    this.showClassroomManager();
                }
            },

            async deleteClassroom(id, c, r) {
                Swal.fire({
                    title: 'ยืนยันการลบ?',
                    html: `<p class="text-sm text-gray-600 mt-2">คุณต้องการลบห้อง <b>${c}/${r}</b> ใช่หรือไม่?<br><br><span class="text-red-500 font-bold bg-red-50 p-2 rounded-lg block"><i class="fa-solid fa-triangle-exclamation"></i> บัญชีนักเรียนในห้องนี้จะถูกลบทั้งหมด</span></p>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#F5275B',
                    confirmButtonText: 'ใช่, ลบข้อมูล',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { popup: 'rounded-3xl' }
                }).then(async (result) => {
                    if (result.isConfirmed) {
                        Loader.show();
                        await remove(ref(db, `classrooms/${id}`));
                        
                        const usersRef = ref(db, 'users');
                        const snap = await get(usersRef);
                        
                        if(snap.exists()) {
                            let updates = {};
                            for(const uid in snap.val()) {
                                const u = snap.val()[uid];
                                if(u.role === 'student' && u.class === c && u.room === r) {
                                    updates[`users/${uid}`] = null;
                                }
                            }
                            if(Object.keys(updates).length > 0) {
                                await update(ref(db), updates);
                            }
                        }
                        Loader.hide();
                        Toast.fire({icon: 'success', title: 'ลบห้องเรียนสำเร็จ'});
                        this.showClassroomManager();
                    }
                });
            },

            async showClassroomDetail(c, r) {
                UI.setHeader(`ชั้น ${c}/${r}`);
                document.getElementById('content-area').innerHTML = UI.renderSkeleton('list');

                const usersRef = ref(db, 'users');
                const uSnap = await get(usersRef);

                let students = [];
                if(uSnap.exists()) {
                    const allUsers = uSnap.val();
                    for(const uid in allUsers) {
                        const u = allUsers[uid];
                        if(u.role === 'student' && u.class === c && u.room === r) {
                            students.push({uid, ...u});
                        }
                    }
                }
                students.sort((a,b) => parseInt(a.number) - parseInt(b.number));

                let html = `
                    <div class="flex-1 flex flex-col w-full h-full min-h-0 overflow-hidden">
                        <div class="shrink-0 p-4 sm:p-5 pb-2">
                            <button onclick="app.showClassroomManager()" class="mb-3 sm:mb-4 text-gray-500 hover:text-dark flex items-center text-xs sm:text-sm transition">
                                <i class="fa-solid fa-arrow-left mr-2"></i> กลับหน้ารายการห้องเรียน
                            </button>
                            
                            <div class="flex justify-between items-center mb-3 sm:mb-4">
                                <div class="min-w-0 pr-2">
                                    <h4 class="font-bold text-dark text-base sm:text-lg truncate">รายชื่อนักเรียน <span class="text-primary">${c}/${r}</span></h4>
                                    <p class="text-[10px] sm:text-xs text-gray-500">จำนวนทั้งหมด ${students.length} คน</p>
                                </div>

            async handleExcelUpload(event, c, r) {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    Loader.show();
                    try {
                        const data = new Uint8Array(e.target.result);
                        const workbook = XLSX.read(data, {type: 'array'});
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const excelData = XLSX.utils.sheet_to_json(firstSheet, {header: 1}); 
                        
                        let added = 0;
                        let skipped = 0;
                        
                        const usersRef = ref(db, 'users');
                        const snap = await get(usersRef);
                        const existingUsers = snap.exists() ? snap.val() : {};

                        for(let i=1; i<excelData.length; i++) { 
                            const row = excelData[i];
                            if(row && row.length >= 3) {
                                const num = row[0];
                                const sId = String(row[1]).trim();
                                const name = row[2];

                                if(sId && name) {
                                    let isDuplicate = false;
                                    for(const key in existingUsers) {
                                        if(existingUsers[key].studentId === sId) {
                                            isDuplicate = true;
                                            break;
                                        }
                                    }

                                    if(!isDuplicate) {
                                        const newRef = push(ref(db, `users`));
                                        await set(newRef, {
                                            role: 'student', class: c, room: r,
                                            number: num, studentId: sId, fullName: name,
                                            password: hashStr('00000'), 
                                            profileImage: DEFAULT_AVATAR,
                                            items: {cs:0, ct:0, ticket:0, sc:0}
                                        });
                                        added++;
                                    } else {
                                        skipped++;
                                    }
                                }
                            }
                        }
                        
                        if (added > 0) {
                            Toast.fire({icon:'success', title:`นำเข้าสำเร็จ ${added} คน (ข้ามซ้ำ ${skipped} คน)`});
                        } else if (skipped > 0) {
                            Swal.fire({title: 'แจ้งเตือน', text: `พบรหัสนักเรียนซ้ำในระบบทั้งหมด ${skipped} คน ไม่มีข้อมูลใหม่ถูกเพิ่ม`, icon: 'warning', confirmButtonColor: '#27D6F5', customClass: {popup: 'rounded-3xl'}});
                        } else {
                            Toast.fire({icon:'info', title:'ไม่มีข้อมูลถูกนำเข้า โปรดตรวจสอบไฟล์'});
                        }
                    } catch(err) {
                        console.error(err);
                        Swal.fire({title: 'Error', text: 'รูปแบบไฟล์ไม่ถูกต้อง คอลัมน์ต้องเป็น: เลขที่ | รหัสนักเรียน | ชื่อสกุล', icon: 'error', confirmButtonColor: '#27D6F5', customClass: {popup: 'rounded-3xl'}});
                    }
                    Loader.hide();
                    this.showClassroomDetail(c, r);
                };
                reader.readAsArrayBuffer(file);
                event.target.value = ''; // Reset input
            },

            renderCatRoomMain() {
                const subView = document.getElementById('catroom-sub-view');
                const catData = appState.user.catData || {};
                const catImg = `https://drive.google.com/thumbnail?id=${catData.equippedCat}&sz=s800`;
                const rank = getCatRank(catData.level);

                let hungerWidth = Math.max(0, Math.min(100, catData.hunger || 0));
                let happyWidth = Math.max(0, Math.min(100, catData.happiness || 0));
                
                const mining = catData.mining || { cc:{ready:true, claimed:false}, cd:{ready:true, claimed:false}, ce:{ready:true, claimed:false} };

                // 🌟 1. ดึงข้อมูลการ์ดที่สวมใส่อยู่มาตรวจสอบเงื่อนไข x2
                const equippedItems = appState.user.equippedSpecialItems || {};
                const hasCCx2 = Object.values(equippedItems).includes('item_1'); // การ์ด CatCoin x2
                const hasCDx2 = Object.values(equippedItems).includes('item_2'); // การ์ด CatDiamond x2
                const hasCEx2 = Object.values(equippedItems).includes('item_3'); // การ์ด CatEmerald x2

                const renderMiningBar = (type, img, maxVal, currentValStr) => {
                    const m = mining[type];
                    const isReady = m.ready && !m.claimed;
                    const isClaimed = m.claimed;
                    const progress = isReady ? 100 : (isClaimed ? 0 : 0); // Simplified visual
                    
                    // ตรวจสอบว่าแร่ประเภทรอบนี้เข้าเงื่อนไขการเปิดใช้งานการ์ด x2 หรือไม่
                    let isCardActive = false;
                    if (type === 'cc' && hasCCx2) isCardActive = true;
                    if (type === 'cd' && hasCDx2) isCardActive = true;
                    if (type === 'ce' && hasCEx2) isCardActive = true;

                    // 🌟 2. สลับสไตล์ของปุ่ม: หากแร่พร้อมรับและการ์ด x2 ทำงานอยู่ ให้เปลี่ยนเป็นสีส้มไล่เฉด (Orange to Amber)
                    let btnClass = 'bg-gray-300 cursor-not-allowed';
                    if (isReady) {
                        if (isCardActive) {
                            btnClass = 'bg-gradient-to-r from-orange-500 to-amber-500 animate-pulse cursor-pointer shadow-md shadow-orange-500/10';
                        } else {
                            btnClass = 'bg-gradient-to-r from-primary to-blue-500 animate-pulse cursor-pointer';
                        }
                    }
                    
                    // (ทริกเสริม) เพิ่มแท็กข้อความสัญลักษณ์ไฟและ x2 ข้างตัวเลขเพื่อความสวยงามในปุ่ม
                    const displayValue = (isReady && isCardActive) ? `${currentValStr} x2` : currentValStr;
                    
                    return `
                        <div class="bg-black/40 backdrop-blur-md rounded-xl p-2.5 border border-white/10 w-full mb-2">
                            <div class="flex items-center gap-2 mb-1.5">
                                <img src="${img}" class="w-5 h-5 object-contain">
                                <div class="flex-1 bg-black/50 h-2 rounded-full overflow-hidden">
                                    <div class="h-full bg-primary transition-all duration-1000" style="width: ${progress}%"></div>
                                </div>
                                <span class="text-white text-[10px] font-bold w-8 text-right">${progress}%</span>
                            </div>
                            <button ${isReady ? `onclick="app.claimCatMining('${type}')"` : 'disabled'} class="w-full py-1.5 rounded-lg text-white text-[10px] font-bold ${btnClass} shadow-sm transition active:scale-95">
                                ${isClaimed ? 'รับแล้ว' : (isReady ? `รับแร่ ${displayValue}` : 'รอขุดพรุ่งนี้')}
                            </button>
                        </div>
                    `;
                };

                // Calculate Yield based on happiness
                let factor = happyWidth / 100;
                let ccYield = Math.floor(1000 + (500 * factor));
                let cdYield = Math.floor(1000 + (500 * factor));
                let ceYield = Math.floor(250 + (50 * factor));

                // 🌟 3. ฝั่ง Logic: ทวีคูณค่าพลังแร่เพิ่มเป็น 2 เท่าเมื่อการ์ดตรงประเภททำงานอยู่
                if (hasCCx2) ccYield *= 2;
                if (hasCDx2) cdYield *= 2;
                if (hasCEx2) ceYield *= 2;

                // If hunger is 0, no yield
                if (hungerWidth === 0) {
                    ccYield = 0; cdYield = 0; ceYield = 0;
                }
                if (window.app.checkBanStatus(appState.user)) {
                    ccYield = 0; cdYield = 0; ceYield = 0;
                }

                subView.innerHTML = `
                    <div class="px-5 w-full flex gap-3 shrink-0">

            async renderCatShop() {
                const subView = document.getElementById('catroom-sub-view');
                const isTeacher = appState.user.role === 'teacher';
                subView.innerHTML = `<div class="flex-1 flex items-center justify-center"><div class="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>`;

                try {
                    const shopRef = ref(db, 'cat_shop');
                    const snap = await get(shopRef);
                    let allItems = snap.exists() ? snap.val() : {};
                    window.renderStore.catShop = allItems;

                    const cat = appState.catShopCategory || 'cat';
                    
                    // ดึงข้อมูลการสวมใส่การ์ดไอเทมพิเศษจาก Slot
                    const equipped = appState.user?.equippedSpecialItems || {};
                    const hasFrameDiscount = equipped.slot1 === 'item_6' || equipped.slot2 === 'item_6';
                    const hasFoodDiscount = equipped.slot1 === 'item_7' || equipped.slot2 === 'item_7';
                    
                    const hasHungerBonus = equipped.slot1 === 'item_8' || equipped.slot2 === 'item_8';
                    const hasHappyBonus = equipped.slot1 === 'item_9' || equipped.slot2 === 'item_9';

                    // การเรียงลำดับ (Sort) ไอเทม
                    const filteredItems = Object.entries(allItems)
                        .filter(([k, v]) => v.type === cat)
                        .sort((a, b) => {
                            const itemA = a[1];
                            const itemB = b[1];

                            // ดัน Limited ไปไว้ล่างสุด
                            const isLimitedA = itemA.isLimited && itemA.type !== 'food';
                            const isLimitedB = itemB.isLimited && itemB.type !== 'food';

                            if (isLimitedA && !isLimitedB) return 1;
                            if (!isLimitedA && isLimitedB) return -1;

                            // เรียงราคาจากน้อยไปมาก
                            return (itemA.price || 0) - (itemB.price || 0);
                        });

                    // 🛠️ เช็คสถานะการแบน
                    const isBanned = appState.user && appState.user.banInfo;

                    let gridHtml = '';
                    if (filteredItems.length === 0) {
                        gridHtml = `<div class="col-span-3 text-center py-10 text-white/50 text-sm bg-black/20 rounded-2xl backdrop-blur-sm">ไม่มีไอเทมในหมวดนี้</div>`;
                    } else {
                        filteredItems.forEach(([key, val]) => {
                            const imgUrl = `https://drive.google.com/thumbnail?id=${val.driveId}&sz=s800`;
                            const adminOverlay = isTeacher ? `
                                <div class="absolute top-2 right-2 flex gap-1 z-20">
                                    <button onclick="app.editCatShopItem('${key}')" class="w-6 h-6 bg-blue-500/80 text-white rounded-full flex items-center justify-center text-[10px]"><i class="fa-solid fa-pen"></i></button>
                                    <button onclick="app.deleteCatShopItem('${key}')" class="w-6 h-6 bg-red-500/80 text-white rounded-full flex items-center justify-center text-[10px]"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            ` : '';

                            let infoHtml = '';
                            if (cat === 'cat') infoHtml = `<div class="text-[9px] bg-white/20 text-white px-2 py-0.5 rounded font-bold uppercase tracking-wider mb-1">${val.category}</div>`;
                            
                            if (cat === 'food') {
                                const currentHunger = val.hunger || 0;
                                const currentHappy = val.happy || 0;

                                const displayHunger = hasHungerBonus ? Math.floor(currentHunger * 1.10) : currentHunger;
                                const displayHappy = hasHappyBonus ? Math.floor(currentHappy * 1.08) : currentHappy;

                                const hungerColorClass = hasHungerBonus ? 'text-green-300 font-black' : 'text-orange-200';
                                const happyColorClass = hasHappyBonus ? 'text-green-300 font-black' : 'text-pink-300';

                                infoHtml = `
                                    <div class="text-[9px] mb-1 flex items-center justify-center gap-1.5">
                                        <span class="${hungerColorClass}"><i class="fa-solid fa-drumstick-bite"></i> +${displayHunger}%</span>
                                        <span class="${happyColorClass}"><i class="fa-solid fa-heart"></i> +${displayHappy}%</span>
                                    </div>
                                `;
                            }
                            
                            if (cat === 'cat_frame') { infoHtml = `<div class="text-[9px] text-pink-200 font-bold mb-1"><i class="fa-solid fa-frame"></i>กรอบโปรไฟล์</div>`;}
                            
                            let isOwned = false;
                            if (val.type === 'cat' || val.type === 'bg') { isOwned = appState.user.catData?.unlocked?.[val.driveId] || false; }
                            if (val.driveId === CAT_ASSETS.starterCat || val.driveId === CAT_ASSETS.starterBg) isOwned = true;
                            if (val.type === 'cat_frame') { isOwned = appState.user.unlocked_frames?.[val.driveId] || false; }

                            // --- คำนวณราคาและโครงสร้างส่วนลด ---
                            let originalPrice = val.price || 0; 
                            let finalPrice = originalPrice;
                            let isDiscountActive = false;

                            if (cat === 'cat_frame' && hasFrameDiscount) {
                                finalPrice = Math.floor(originalPrice * 0.75);
                                isDiscountActive = true;
                            } else if (cat === 'food' && hasFoodDiscount) {
                                finalPrice = Math.floor(originalPrice * 0.75);
                                isDiscountActive = true;
                            }

                            // ปรับราคาเมื่อโดนแบน
                            if (isBanned && cat === 'food') {
                                if (originalPrice < 10000) originalPrice += 10000;
                                if (finalPrice < 10000) finalPrice += 10000;
                            }

                            let buyBtn = '';
                            if (isOwned) {
                                buyBtn = `<button disabled class="w-full mt-auto bg-gray-500 text-gray-300 text-[10px] py-1.5 rounded-lg font-bold shadow-sm cursor-not-allowed border border-gray-400/50"><i class="fa-solid fa-check-circle"></i> มีแล้ว</button>`;
                            } else if (val.isLimited && val.type !== 'food') {
                                buyBtn = `<button disabled class="w-full mt-auto bg-gray-700 text-gray-400 text-[10px] py-1.5 rounded-lg font-bold shadow-sm cursor-not-allowed"><i class="fa-solid fa-lock"></i> ยังไม่เปิดขาย</button>`;
                            } else {
                                if (isDiscountActive) {
                                    buyBtn = `
                                        <button onclick="app.buyCatShopItem('${key}')" class="w-full mt-auto bg-gradient-to-r from-orange-400 to-amber-500 text-white text-[10px] py-1.5 rounded-lg font-bold shadow-md shadow-orange-500/40 active:scale-95 flex items-center justify-center gap-1.5 border border-orange-300">
                                            <img src="${ITEM_IMAGES.sc}" class="w-3.5 h-3.5 drop-shadow-sm"> 
                                            <div class="flex items-center gap-1">
                                                <span class="text-[8px] text-white/60 line-through leading-none">${originalPrice.toLocaleString()}</span>
                                                <span class="text-[11px] font-black leading-none">${finalPrice.toLocaleString()}</span>
                                            </div>
                                        </button>
                                    `;
                                } else {
                                    buyBtn = `
                                        <button onclick="app.buyCatShopItem('${key}')" class="w-full mt-auto bg-gradient-to-r from-blue-500 to-indigo-600 text-white text-[10px] py-1.5 rounded-lg font-bold shadow-sm active:scale-95 flex items-center justify-center gap-1">
                                            <img src="${ITEM_IMAGES.sc}" class="w-3 h-3"> 
                                            <span>${originalPrice.toLocaleString()}</span>
                                        </button>
                                    `;
                                }
                            }

                            gridHtml += `
                                <div class="bg-black/40 backdrop-blur-md rounded-2xl p-3 border border-white/10 flex flex-col items-center text-center relative overflow-hidden group h-full justify-between">
                                    ${adminOverlay}
                                    
                                    <div class="w-full flex flex-col items-center">
                                        <div class="w-16 h-16 sm:w-20 sm:h-20 mb-2 flex items-center justify-center shrink-0">
                                            <img src="${imgUrl}" class="w-full h-full object-contain filter drop-shadow-lg group-hover:scale-110 transition-transform">
                                        </div>
                                        ${infoHtml}
                                        <h4 class="text-white font-bold text-[11px] sm:text-xs mb-2 truncate w-full">${val.name}</h4>
                                    </div>
                                    
                                    ${buyBtn}
                                </div>
                            `;
                        });
                    }

                    const tabs = [
                        {id: 'cat', icon: 'fa-cat', label: 'แมว'},
                        {id: 'food', icon: 'fa-fish', label: 'อาหาร'},
                        {id: 'bg', icon: 'fa-image', label: 'พื้นหลัง'},
                        {id: 'cat_frame', icon: 'fa-star', label: 'กรอบ'},
                    ];
                    
                    const tabHtml = tabs.map(t => {
                        const active = cat === t.id;
                        return `<button onclick="app.setCatShopCategory('${t.id}')" class="flex-1 py-2 text-[10px] sm:text-xs font-bold rounded-xl transition flex items-center justify-center gap-1 ${active ? 'bg-white text-dark shadow-sm' : 'text-white/60 hover:text-white hover:bg-white/10'}"><i class="fa-solid ${t.icon}"></i> ${t.label}</button>`;
                    }).join('');

                    // 🌟 เพิ่มการตรวจสอบเพื่อแสดง Banner แจ้งเตือนเมื่อโดนแบน
                    let banBannerHtml = '';
                    if (isBanned && cat === 'food') {
                        banBannerHtml = `
                            <div class="bg-red-500 border border-red-500/50 rounded-lg p-2.5 mb-2 text-center shrink-0 animate-pulse">
                                <p class="text-red-200 text-[11px] sm:text-xs font-bold">
                                    <i class="fa-solid fa-triangle-exclamation mr-1"></i> คุณอยู่ในระยะเวลาแบน ราคาอาหารแมวสูงขึ้น!
                                </p>
                            </div>
                        `;
                    }

                    subView.innerHTML = `
                        <div class="w-full h-full flex flex-col overflow-hidden px-4 sm:px-5 pt-2 pb-6">
                            <div class="flex justify-between items-center mb-4 shrink-0">
                                <h3 class="text-white font-bold text-lg drop-shadow-md">ร้านค้าแมวน้อย</h3>
                                ${isTeacher ? `<button onclick="app.addCatShopItem()" class="bg-primary/80 text-white px-3 py-1.5 rounded-xl text-[10px] font-bold backdrop-blur-sm border border-white/20"><i class="fa-solid fa-plus"></i> เพิ่มไอเทม</button>` : ''}
                            </div>
                            <div class="flex bg-black/30 backdrop-blur-md p-1 rounded-2xl mb-0.5 shrink-0 border border-white/10">
                                <div class="flex-1 flex gap-1 w-full">
                                    ${tabHtml}
                                </div>
                            </div>

                            ${banBannerHtml} <!-- 🌟 แทรก Banner ตรงนี้ -->
                            
                            <div class="flex-1 overflow-y-auto no-scrollbar pb-10 w-full">
                                <div class="grid grid-cols-3 gap-2 sm:gap-3">
                                    ${gridHtml}
                                </div>
                            </div>
                        </div>
                    `;
                } catch(e) { console.error(e); subView.innerHTML = `<div class="text-white">Error loading shop</div>`; }
            },

            async renderCatMission() {
                const subView = document.getElementById('catroom-sub-view');
                const isTeacher = appState.user.role === 'teacher';
                subView.innerHTML = `<div class="flex-1 flex items-center justify-center"><div class="w-8 h-8 border-4 border-white border-t-transparent rounded-full animate-spin"></div></div>`;

                try {
                    const [missionsSnap, shopSnap] = await Promise.all([
                        get(ref(db, 'cat_missions')),
                        get(ref(db, 'cat_shop'))
                    ]);

                    const missions = missionsSnap.exists() ? missionsSnap.val() : {};
                    const catShop = shopSnap.exists() ? shopSnap.val() : {};
                    
                    const catLevel = appState.user.catData?.level || 1;
                    const claimedMissions = appState.user.catData?.missionsClaimed || {};
                    const unlockedCatsBgs = appState.user.catData?.unlocked || {};
                    const unlockedFrames = appState.user.unlocked_frames || {};

                    let listHtml = '';
                    const missionEntries = Object.entries(missions).sort((a,b) => (a[1].targetLevel||0) - (b[1].targetLevel||0));

                    if (missionEntries.length === 0) {
                        listHtml = `<div class="text-center py-8 text-white/50 text-sm bg-black/20 rounded-xl backdrop-blur-sm mx-4 border border-white/10">ยังไม่มีภารกิจในขณะนี้</div>`;
                    } else {
                        missionEntries.forEach(([key, m]) => {
                            const isClaimed = claimedMissions[key];
                            const isLocked = catLevel < m.targetLevel;
                            
                            let ownsUnique = false;
                            let rewardsHtml = '';
                            
                            (m.rewards || []).forEach(r => {
                                let rName = '', rImg = '', rAmt = '';
                                if (r.type === 'ticket') {
                                    rName = 'Ticket';
                                    rImg = ITEM_IMAGES.ticket;
                                    rAmt = `x${r.amount || 1}`;
                                } else {
                                    const shopItem = catShop[r.id];
                                    if (shopItem) {
                                        rName = shopItem.name;
                                        rImg = `https://drive.google.com/thumbnail?id=${shopItem.driveId}&sz=s800`;
                                        rAmt = `x${r.amount || 1}`; 
                                        
                                        if (r.type === 'cat' || r.type === 'bg') {
                                            if (unlockedCatsBgs[shopItem.driveId] || shopItem.driveId === CAT_ASSETS.starterCat || shopItem.driveId === CAT_ASSETS.starterBg) ownsUnique = true;
                                        } else if (r.type === 'cat_frame') {
                                            if (unlockedFrames[shopItem.driveId]) ownsUnique = true;
                                        }
                                    } else {
                                        rName = 'ไอเทมไม่ทราบชื่อ';
                                        rAmt = `x1`;
                                    }
                                }
                                
                                // ปรับขนาดไอเทมให้เล็กลงเพื่อประหยัดพื้นที่แนวตั้ง
                                rewardsHtml += `
                                    <div class="relative w-12 h-12 sm:w-13 sm:h-13 bg-white/10 rounded-xl border border-white/10 flex items-center justify-center shrink-0 shadow-inner">
                                        <img src="${rImg}" class="w-10 h-10 sm:w-11 sm:h-11 object-contain drop-shadow-md">
                                        <span class="absolute -bottom-1.5 -right-1.5 bg-amber-500 text-white text-[9px] font-extrabold px-1 rounded-md border border-white/20 shadow-sm">${rAmt}</span>
                                    </div>
                                `;
                            });

                            // ลด Padding ของปุ่มให้เล็กลง
                            let btnHtml = '';
                            if (isClaimed) {
                                btnHtml = `<button disabled class="bg-gray-500/50 text-white/50 px-1 py-1.5 rounded-lg text-[9px] font-bold shadow-sm cursor-not-allowed w-full border border-gray-400/30"><i class="fa-solid fa-check"></i> รับแล้ว</button>`;
                            } else if (ownsUnique) {
                                btnHtml = `<button disabled class="bg-amber-700/50 text-amber-200/50 px-1 py-1.5 rounded-lg text-[9px] font-bold shadow-sm cursor-not-allowed w-full border border-amber-500/30"><i class="fa-solid fa-box"></i> มีแล้ว</button>`;
                            } else if (isLocked) {
                                btnHtml = `<button disabled class="bg-black/40 text-white/40 px-1 py-1.5 rounded-lg text-[9px] font-bold shadow-sm cursor-not-allowed w-full border border-white/10"><i class="fa-solid fa-lock"></i> Lv.${m.targetLevel}</button>`;
                            } else {
