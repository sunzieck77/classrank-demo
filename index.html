    <style>
        :root {
            color-scheme: light;
        }
        /* Fixed Mobile App Viewport Constraints */
        body, html {
            margin: 0;
            padding: 0;
            height: 100dvh;
            width: 100vw;
            overflow: hidden; 
            background-color: #f3f4f6;
            color: #1f2937;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
            display: flex;
            justify-content: center;
        }
        
        #app-container {
            width: 100%;
            max-width: 480px;
            background-color: white;
            height: 100dvh;
            position: relative;
            box-shadow: 0 0 25px rgba(0,0,0,0.1);
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-nav {
            background: rgba(255, 255, 255, 0.95); /* เพิ่มความทึบนิดหน่อย */
            backdrop-filter: blur(4px); /* ลดความเบลอลงเหลือ 4px หรือเอาออกเลยก็ได้ */
            border-top: 1px solid #f3f4f6;
        }

        .item-card-shadow { box-shadow: 0 4px 15px -3px rgba(39, 214, 245, 0.2); }

        @keyframes floatSlow {
            0%, 100% { transform: translate3d(0, 0, 0); }
            50% { transform: translate3d(0, -6px, 0); }
        }
        .animate-bounce-slow { animation: floatSlow 3.5s ease-in-out infinite; will-change: transform;}

        @keyframes shimmer {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }
        .skeleton {
            background: #f6f7f8;
            background-image: linear-gradient(to right, #f6f7f8 0%, #edeef1 20%, #f6f7f8 40%, #f6f7f8 100%);
            background-repeat: no-repeat;
            background-size: 1000px 100%;
            animation-duration: 1.5s;
            animation-fill-mode: forwards;
            animation-iteration-count: infinite;
            animation-name: shimmer;
            animation-timing-function: linear;
        }
        @keyframes shining-loop {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }

        .animate-shining {
            position: relative;
            overflow: hidden;
        }

        .animate-shining::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.5) 50%,
                rgba(255, 255, 255, 0) 100%
            );
            transform: skewX(-15deg);
            animation: shining-loop 2s infinite ease-in-out;
        }

        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: opacity 300ms, transform 300ms; }

        /* Floating Cat Background Animation (Login) */
        @keyframes bubbleFloat {
            0% { transform: translateY(110dvh) rotate(0deg) scale(0.8); opacity: 0; }
            10% { opacity: 0.35; }
            90% { opacity: 0.35; }
            100% { transform: translateY(-20dvh) rotate(360deg) scale(1.25); opacity: 0; }
        }
        .floating-cat-bg {
            position: absolute;
            bottom: -150px;
            color: rgba(147, 162, 255, 0.45);
            pointer-events: none;
            z-index: 0;
            animation: bubbleFloat 15s linear infinite;
            will-change: transform, opacity;
        }

        /* AAA Gacha Animation Styles */
        .gacha-bg-pastel { background: radial-gradient(circle at 50% 30%, #fff, #ffe6f2 40%, #e6f7ff 80%, #f3e6ff 100%); }
        @keyframes gachaFloating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .animate-gacha-float { animation: gachaFloating 4s ease-in-out infinite; }
        
        .gacha-btn-gradient {
            background: linear-gradient(90deg, #FFF580, #B8FBFF, #FFB8DC);
            background-size: 200% 200%;
            animation: gachaLiquid 3s ease infinite;
        }
        @keyframes gachaLiquid { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        @keyframes bgStarFloat {
            0% { transform: translateY(110dvh) scale(var(--s)) rotate(0deg); opacity: 0; }
            10% { opacity: var(--o); }
            90% { opacity: var(--o); }
            100% { transform: translateY(-10dvh) scale(var(--s)) rotate(360deg); opacity: 0; }
        }
        .gacha-bg-star {
            position: absolute;
            bottom: -50px;
            color: white;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.8));
            animation: bgStarFloat var(--d) linear infinite;
        }
        .gacha-shake { animation: gachaShake 0.1s linear infinite; }
        @keyframes gachaShake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            25% { transform: translate(-1px, -2px) rotate(-1deg); }
            50% { transform: translate(-3px, 0px) rotate(1deg); }
            75% { transform: translate(3px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -1px) rotate(-1deg); }
        }
        .gacha-rays {
            background: conic-gradient(from 0deg, rgba(255,251,214,0) 0deg, rgba(255,251,214,0.8) 20deg, rgba(255,251,214,0) 40deg, rgba(152,122,255,0) 60deg, rgba(152,122,255,0.8) 80deg, rgba(152,122,255,0) 100deg, rgba(27,145,255,0) 120deg, rgba(27,145,255,0.8) 140deg, rgba(27,145,255,0) 160deg, rgba(255,251,214,0.8) 180deg, rgba(255,251,214,0) 200deg, rgba(152,122,255,0.8) 220deg, rgba(152,122,255,0) 240deg, rgba(27,145,255,0.8) 260deg, rgba(27,145,255,0) 280deg, rgba(255,251,214,0.8) 300deg, rgba(255,251,214,0) 320deg, rgba(152,122,255,0.8) 340deg, rgba(152,122,255,0) 360deg);
            border-radius: 50%;
            filter: blur(8px);
            mix-blend-mode: screen;
            animation: spinRays 8s linear infinite;
        }
        @keyframes spinRays { 100% { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 3D Card Reveal */
        .gacha-perspective { perspective: 1200px; }
        .gacha-card-wrapper {
            transform-style: preserve-3d;
            transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: rotateY(-180deg) scale(0.5);
            filter: drop-shadow(0 0 30px rgba(255,255,255,0.8));
        }
        .gacha-card-wrapper.revealed { transform: rotateY(0deg) scale(1); }
        .gacha-card-face {
            backface-visibility: hidden;
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
        }
        .gacha-card-back {
            transform: rotateY(180deg);
            background: #fff;
            box-shadow: 0 0 50px #fff;
            border-radius: 20px;
        }
        
        .gacha-particle {
            position: absolute;
            top: 50%; left: 50%;
            transform-origin: center;
            mix-blend-mode: screen;
            animation: explosionBurst var(--d) cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
        }
        @keyframes explosionBurst {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(var(--s)) rotate(var(--rot)); opacity: 0; }
        }

        /* Draggable Floating Cat */
        #floating-pet-widget {
            position: absolute;
            z-index: 45;
            touch-action: none;
            cursor: grab;
        }
        #floating-pet-widget:active { cursor: grabbing; }
        
        .pet-bubble {
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        /* CSS สำหรับ Loading Dot 3 จุด */
    .loader {
      width: 60px;
      aspect-ratio: 2;
      --_g: no-repeat radial-gradient(circle closest-side, #ff9fd7 90%, #0000);
      --_h: no-repeat radial-gradient(circle closest-side, #ffee00 90%, #0000);
      --_j: no-repeat radial-gradient(circle closest-side, #00fbff 90%, #0000);
      background: 
        var(--_g) 0%   50%,
        var(--_h) 50%  50%,
        var(--_j) 100% 50%;
      background-size: calc(100%/4) 50%;
      animation: l3 1s infinite linear;
    }
    @keyframes l3 {
        20% {background-position: 0%   0%, 50%  50%, 100%  50%}
        40% {background-position: 0% 100%, 50%   0%, 100%  50%}
        60% {background-position: 0%  50%, 50% 100%, 100%   0%}
        80% {background-position: 0%  50%, 50%  50%, 100% 100%}
    }

        background-position: center;
        background-blend-mode: color-dodge;

        // โลจิกคำนวณเรท: (Weight ของไอเทม / Weight รวมทั้งตู้) * 100
        /*
            โอกาสสุ่มโดยประมาณ
            A      = 31.92%
            A+     = 23.94%
            A++    = 15.96%

            S      = 13.30%
            S+     = 7.98%
            S++    = 4.26%

            SS     = 1.60%
            SS+    = 0.80%
            SS++   = 0.27%

            SSS    = 0.11%
            SSS+   = 0.03%

            รวม S ขึ้นไป ≈ 28.34%
            รวม SS ขึ้นไป ≈ 2.81%
            รวม SSS ขึ้นไป ≈ 0.13%
        */
        const getAdjustedRarityWeight = (rarity, catLevel) => {
            let baseWeight = RARITY_WEIGHTS[rarity] || 0;
            // ไม่เพิ่มเรทให้เกลือระดับ A เพื่อให้เปอร์เซ็นต์ระดับ S ขึ้นไปเด่นขึ้น
            if (['A', 'A+',].includes(rarity)) return baseWeight;

            let bonusMultiplier = 0;
            if (catLevel >= 100) {
                bonusMultiplier = (catLevel * 0.99); 
            }
            if (catLevel >= 90) {
                bonusMultiplier = (catLevel * 0.6); 
            }
            if (catLevel >= 80) {
                bonusMultiplier = (catLevel * 0.1); 
            }
            if (catLevel >= 70) {
                bonusMultiplier = (catLevel * 0.08); 
            }
            if (catLevel >= 60) {
                bonusMultiplier = (catLevel * 0.068); 
            }
            if (catLevel >= 46) {
                bonusMultiplier = (catLevel * 0.05); 
            } 
            else {
                // เลเวล 1-49 เพิ่มตัวคูณทีละนิด (เช่น เวล 20 = +20% หรือ x1.2)
                bonusMultiplier = (catLevel * 0.01); 
            }
            
            return Math.floor(baseWeight * (1 + bonusMultiplier));
        };

            // If a different calendar day
            if (now.toDateString() !== last.toDateString()) {
                // Drop hunger to 20-30% if it was high, else drop more
                let dropHunger = Math.floor(Math.random() * 11) + 70; // 70 to 80 drop
                data.hunger = Math.max(0, data.hunger - dropHunger);
                
                // Happiness drops 15-20%
                let dropHappy = Math.floor(Math.random() * 6) + 15;
                data.happiness = Math.max(0, data.happiness - dropHappy);

                if (data.hunger === 0) {
                    data.level = Math.max(1, data.level - 5);
                } else {
                    data.level += 2;
                }

                // Ready mining
                data.mining = {
                    cc: { ready: true, claimed: false },
                    cd: { ready: true, claimed: false },
                    ce: { ready: true, claimed: false }
                };

                data.lastUpdate = now.getTime();
            }
            return data;
        };

                // 🌟 ตรวจสอบว่าเป็นการเปิดเว็บบนเบราว์เซอร์นี้ครั้งแรกหรือไม่

                const hasVisited = localStorage.getItem('hasVisitedPet');

                    localStorage.setItem('hasVisitedPet', 'true');
                } else {
                    // เมื่อเปิดรอบต่อๆ ไป ให้ทำการสุ่มคำพูดเดิมตามปกติ
                    msg = greetings[Math.floor(Math.random() * greetings.length)];
                }

                document.getElementById('pet-speech-text').textContent = msg;
                bubble.classList.remove('hidden');
                setTimeout(() => { bubble.classList.add('hidden'); }, 8500);

                // Basic drag functionality
                let isDragging = false;
                let offsetX = 0, offsetY = 0; // เปลี่ยนมาใช้ตัวแปรเก็บระยะห่าง (Offset) แทน
                let currentEvtX = 0, currentEvtY = 0;

                const startDrag = (e) => {
                    // ป้องกันปัญหาสำหรับเม้าส์ (ต้องคลิกซ้ายเท่านั้นถึงจะลากได้)
                    if (e.type.includes('mouse') && e.button !== 0) return;

                    const evt = e.type.includes('mouse') ? e : e.touches[0];
                    if (!evt) return;

                    // 1. ดึงพิกัดตำแหน่งปัจจุบันของ Widget บนหน้าจอ
                    const rect = widget.getBoundingClientRect();
                    
                    // 2. คำนวณหาจุดตัด (Offset) ว่าเมาส์จิ้มอยู่ส่วนไหนของตัวแมว
                    offsetX = evt.clientX - rect.left;
                    offsetY = evt.clientY - rect.top;

                    // 3. ล็อกตำแหน่งให้อยู่ในรูป top/left ทันที ก่อนจะสั่งล้าง bottom/right เพื่อกันปัญหาวาร์ปไปมุมซ้ายบน
                    widget.style.top = `${rect.top}px`;
                    widget.style.left = `${rect.left}px`;
                    widget.style.bottom = 'auto'; 
                    widget.style.right = 'auto';
                    
                    isDragging = true;
                };

                let ticking = false; 
                const moveDrag = (e) => {
                    if (!isDragging) return;
                    e.preventDefault();
                    
                    const evt = e.type.includes('mouse') ? e : e.touches[0];
                    if (!evt) return; 
                    
                    currentEvtX = evt.clientX;
                    currentEvtY = evt.clientY;

                    if (!ticking) {
                        window.requestAnimationFrame(() => {
                            if (!isDragging) return; 
                            
                            // 4. พิกัดใหม่ของแมว = พิกัดเมาส์ปัจจุบัน ลบด้วย ระยะห่าง offset ตอนเริ่มจิ้ม
                            let newTop = currentEvtY - offsetY;
                            let newLeft = currentEvtX - offsetX;
                            
                            // จำกัดขอบเขตหน้าจอ
                            const maxTop = window.innerHeight - widget.offsetHeight - 70; 
                            const maxLeft = window.innerWidth - widget.offsetWidth;
                            newTop = Math.max(60, Math.min(newTop, maxTop));
                            newLeft = Math.max(0, Math.min(newLeft, maxLeft));
                            
                            widget.style.top = `${newTop}px`;
                            widget.style.left = `${newLeft}px`;
                            
                            ticking = false; 
                        });
                        ticking = true; 
                    }
                };

                const stopDrag = () => { 
                    if (isDragging) {
                        setTimeout(() => { isDragging = false; }, 50); 
                    }
                };

                widget.addEventListener('mousedown', startDrag);
                window.addEventListener('mousemove', moveDrag);
                window.addEventListener('mouseup', stopDrag);
                
                widget.addEventListener('touchstart', startDrag, {passive: false});
                window.addEventListener('touchmove', moveDrag, {passive: false});
                window.addEventListener('touchend', stopDrag);
                

                // Tap to talk (เมื่อคลิกที่ตัวแมว จะเป็นการสุ่มคำพูดในลิสต์เสมอ)
                widget.addEventListener('click', () => {

                        document.getElementById('pet-speech-text').textContent = msg;
                        bubble.classList.remove('hidden');
                        setTimeout(() => { bubble.classList.add('hidden'); }, 6000);
                    }
                });
            },

                        currentIndex++;

                        container.style.transition = "transform 700ms ease-in-out";
                        container.style.transform = `translateX(-${currentIndex * 100}%)`;
                        
                        // เมื่อเลื่อนมาจนถึงรูปสุดท้าย (ซึ่งก็คือรูปที่ 1 ตัวจำลองที่เราแปะท้ายไว้)

                            setTimeout(() => {

            async confirmSellCard(cardId, price, itemType = 'card') {
                const uid = appState.user.uid;
                
                // แยก Path ของฐานข้อมูล
                const userItemPath = itemType === 'special' ? `users/${uid}/special_items/${cardId}` : `users/${uid}/my_cards/${cardId}`;
                
                // ตอนบันทึกสินค้าลงในบอร์ดตลาด (Market) ให้เพิ่มฟิลด์ประเภทเข้าไปด้วย
                const marketRef = ref(db, 'market');
                const newPostRef = push(marketRef);
                await set(newPostRef, {
                    sellerId: uid,
                    itemId: cardId,
                    type: itemType, // เก็บประเภทไว้ เพื่อให้ตอนคนซื้อ ระบบจะจ่ายไอเทมเข้าตัวถูกช่อง
                    price: price,
                    // ... ข้อมูลอื่น ๆ เช่น ชื่อ, รูปภาพ ...
                });
            },
            async quickSellCard(cardId, cardName, currentAmount) {
                if (window.app.checkBanStatus(appState.user)) {
                    return Swal.fire({ icon: 'error', title: 'ระงับการทำธุรกรรม', text: 'บัญชีของคุณถูกแบน ไม่สามารถขายการ์ดได้', confirmButtonColor: '#F5275B', customClass: { popup: 'rounded-[2rem]' } });
                }
                // 1. ถามยืนยันเพื่อป้องกันผู้เล่นกดพลาด
                const confirm = await Swal.fire({
                    title: 'ยืนยันการขายการ์ดทันที?',
                    html: `คุณกำลังจะขายการ์ด <b>${cardName}</b> จำนวน 1 ใบ<br>เพื่อรับ <span class="text-emerald-500 font-bold">100 S-Card (SC)</span> ทันที (การ์ดจะถูกลบออก)`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#EF4444',
                    cancelButtonColor: '#6B7280',
                    confirmButtonText: 'ใช่, ขายเลย',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (!confirm.isConfirmed) return;

                Loader.show();
                try {
                    const u = appState.user;
                    const currentSC = (u.items && u.items.sc) || 0;
                    let updates = {};

                    // ⭐ [จุดแก้ไข] ตรวจสอบพาธให้ตรงตามโครงสร้างฐานข้อมูลของคุณ
                    // ถ้าไอดีการ์ดขึ้นต้นด้วยคำว่า 'item_' หรือตรวจสอบเจอในก้อน special_items ให้ใช้พาธ 'special_items'
                    let cardPath = 'my_cards'; 
                    if (cardId.startsWith('item_') || (u.special_items && u.special_items[cardId] !== undefined)) {
                        cardPath = 'special_items';
                    }

                    // 2. คำนวณจำนวนการ์ดที่เหลือ
                    const remainAmount = currentAmount - 1;

                    if (remainAmount <= 0) {
                        // ถ้าเหลือ 0 ใบ ให้ลบคีย์การ์ดใบนั้นออกจากคลังที่ถูกต้องใน Firebase และ Local State ไปเลย
                        updates[`users/${u.uid}/${cardPath}/${cardId}`] = null;
                        if (u[cardPath]) {
                            delete u[cardPath][cardId];
                        }
                    } else {
                        // ถ้ายังเหลืออยู่ ให้ลดจำนวนลง 1 ใบในพาธที่ถูกต้อง
                        updates[`users/${u.uid}/${cardPath}/${cardId}`] = remainAmount;
                        if (u[cardPath]) {
                            u[cardPath][cardId] = remainAmount;
                        }
                    }

                    // 3. เพิ่มเงิน 100 SC ให้กับผู้ขาย
                    const newSC = currentSC + 100;
                    updates[`users/${u.uid}/items/sc`] = newSC;
                    if (!u.items) u.items = {};
                    u.items.sc = newSC;

                    // 4. บันทึกค่าอัปเดตทั้งหมดขึ้น Firebase Realtime Database
                    await update(ref(db), updates);
                    Loader.hide();

                    // 5. แสดงผลลัพธ์และทำการโหลดหน้ารายการคลังการ์ดใหม่
                    Toast.fire({
                        icon: 'success',
                        title: `ขายการ์ดสำเร็จ ได้รับ 100 SC`
                    });

                    // รีเฟรชหน้าจอคลังการ์ดเพื่อดึงข้อมูลสต็อกที่ลดลงไปแสดงผลใหม่
                    this.renderCardInventory();

                } catch (e) {
                    Loader.hide();
                    console.error("Quick sell error:", e);
                    Swal.fire({
                        icon: 'error',
                        title: 'เกิดข้อผิดพลาด',
                        text: 'ระบบขัดข้อง ไม่สามารถดำเนินการขายได้ โปรดลองอีกครั้ง',
                        customClass: { popup: 'rounded-3xl' }
                    });
                }
            },

                                            </button>
                                            <button onclick="window.app.cancelListing('${item.id}')" class="flex-1 bg-red-100 text-red-600 hover:bg-red-200 text-xs font-bold py-2 rounded-xl transition">
                                                ยกเลิก
                                            </button>
                                        </div>
                                    ` : `
                                        <button onclick="window.app.buyCardFromMarket('${item.id}')" 
                                                class="w-full bg-primary bg-orange-500 hover:bg-orange-600 text-white text-xs font-bold py-2 rounded-xl transition shadow-md">

                        if (isSeller) {

                    if (!hasMarketItem && marketGrid) marketGrid.innerHTML = `<div class="col-span-full py-8 text-center text-xs text-gray-400">ไม่มีการ์ดวางขายอยู่ในตลาดปัจจุบัน</div>`;
                    if (!hasMyItem && myListingsGrid) myListingsGrid.innerHTML = `<div class="col-span-full py-8 text-center text-xs text-gray-400">คุณยังไม่มีรายการตั้งขายในขณะนี้</div>`;

                } catch (e) {
                    console.error("Render Market Error:", e);
                }
            },
            async buyCardFromMarket(listingId) {
                try {
                    const listingSnap = await get(ref(db, `market/listings/${listingId}`));
                    if (!listingSnap.exists()) return Swal.fire({ icon: 'error', title: 'ไม่พบสินค้า', text: 'รายการขายนี้อาจถูกซื้อไปแล้วหรือถูกยกเลิกแล้ว' });

                    const item = listingSnap.val();
                    const buyerUid = appState.user.uid;
                    const totalPrice = item.price * item.quantity;
                    const currentSCard = appState.user.s_card || 0; // ตรวจสอบชื่อตัวแปรเงิน S-Card ของระบบคุณด้วยนะครับ

                    // 1. ตรวจสอบกระเป๋าตังค์ผู้ซื้อ
                    if (currentSCard < totalPrice) {
                        return Swal.fire({ icon: 'error', title: 'เงิน S-Card ไม่พอ', text: 'คุณมี S-Card ไม่เพียงพอสำหรับซื้อรายการนี้' });
                    }

                    // 2. ตรวจสอบรหัสลับ (ถ้ามีล็อกไว้)
                    if (item.code) {
                        const { value: inputCode } = await Swal.fire({
                            title: 'การขายนี้ถูกล็อกไว้',
                            text: 'กรุณากรอกรหัสลับเพื่อทำรายการซื้อการ์ดใบนี้',
                            input: 'text',
                            inputPlaceholder: 'ใส่รหัสลับที่ได้รับมาจากผู้ขาย',
                            showCancelButton: true,
                            confirmButtonColor: '#F97316',
                            customClass: { popup: 'rounded-3xl' }
                        });

                        if (inputCode === undefined) return; // กดยกเลิก
                        if (inputCode !== item.code) {
                            return Swal.fire({ icon: 'error', title: 'รหัสลับไม่ถูกต้อง', text: 'กรุณาตรวจสอบรหัสผ่านใหม่อีกครั้ง' });
                        }
                    }

                    // ยืนยันขั้นตอนสุดท้ายก่อนหักตังค์
                    const confirm = await Swal.fire({
                        title: 'ยืนยันการสั่งซื้อ',
                        text: `ต้องการซื้อ ${item.cardName} จำนวน ${item.quantity} ใบ เป็นเงิน ${totalPrice} S-Card หรือไม่?`,
                        showCancelButton: true,
                        confirmButtonText: 'ซื้อเลย',
                        cancelButtonText: 'คิดดูก่อน',
                        confirmButtonColor: '#22C55E'
                    });

                    if (!confirm.isConfirmed) return;

                    Loader.show();

                    // 3. ดึงกระเป๋าตังค์ของผู้ขายเพื่อนำเงินโอนไปให้
                    const sellerUserSnap = await get(ref(db, `users/${item.sellerId}`));
                    const sellerData = sellerUserSnap.exists() ? sellerUserSnap.val() : {};
                    const sellerCurrentSCard = sellerData.s_card || 0;

                    let updates = {};

                    // - หักเงินคนซื้อ
                    updates[`users/${buyerUid}/s_card`] = currentSCard - totalPrice;
                    appState.user.s_card = currentSCard - totalPrice;

                    // + เพิ่มเงินคนขาย
                    updates[`users/${item.sellerId}/s_card`] = sellerCurrentSCard + totalPrice;

                    // + เพิ่มการ์ดเข้าคลังคนซื้อ
                    const buyerCardsSnap = await get(ref(db, `users/${buyerUid}/my_cards/${item.cardKey}`));
                    const buyerCurrentCardQty = buyerCardsSnap.exists() ? buyerCardsSnap.val() : 0;
                    updates[`users/${buyerUid}/my_cards/${item.cardKey}`] = buyerCurrentCardQty + item.quantity;
                    
                    if(!appState.user.my_cards) appState.user.my_cards = {};
                    appState.user.my_cards[item.cardKey] = buyerCurrentCardQty + item.quantity;

                    // - ลบรายการสินค้าออกจากตลาดกลาง
                    updates[`market/listings/${listingId}`] = null;

                    await update(ref(db), updates);
                    Loader.hide();

                    Swal.fire({ icon: 'success', title: 'ซื้อสำเร็จ!', text: `คุณได้รับรางวัลเรียบร้อยแล้ว`, customClass: { popup: 'rounded-3xl' } });
                    
                    if (typeof this.renderMyCards === 'function') this.renderMyCards();
                    this.renderMarketAndMyListings();

                } catch (e) {
                    Loader.hide();
                    console.error("Purchase error: ", e);
                    Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'เกิดปัญหาระหว่างทำรายการกรุณาลองใหม่' });
                }
            },

            // ฟังก์ชันยกเลิกรายการขาย แล้วดึงของกลับคืนเข้าคลังตัวเอง
            async cancelListing(listingId) {
                const confirm = await Swal.fire({
                    title: 'ยืนยันยกเลิกรายการ?',
                    text: 'การ์ดจะถูกโอนกลับเข้าสู่คลังของคุณตามเดิม',
                    showCancelButton: true,
                    confirmButtonText: 'ยกเลิกรายการขาย',
                    cancelButtonText: 'คงไว้ตามเดิม',
                    confirmButtonColor: '#EF4444',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (confirm.isConfirmed) {
                    Loader.show();
                    try {
                        const listingSnap = await get(ref(db, `market/listings/${listingId}`));
                        if (!listingSnap.exists()) {
                            Loader.hide();
                            return Swal.fire({ icon: 'error', title: 'ไม่พบรายการ', text: 'รายการนี้ไม่มีอยู่แล้วหรือถูกยกเลิกไปก่อนหน้า' });
                        }

                        const item = listingSnap.val();

                        let updates = {};
                        
                        // ดึงจำนวนการ์ดเดิมที่มีในคลังเพื่อเอามาบวกคืน
                        const currentQty = appState.user.my_cards?.[item.cardKey] || 0;
                        updates[`users/${uid}/my_cards/${item.cardKey}`] = currentQty + item.quantity;
                        if(!appState.user.my_cards) appState.user.my_cards = {};

                        // ลบรายการโพสต์ขายทิ้ง
                        updates[`market/listings/${listingId}`] = null;

                        await update(ref(db), updates);
                        Loader.hide();

                        Swal.fire({ icon: 'success', title: 'ยกเลิกสำเร็จ', text: 'ดึงการ์ดคืนเข้าสู่คลังสำเร็จแล้ว', customClass: { popup: 'rounded-3xl' } });
                        
                        if (typeof this.renderMyCards === 'function') this.renderMyCards();
                        this.renderMarketAndMyListings();
                    } catch (e) {
                        Loader.hide();
                        console.error("Cancel listing error: ", e);
                        Swal.fire({ icon: 'error', title: 'ผิดพลาด', text: 'ไม่สามารถยกเลิกการขายได้ในขณะนี้' });
                    }
                }
            },

                        <div class="text-left space-y-4 px-1">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">

                            <div>

                    `,
                    focusConfirm: false,
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยันการตั้งขาย',
                    cancelButtonText: 'ยกเลิก',

                    customClass: { popup: 'rounded-3xl' },
                    preConfirm: () => {
                        const qty = parseInt(document.getElementById('sell-qty').value);
                        const price = parseInt(document.getElementById('sell-price').value);
                        const code = document.getElementById('sell-code').value.trim();

                        if (!price || price <= 0) {
                            Swal.showValidationMessage('กรุณาระบุราคาที่มากกว่า 0 S-Card');
                            return false;
                        }

                    }
                });

                if (formValues) {
                    this.processSellCard(cardKey, cardName, cardImage, formValues);
                }
            },

            // ฟังก์ชันประมวลผลหักการ์ดจากคลังและสร้างรายการในตลาดตลาดการ์ด
            async processSellCard(cardKey, cardName, cardImage, info) {
                Loader.show();
                try {
                    const u = appState.user;
                    const uid = u.uid;

                    // ⭐ [จุดแก้ไขสำคัญ] เช็กพาธคลังสินค้าแบบอัตโนมัติ
                    // ถ้า cardKey ขึ้นต้นด้วย 'item_' ให้ชี้ไปที่ 'special_items' ถ้าไม่ใช่ให้ไปที่ 'my_cards'
                    let cardPath = 'my_cards';
                    if (cardKey.startsWith('item_') || (u.special_items && u.special_items[cardKey] !== undefined)) {
                        cardPath = 'special_items';
                    }

                    // ดึงข้อมูลคลังสินค้าตามพาธที่ถูกต้อง
                    const currentInventory = u[cardPath] || {};
                    const currentQty = currentInventory[cardKey] || 0;

                    if (currentQty < info.qty) {
                        Loader.hide();
                        return Swal.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด', text: 'จำนวนการ์ดในคลังของคุณไม่พอสำหรับการตั้งขาย' });
                    }

                    // 🌟 ค้นหาระดับการ์ด (Grade) ที่ถูกต้องจาก appState.systemCards ระบบส่วนกลาง
                    let finalCardGrade = "A"; // ค่าเริ่มต้นกรณีไม่พบข้อมูล
                    if (appState.systemCards) {
                        for (const sysId in appState.systemCards) {
                            // เช็คว่า ID หรือลิงก์รูปภาพตรงกันหรือไม่
                            if (sysId === cardKey || appState.systemCards[sysId].image === cardImage) {
                                finalCardGrade = appState.systemCards[sysId].rarity || appState.systemCards[sysId].grade || "A";
                                break;
                            }
                        }
                    }

                    // เตรียมบันทึกข้อมูลแบบ Multi-path update เพื่อความปลอดภัยสูง
                    let updates = {};
                    
                    // 1. หักการ์ดจากคลังของผู้ใช้ (ใช้ตัวแปร cardPath ที่คำนวณได้)
                    const remain = currentQty - info.qty;
                    if (remain <= 0) {
                        updates[`users/${uid}/${cardPath}/${cardKey}`] = null;
                        if (u[cardPath]) delete u[cardPath][cardKey];
                    } else {
                        updates[`users/${uid}/${cardPath}/${cardKey}`] = remain;
                        if (u[cardPath]) u[cardPath][cardKey] = remain;
                    }

                    // 2. สร้างเลขอ้างอิงรายการขายใหม่ในตลาด (Listing ID)
                    const marketRef = push(ref(db, 'market/listings'));
                    const listingId = marketRef.key;

                    // 3. เพิ่มข้อมูลเข้าไปในระบบตลาดซื้อขาย (แนบรูปโปรไฟล์และระดับการ์ดเพิ่ม)
                    updates[`market/listings/${listingId}`] = {
                        id: listingId,
                        sellerId: uid,
                        sellerName: u.displayName || u.fullName || u.username || 'ผู้ใช้งาน',
                        sellerImage: u.profileImage || "https://i.pinimg.com/736x/49/21/09/492109a7c63b6203b52f58d353a3de02.jpg", 
                        cardKey: cardKey,
                        cardName: cardName,
                        cardImage: cardImage,
                        cardGrade: finalCardGrade, // 🌟 แนบระดับการ์ดจริงที่ดึงจากระบบขึ้นฐานข้อมูล
                        quantity: info.qty,
                        price: info.price,
                        code: info.code || null,
                        createdAt: Date.now()
                    };

                    await update(ref(db), updates);
                    Loader.hide();
                    this.renderCardInventory();

                    Swal.fire({
                        icon: 'success',
                        title: 'ตั้งขายการ์ดสำเร็จ!',
                        text: `การ์ดของคุณถูกนำไปจัดวางในตลาดเรียบร้อยแล้ว`,
                        confirmButtonColor: '#22C55E',
                        customClass: { popup: 'rounded-3xl' }
                    });

                    // สั่งอัปเดต UI หน้าจอใหม่
                    if (typeof this.renderMyCards === 'function') this.renderMyCards();
                    if (typeof this.renderMarketAndMyListings === 'function') {
                        this.renderMarketAndMyListings(); 
                    } else {
                        this.renderShop(); // กลับมาสั่ง Render หน้าหลักร้านค้าเพื่อดึงข้อมูลใหม่
                    }
                } catch (e) {
                    Loader.hide();
                    console.error("Sell Card Error:", e);
                    Swal.fire({ icon: 'error', title: 'ล้มเหลว', text: 'ไม่สามารถทำรายการตั้งขายได้ในขณะนี้' });
                }
            },

            showSpecialItemDetail(itemId, isEquippedView = false, slotKey = null) {
                const itemData = SPECIAL_ABILITIES[itemId];
                if (!itemData) return;

                const u = appState.user;
                const equipped = u.equippedSpecialItems || { slot1: null, slot2: null };
                const isAlreadyEquipped = (equipped.slot1 === itemId || equipped.slot2 === itemId);
                const equipCount = u.equipCount || 0;
                
                // ดึงลิงก์รูปภาพของไอเทม
                const itemImageUrl = itemData.img || itemData.image || '';
                
                // คำนวณค่าธรรมเนียม: ให้ฟรี 2 ครั้งแรก
                const cost = equipCount < 2 ? 0 : 50;
                const costText = cost === 0 ? '<span class="text-green-500">ฟรี (โควต้าสวมใส่ฟรี)</span>' : `<span class="text-cyan-500">${cost} CT</span>`;

                let actionBtn = '';
                if (isEquippedView || isAlreadyEquipped) {
                    // หากดูจากช่องสวมใส่ หรือ ไอเท็มนี้ถูกใส่อยู่แล้ว -> โชว์ปุ่มถอด
                    const slotToRemove = slotKey || (equipped.slot1 === itemId ? 'slot1' : 'slot2');
                    actionBtn = `<button onclick="app.unequipSpecialItem('${slotToRemove}')" class="w-full bg-red-50 text-red-500 font-bold py-3 rounded-xl mt-4 border border-red-100 hover:bg-red-500 hover:text-white transition">ถอดไอเทมออก (ฟรี)</button>`;
                } else {
                    // ไอเทมยังไม่ได้ใส่ -> โชว์ปุ่มสวมใส่
                    actionBtn = `<button onclick="app.equipSpecialItem('${itemId}')" class="w-full bg-dark text-white font-bold py-3 rounded-xl mt-4 hover:bg-gray-800 transition shadow-md shadow-gray-200">สวมใส่ไอเทม</button>`;
                }

                Swal.fire({
                    html: `
                        <div class="text-left font-sans flex flex-col items-center">
                            
                            <div class="w-24 h-32 bg-gray-50 rounded-lg mb-4 border flex items-center justify-center text-gray-400 overflow-hidden shadow-inner p-1">
                                <img src="${itemImageUrl}" class="w-full h-full object-contain drop-shadow-sm" onerror="this.src='https://placehold.co/150x200?text=Item'"/>
                            </div>

                            <h3 class="font-extrabold text-lg text-dark mb-1 text-center">${itemData.name}</h3>
                            <div class="bg-gray-50 text-gray-600 text-sm p-4 rounded-xl border border-gray-100 w-full mb-3 text-center font-medium leading-relaxed">
                                ${itemData.desc}
                            </div>
                            
                            ${!isEquippedView && !isAlreadyEquipped ? `
                            <div class="w-full bg-cyan-50/50 p-3 rounded-xl border border-cyan-100 flex justify-between items-center text-xs font-bold">
                                <span class="text-gray-500">ค่าธรรมเนียมสวมใส่</span>
                                ${costText}
                            </div>
                            <p class="text-[9px] text-gray-400 mt-2 text-center w-full">*หากสวมใส่อยู่ จะไม่สามารถนำไอเทมนี้ไปลงขายได้</p>
                            ` : ''}

                            ${actionBtn}
                        </div>
                    `,
                    showConfirmButton: false,
                    showCloseButton: true,
                    customClass: { popup: 'rounded-[2rem] p-5 w-[95%] max-w-sm' }
                });
            },

            async equipSpecialItem(itemId) {
                const u = appState.user;
                const equipped = u.equippedSpecialItems || { slot1: null, slot2: null };
                const equipCount = u.equipCount || 0;
                const cost = equipCount < 2 ? 0 : 50;

                // ตรวจสอบว่าช่องเต็มหรือไม่
                if (equipped.slot1 && equipped.slot2) {
                    return Swal.fire({ icon: 'error', title: 'ช่องสวมใส่เต็มแล้ว', text: 'กรุณาถอดไอเทมที่ใส่อยู่ออกก่อน 1 ชิ้น', confirmButtonColor: '#27D6F5', customClass: { popup: 'rounded-3xl' } });
                }

                // ตรวจสอบ CT
                const currentCT = (u.items && u.items.ct) || 0;
                if (cost > 0 && currentCT < cost) {
                    return Swal.fire({ icon: 'error', title: 'Crystal ไม่พอ', text: `การสวมใส่ครั้งนี้ต้องใช้ ${cost} CT`, confirmButtonColor: '#27D6F5', customClass: { popup: 'rounded-3xl' } });
                }

                const confirm = await Swal.fire({
                    title: 'ยืนยันการสวมใส่',
                    html: `<p class="text-sm text-gray-600">ต้องการสวมใส่ไอเทม <b>${SPECIAL_ABILITIES[itemId].name}</b> ใช่หรือไม่?<br><br>ค่าธรรมเนียม: ${cost === 0 ? '<span class="text-green-500 font-bold">ฟรี</span>' : `<span class="text-cyan-500 font-bold">${cost} CT</span>`}</p>`,
                    showCancelButton: true,
                    confirmButtonText: 'ยืนยัน',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#27D6F5',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (confirm.isConfirmed) {
                    Loader.show();
                    try {
                        const targetSlot = !equipped.slot1 ? 'slot1' : 'slot2';
                        let updates = {};
                        
                        updates[`users/${u.uid}/equippedSpecialItems/${targetSlot}`] = itemId;
                        updates[`users/${u.uid}/equipCount`] = equipCount + 1;
                        
                        if (cost > 0) {
                            updates[`users/${u.uid}/items/ct`] = currentCT - cost;
                            appState.user.items.ct = currentCT - cost;
                        }

                        await update(ref(db), updates);

                        if(!appState.user.equippedSpecialItems) appState.user.equippedSpecialItems = {slot1:null, slot2:null};
                        appState.user.equippedSpecialItems[targetSlot] = itemId;
                        appState.user.equipCount = equipCount + 1;

                        Loader.hide();
                        Swal.fire({ icon: 'success', title: 'สวมใส่สำเร็จ!', timer: 1500, showConfirmButton: false, customClass: { popup: 'rounded-3xl' } });
                        this.renderCardInventory();
                    } catch(e) {
                        Loader.hide();
                        Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด' });
                    }
                }
            },

            async unequipSpecialItem(slotKey) {
                const confirm = await Swal.fire({
                    title: 'ถอดไอเทม',
                    text: 'ต้องการถอดไอเทมความสามารถนี้ออกใช่หรือไม่? (ถอดฟรีไม่เสียค่าใช้จ่าย)',
                    showCancelButton: true,
                    confirmButtonColor: '#F5275B',
                    confirmButtonText: 'ถอดออก',
                    cancelButtonText: 'ยกเลิก',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (confirm.isConfirmed) {
                    Loader.show();
                    try {
                        // 🌟 [จุดแก้ไขสำคัญ] เปลี่ยนจาก update เป็น set เพื่อลบหรือเคลียร์ค่าเป็น null บน Firebase
                        await set(ref(db, `users/${appState.user.uid}/equippedSpecialItems/${slotKey}`), null);
                        
                        // ตรวจสอบความปลอดภัยของ Object ก่อนเคลียร์ค่าในฝั่ง Local State
                        if (appState.user && appState.user.equippedSpecialItems) {
                            appState.user.equippedSpecialItems[slotKey] = null;
                        }
                        
                        Loader.hide();
                        Toast.fire({ icon: 'success', title: 'ถอดไอเทมสำเร็จ' });
                        
                        // แนะนำให้เรียกผ่าน app.renderCardInventory() หรือใช้ this.renderCardInventory() ตามโครงสร้างเดิม
                        this.renderCardInventory();
                    } catch(e) {
                        console.error("Unequip error:", e); // พิมพ์ Error ลง Console เผื่อใช้ตรวจสอบเพิ่มเติม
                        Loader.hide();
                        Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาด' });
                    }
                }
            },
            async renderCardExchange() {
                UI.setHeader('แลกเปลี่ยนการ์ด');
                const content = document.getElementById('content-area');
                const u = appState.user || {};
                const isTeacher = (u.role === 'teacher');
                const myCards = u.my_cards || {};
                
           
                const tab = appState.exchangeTab || 'S';

                Loader.show();
                let recipes = {};
                let systemCards = {}; 
                
                try {
                    const cardsSnap = await get(ref(db, 'system_cards'));
                    if (cardsSnap.exists()) systemCards = cardsSnap.val();

                    if (tab !== 'ALL_CARDS' && tab !== 'SPECIAL' || !isTeacher) {
                        const snapshot = await get(ref(db, 'settings/exchange_recipes'));
                        if (snapshot.exists()) recipes = snapshot.val();
                    }
                } catch (e) {
                    console.error("Error fetching data:", e);
                }
                Loader.hide();
                let userSSSCardAmount = 0;
                let validSSSCards = [];
                
                if (systemCards) {
                    for (const [sysId, card] of Object.entries(systemCards)) {
                        if (card.rarity === 'SSS') {
                            const imageUrl = card.image || card.driveId || '';
                            // แปลง Key ให้ตรงกับรูปแบบใน my_cards (Base64 ของรูปภาพ)
                            let playerCardKey = sysId;
                            if (imageUrl) {
                                try {
                                    playerCardKey = btoa(imageUrl).replace(/=/g, '_');
                                } catch (e) {}
                            }
                            
                            const ownedCount = myCards[playerCardKey] || 0;
                            if (ownedCount > 0) {
                                userSSSCardAmount += ownedCount;
                                validSSSCards.push(playerCardKey);
                            }
                        }
                    }
                }
                const activeSSSKey = validSSSCards.length > 0 ? validSSSCards[0] : 'SSS_001';

                let itemsHtml = '';
                let containerClass = 'grid grid-cols-3 sm:grid-cols-3 gap-2 sm:gap-3';

                if (tab === 'ALL_CARDS' && isTeacher) {
                    const entries = Object.entries(systemCards);
                    if (entries.length === 0) {
                        containerClass = 'flex flex-col';

            async processExchange(recipeId) {
                Loader.show();
                try {
                    // 1. ดึงข้อมูลสูตรและข้อมูลการ์ดระบบมาพร้อมกัน เพื่อเอาไปแปลง Key เป็น Base64
                    const [recipeSnap, systemCardsSnap] = await Promise.all([
                        get(ref(db, `settings/exchange_recipes/${recipeId}`)),
                        get(ref(db, 'system_cards'))
                    ]);

                    if (!recipeSnap.exists()) {
                        Loader.hide();
                        return Swal.fire({ icon: 'error', title: 'ไม่พบสูตร', text: 'สูตรแลกเปลี่ยนนี้ถูกลบหรือไม่มีอยู่', customClass: { popup: 'rounded-3xl' } });
                    }

                    const recipe = recipeSnap.val();
                    const systemCards = systemCardsSnap.exists() ? systemCardsSnap.val() : {};
                    const reqs = recipe.requirements || {};
                    const u = appState.user;
                    const myCards = u.my_cards || {};

                    // สร้างตัวแปรเก็บ Key ที่แปลงแล้ว เพื่อใช้ตอนหักออก จะได้ไม่ต้องคำนวณซ้ำ
                    const parsedRequirements = {};

                    // 2. ตรวจสอบความถูกต้องอีกครั้ง (โดยแปลง Key เป็น Base64 ให้ตรงกับคลัง)
                    for (const [reqCardId, reqAmount] of Object.entries(reqs)) {
                        const cardInfo = systemCards[reqCardId] || {};
                        let playerCardKey = reqCardId;
                        const imageUrl = cardInfo.image || cardInfo.driveId || '';
                        
                        if (imageUrl) {
                            try {
                                playerCardKey = btoa(imageUrl).replace(/=/g, '_');
                            } catch (e) {
                                console.error("Error encoding template image:", e);
                            }
                        }

                        parsedRequirements[playerCardKey] = reqAmount; // เก็บจำนวนที่ต้องใช้คู่กับ Base64 Key

                        // เช็กจำนวนในคลังด้วย Base64 Key
                        if ((myCards[playerCardKey] || 0) < reqAmount) {
                            Loader.hide();
                            return Swal.fire({ icon: 'error', title: 'วัตถุดิบไม่พอ', text: 'การ์ดของคุณไม่เพียงพอสำหรับการแลกเปลี่ยนนี้', customClass: { popup: 'rounded-3xl' } });
                        }
                    }

                    Loader.hide();
                    const confirm = await Swal.fire({
                        title: 'ยืนยันการแลก',
                        text: `คุณต้องการแลกเปลี่ยนเป็น ${recipe.targetName || recipe.targetCardId} ใช่หรือไม่?`,
                        showCancelButton: true,
                        confirmButtonText: 'แลกเลย!',
                        cancelButtonText: 'ยกเลิก',
                        confirmButtonColor: '#F97316',
                        customClass: { popup: 'rounded-3xl' }
                    });

                    if (confirm.isConfirmed) {
                        Loader.show();
                        let updates = {};

                        // 3. หักการ์ดที่เป็นวัตถุดิบออก (ใช้ Base64 Key ที่เตรียมไว้)
                        for (const [playerCardKey, reqAmount] of Object.entries(parsedRequirements)) {
                            const remain = myCards[playerCardKey] - reqAmount;
                            if (remain <= 0) {
                                updates[`users/${u.uid}/my_cards/${playerCardKey}`] = null; 
                                delete appState.user.my_cards[playerCardKey];
                            } else {
                                updates[`users/${u.uid}/my_cards/${playerCardKey}`] = remain;
                                appState.user.my_cards[playerCardKey] = remain;
                            }
                        }

                        // 4. แปลง Key ของการ์ดเป้าหมาย (ผลลัพธ์) เป็น Base64 ก่อนนำเข้าคลัง
                        let targetPlayerKey = recipe.targetCardId;
                        const targetCardInfo = systemCards[recipe.targetCardId] || {};
                        const targetImageUrl = targetCardInfo.image || targetCardInfo.driveId || '';
                        
                        if (targetImageUrl) {
                            try {
                                targetPlayerKey = btoa(targetImageUrl).replace(/=/g, '_');
                            } catch (e) {
                                console.error("Error encoding target image:", e);
                            }
                        }

                        // 5. เพิ่มการ์ดเป้าหมายลงในคลัง (ใช้ Base64 Key)
                        const currentTargetAmt = myCards[targetPlayerKey] || 0;
                        updates[`users/${u.uid}/my_cards/${targetPlayerKey}`] = currentTargetAmt + 1;
                        if (!appState.user.my_cards) appState.user.my_cards = {};
                        appState.user.my_cards[targetPlayerKey] = currentTargetAmt + 1;

                        // ส่งข้อมูลขึ้น Firebase
                        await update(ref(db), updates);
                        Loader.hide();

                        Swal.fire({
                            icon: 'success',
                            title: 'แลกเปลี่ยนสำเร็จ!',
                            text: `คุณได้รับ ${recipe.targetName || recipe.targetCardId} เรียบร้อยแล้ว`,
                            confirmButtonColor: '#22C55E',
                            customClass: { popup: 'rounded-3xl' }
                        });

                        this.renderCardExchange(); // รีโหลดหน้า
                    }
                } catch (e) {
                    Loader.hide();
                    console.error("Exchange Error:", e);
                    Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการแลกเปลี่ยน' });
                }
            },
            async processSpecialExchange(itemId, sssTokenId) {
                const item = SPECIAL_ABILITIES[itemId];
                const u = appState.user;
                const currentSSSCards = (u.my_cards && u.my_cards[sssTokenId]) || 0;

                if (currentSSSCards < 1) {
                    return Swal.fire({
                        icon: 'error', 
                        title: 'การ์ดไม่พอ', 
                        text: 'คุณต้องมีการ์ดระดับ SSS อย่างน้อย 1 ใบในการแลกเปลี่ยนนี้', 
                        customClass: {popup: 'rounded-3xl'}
                    });
                }

                const confirm = await Swal.fire({
                    title: 'ยืนยันการแลก',

            async adminAutoGenerateRecipes(tier) {
                // ยืนยันก่อนทำรายการ
                const confirm = await Swal.fire({
                    title: `สุ่มจัดสูตรระดับ ${tier}?`,
                    html: `<p class="text-sm text-gray-500">ระบบจะสร้างสูตรแลกเปลี่ยนให้การ์ดเป้าหมายระดับ ${tier} ทุกใบที่มีในระบบ<br><br><span class="text-red-500 font-bold">*สูตรเดิมในระดับ ${tier} จะไม่ถูกลบ กรุณาเคลียร์สูตรเก่าก่อนหากไม่ต้องการให้ซ้ำซ้อน</span></p>`,
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonText: 'เริ่มจัดสูตรเลย!',
                    cancelButtonText: 'ยกเลิก',
                    confirmButtonColor: '#10B981',
                    customClass: { popup: 'rounded-3xl' }
                });

                if (!confirm.isConfirmed) return;

                Loader.show();
                try {
                    // ดึงการ์ดทั้งหมดในระบบ
                    const cardsSnap = await get(ref(db, 'system_cards'));
                    if (!cardsSnap.exists()) {
                        Loader.hide();
                        return Swal.fire('เกิดข้อผิดพลาด', 'ไม่พบการ์ดในระบบ', 'error');
                    }
                    
                    const allCards = cardsSnap.val();
                    const cardsByRarity = { A: [], S: [], SS: [], SSS: [] };
                    Object.entries(allCards).forEach(([id, card]) => {
                        if (cardsByRarity[card.rarity]) {
                            cardsByRarity[card.rarity].push({ id, ...card });
                        }
                    });

                    let targets = [];
                    let materials = [];
                    let requiredAmount = 2; // กำหนดให้ใช้การ์ดวัตถุดิบ 2 ใบเสมอ

                    if (tier === 'SSS') {
                        targets = cardsByRarity['SSS'];
                        materials = cardsByRarity['SS'];
                    } else if (tier === 'SS') {
                        targets = cardsByRarity['SS'];
                        materials = cardsByRarity['S'];
                    } else if (tier === 'S') {
                        targets = cardsByRarity['S'];
                        materials = cardsByRarity['A'];
                    }

                    if (targets.length === 0) {
                        Loader.hide();
                        return Swal.fire('ไม่สามารถจัดสูตรได้', `ไม่พบการ์ดระดับ ${tier} ที่จะเป็นผลลัพธ์`, 'warning');
                    }

                    let newRecipes = {};

                    // ลอจิกสำหรับ SS และ SSS (เรียงตามลำดับ ห้ามซ้ำ)
                    if (tier === 'SSS' || tier === 'SS') {
                        if (materials.length < targets.length * requiredAmount) {
                            Loader.hide();
                            return Swal.fire('วัตถุดิบไม่พอ!', `ต้องการการ์ดระดับรองลงมาจำนวน ${targets.length * requiredAmount} ใบแบบไม่ซ้ำ แต่ในระบบมีเพียง ${materials.length} ใบ`, 'error');
                        }

                        let matIndex = 0;
                        targets.forEach(targetCard => {
                            let reqs = {};
                            // หยิบวัตถุดิบเรียงตามลำดับ 2 ใบ
                            for (let i = 0; i < requiredAmount; i++) {
                                const matCard = materials[matIndex];
                                reqs[matCard.id] = (reqs[matCard.id] || 0) + 1;
                                matIndex++;
                            }

                            const recipeKey = push(ref(db, 'settings/exchange_recipes')).key;
                            newRecipes[`settings/exchange_recipes/${recipeKey}`] = {
                                tier: tier,
                                targetCardId: targetCard.id,
                                targetName: targetCard.name,
                                requirements: reqs,
                                isAutoGenerated: true
                            };
                        });
                    } 
                    // ลอจิกสำหรับ S (สุ่มการ์ด A สามารถซ้ำได้ แต่การ์ด A ทุกใบต้องถูกใช้งานอย่างน้อย 1 ครั้ง)
                    else if (tier === 'S') {
                        const totalRequiredSlots = targets.length * requiredAmount;
                        
                        if (materials.length > totalRequiredSlots) {
                            Loader.hide();
                            return Swal.fire('ไม่สามารถทำตามเงื่อนไขได้', `มีการ์ด A (${materials.length} ใบ) มากกว่าช่องว่างในสูตร (${totalRequiredSlots} ช่อง) ทำให้ไม่สามารถใส่การ์ด A ครบทุกใบได้ กรุณาเพิ่มการ์ด S หรือลดการ์ด A`, 'error');
                        }

                        let poolOfMaterials = [];
                        let unusedMaterials = [...materials];

                        // 1. บังคับใส่การ์ด A ทุกใบลงไปใน Pool อย่างน้อย 1 ครั้ง เพื่อการันตีว่าถูกใช้ครบ
                        while (unusedMaterials.length > 0) {
                            const randomIndex = Math.floor(Math.random() * unusedMaterials.length);
                            poolOfMaterials.push(unusedMaterials[randomIndex]);
                            unusedMaterials.splice(randomIndex, 1);
                        }

                        // 2. ช่องที่เหลือ เติมด้วยการ์ด A ใบไหนก็ได้แบบสุ่ม
                        while (poolOfMaterials.length < totalRequiredSlots) {
                            const randomIndex = Math.floor(Math.random() * materials.length);
                            poolOfMaterials.push(materials[randomIndex]);
                        }

                        // 3. สับเปลี่ยน (Shuffle) Pool เพื่อไม่ให้ตัวที่บังคับใส่ไปกระจุกอยู่ช่วงแรก
                        poolOfMaterials.sort(() => Math.random() - 0.5);

                        let poolIndex = 0;
                        targets.forEach(targetCard => {
                            let reqs = {};
                            for (let i = 0; i < requiredAmount; i++) {
                                const matCard = poolOfMaterials[poolIndex];
                                reqs[matCard.id] = (reqs[matCard.id] || 0) + 1;
                                poolIndex++;
                            }

                            const recipeKey = push(ref(db, 'settings/exchange_recipes')).key;
                            newRecipes[`settings/exchange_recipes/${recipeKey}`] = {
                                tier: tier,
                                targetCardId: targetCard.id,
                                targetName: targetCard.name,
                                requirements: reqs,
                                isAutoGenerated: true
                            };
                        });
                    }

                    // อัปเดตข้อมูลขึ้น Firebase
                    await update(ref(db), newRecipes);
                    Loader.hide();
                    Toast.fire({ icon: 'success', title: `จัดสูตรระดับ ${tier} สำเร็จ!` });
                    this.renderCardExchange();

                } catch (error) {
                    Loader.hide();
                    console.error("Auto Generate Error:", error);
                    Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการสร้างสูตร' });
                }
            },

                        const addBtn = document.getElementById('add-url-btn');
                        const container = document.getElementById('url-container');
                        let count = 1;
                        
                        addBtn.addEventListener('click', () => {
                            count++;
                            const input = document.createElement('input');
                            input.className = 'ac-url-input w-full p-2.5 border border-gray-200 bg-gray-50 rounded-lg outline-none focus:border-indigo-400 mt-2';
                            input.placeholder = `https://... (ภาพที่ ${count})`;
                            container.appendChild(input);
                            
                            // เลื่อน Scroll ลงมาให้เห็นช่องใหม่เสมอ
                            container.scrollTop = container.scrollHeight;
                        });
                    },
                    preConfirm: () => {
                        const baseName = document.getElementById('ac-base-name').value.trim();
                        const rarity = document.getElementById('ac-rarity').value;
                        const urlInputs = document.querySelectorAll('.ac-url-input');

                        // รวบรวมเฉพาะ URL ที่กรอกข้อมูลจริง
                        let urls = [];
                        urlInputs.forEach(input => {
                            const val = input.value.trim();
                            if (val) urls.push(val);
                        });

                        // ตรวจสอบความถูกต้อง
                        if (!baseName) {
                            Swal.showValidationMessage('กรุณากรอกชื่อการ์ดพื้นฐาน');
                            return false;
                        }
                        if (urls.length === 0) {
                            Swal.showValidationMessage('กรุณากรอกลิงก์รูปภาพอย่างน้อย 1 ลิงก์');
                            return false;
                        }

                        // สร้าง Array ข้อมูลการ์ดเพื่อนำไปบันทึก
                        let cardsToSave = urls.map((rawUrl, index) => {
                            // แปลง index เป็น 01, 02, 03
                            const suffix = (index + 1).toString().padStart(2, '0');
                            const name = urls.length > 1 ? `${baseName}_${suffix}` : baseName; // ถ้ากรอกใบเดียว ไม่ต้องใส่ _01 ก็ได้ (แต่ถ้าอยากให้ใส่เสมอ ลบเงื่อนไขเหลือแค่ `${baseName}_${suffix}` ได้เลย)

                            let image = rawUrl;
                            if (rawUrl.includes('drive.google.com')) {
                                image = extractDriveId(rawUrl);
                            }

                            // แอบบวก index เข้าไปที่ timestamp เล็กน้อย ป้องกันคีย์ซ้ำกันในระบบ
                            return { name, image, rarity, timestamp: Date.now() + index }; 
                        });

                        return cardsToSave;
                    }
                });

                if (formValues && formValues.length > 0) {
                    Loader.show();
                    try {
                        // ใช้การอัปเดตแบบ Batch (ส่งทีเดียวหลายรายการ) เพื่อลดภาระฐานข้อมูล
                        const updates = {};
                        formValues.forEach(cardData => {
                            const newRefKey = push(ref(db, 'system_cards')).key;
                            updates[`system_cards/${newRefKey}`] = cardData;
                        });
                        
                        await update(ref(db), updates);
                        
                        Loader.hide();
                        Toast.fire({ icon: 'success', title: `เพิ่มการ์ดสำเร็จ ${formValues.length} ใบ` });
                        this.renderCardExchange();
                    } catch (e) {
                        Loader.hide();
                        Toast.fire({ icon: 'error', title: 'เกิดข้อผิดพลาดในการบันทึก' });
                    }
                }
            },

            async renderLeaderboard() {
                const listContainer = document.getElementById('leaderboard-list');
                const pagContainer = document.getElementById('leaderboard-pagination');
                if (!listContainer || !pagContainer) return;

                const criteria = appState.rankingCriteria || 'cs';
                const scope = appState.rankingScope || 'class'; // เพิ่มตัวแปรเช็ค scope
                const page = appState.rankingPage || 1;
                const limit = 10;

                try {
                    const usersRef = ref(db, 'users');
                    const snap = await get(usersRef);
                    
                    let students = [];
                    if (snap.exists()) {
                        const allUsers = snap.val();
                        for (const uid in allUsers) {
                            const u = allUsers[uid];
                            if (u.role === 'student') {
                                // ตรรกะคัดกรองห้องเรียน
                                if (scope === 'class') {
                                    if (u.class === appState.user.class && u.room === appState.user.room) {
                                        students.push({ uid, ...u });
                                    }
                                } else {
                                    // ระดับโรงเรียน (ดึงทุกคน)
                                    students.push({ uid, ...u });
                                }
                            }
                        }
                    }

                    // เรียงคะแนนตามเกณฑ์
                    students.sort((a, b) => {
                        const scoreA = (a.items && a.items[criteria]) || 0;
                        const scoreB = (b.items && b.items[criteria]) || 0;
                        return scoreB - scoreA;
                    });

                    // ------------------ ส่วนแสดงอันดับของฉัน ------------------
                    let myRankHtml = '';
                    if (appState.user && appState.user.role === 'student') {
                        const myIndex = students.findIndex(s => s.uid === appState.user.uid);
                        const myRank = myIndex !== -1 ? myIndex + 1 : '-';
                        const myScore = (appState.user.items && appState.user.items[criteria]) || 0;
                        const scoreIcon = criteria === 'cs' ? `<img src="${ITEM_IMAGES.cs}" class="w-4 h-4 object-contain">` : `<img src="${ITEM_IMAGES.ct}" class="w-4 h-4 object-contain">`;
                        const rankLabel = scope === 'class' ? `อันดับของฉัน (ในห้อง ${appState.user.class}/${appState.user.room})` : 'อันดับของฉัน (ระดับโรงเรียน)';
                        
                        myRankHtml = `
                            <div class="-mt-3.5 mb-8 px-4 py-1 bg-gradient-to-r from-yellow-200/20 to-blue-500/20 border border-primary/20 rounded-lg flex justify-between items-center shadow-lg">
                                <div class="flex items-center gap-3">
                                    <div class="w-8 h-8 rounded-full bg-white shadow-sm flex items-center justify-center font-bold text-primary text-sm">${myRank}</div>
                                    <span class="text-sm font-bold text-dark">${rankLabel}</span>
                                </div>
                                <div class="flex items-center gap-1.5 font-bold text-sm text-dark bg-white/60 px-2 py-1 rounded-lg">
                                    <span>${myScore.toLocaleString()}</span>
                                    ${scoreIcon}
                                </div>
                            </div>
                        `;
                    }
                    // -----------------------------------------------------------

                    if (students.length === 0) {
                        listContainer.innerHTML = `<div class="text-center py-8 text-gray-400 text-sm">ยังไม่มีข้อมูลในระบบ</div>`;
                        pagContainer.innerHTML = '';
                        return;
                    }

                    const totalItems = students.length;
                    const totalPages = Math.ceil(totalItems / limit);
                    const currentPage = Math.min(Math.max(page, 1), totalPages);
                    appState.rankingPage = currentPage; 

                    const startIndex = (currentPage - 1) * limit;
                    const endIndex = Math.min(startIndex + limit, totalItems);
                    const pageData = students.slice(startIndex, endIndex);

                    let listHtml = myRankHtml; // เอา UI กล่องอันดับของฉันมาใส่ไว้บนสุด
                    pageData.forEach((st, idx) => {
                        const absoluteRank = startIndex + idx + 1;
                        const score = (st.items && st.items[criteria]) || 0;
                        const avatar = st.profileImage || DEFAULT_AVATAR;
                        const currentFrame = getProfileFrame(st);
                        const displayN = st.displayName || st.fullName;
                        const catImg = st.catData?.equippedCat || CAT_ASSETS.starterCat;
                        
                        let rankBadge = '';
                        let rankBg = 'bg-white hover:border-gray-200';
                        if (absoluteRank === 1) {
                            rankBadge = `<span class="text-lg sm:text-xl"><img src="https://drive.google.com/thumbnail?id=1Ma4EE_XRUQyv2Z2s5jY8I5KjwvfGTzF9&sz=s800" class="w-10 h-8 object-contain"></span>`;
                            rankBg = 'bg-gradient-to-r from-yellow-50 to-orange-50/30 border-yellow-200';
                        } else if (absoluteRank === 2) {
                            rankBadge = `<span class="text-lg sm:text-xl"><img src="https://drive.google.com/thumbnail?id=1C1TaXHTM8JfhXobvxrGVuSMQEgvzhm11&sz=s800" class="w-10 h-8 object-contain"></span>`;
                            rankBg = 'bg-gradient-to-r from-gray-50 to-slate-50/30 border-slate-200';
                        } else if (absoluteRank === 3) {
                            rankBadge = `<span class="text-lg sm:text-xl"><img src="https://drive.google.com/thumbnail?id=1-V4fPN8C3Tbm1DWzjMZ5dFEORBN-58hJ&sz=s800" class="w-8 h-8 object-contain"></span>`;
                            rankBg = 'bg-gradient-to-r from-amber-50 to-amber-50/10 border-amber-200';
                        } else {
                            rankBadge = `<span class="w-5 h-5 sm:w-6 sm:h-6 rounded-full bg-gray-100 flex items-center justify-center text-[10px] sm:text-xs font-bold text-gray-500">${absoluteRank}</span>`;
                        }

                        const scoreIcon = criteria === 'cs' ? `<img src="${ITEM_IMAGES.cs}" class="w-5 h-5 object-contain">` : `<img src="${ITEM_IMAGES.ct}" class="w-5 h-5 object-contain">`;

                        listHtml += `
                            <div onclick="app.showStudentProfileDetail('${st.uid}')" class="p-2 sm:p-3.5 rounded-2xl border ${rankBg} flex items-center justify-between transition-all duration-200 shadow-sm cursor-pointer hover:border-primary/50 active:scale-[0.98]">
                                <div class="flex items-center gap-2 sm:gap-3 flex-1 min-w-0 pr-2">
                                    <div class="w-6 sm:w-8 flex justify-center items-center shrink-0">
                                        ${rankBadge}
                                    </div>
                                    <div class="relative w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center shrink-0 select-none">
                                        <img src="${avatar}" 
                                             class="w-[90%] h-[90%] rounded-full object-cover bg-white shadow-inner"
                                             onerror="this.onerror=null; this.src='${DEFAULT_AVATAR}'"
                                             alt="${st.fullName}">
                                        <img src="${currentFrame}" class="absolute inset-0 w-full h-full pointer-events-none object-contain scale-[1.18]" alt="Profile Frame">
                                        <!-- Cat Mini Icon overlay -->
                                        <div class="absolute -right-2 -bottom-1 w-6 h-6 bg-white rounded-full p-0.5 shadow-sm border border-gray-100">
                                            <img src="https://drive.google.com/thumbnail?id=${catImg}&sz=s800" class="w-full h-full object-contain">
                                        </div>
                                    </div>
                                    <div class="min-w-0 flex-1 pl-1">
                                        <div class="font-bold text-xs sm:text-sm text-dark truncate">${displayN}</div>
                                        <div class="text-[9px] sm:text-[10px] text-gray-400 font-medium truncate">ม.${st.class}/${st.room} • เลขที่ ${st.number}</div>
                                    </div>
                                </div>
                                <div class="flex items-center gap-1 sm:gap-1.5 font-bold text-xs sm:text-sm text-dark bg-gray-50 px-2.5 py-1 sm:px-3 sm:py-1.5 rounded-xl border border-gray-100 shadow-inner shrink-0">
                                    <span>${score.toLocaleString()}</span>
                                    ${scoreIcon}
                                </div>
                            </div>
                        `;
                    });
                    listContainer.innerHTML = listHtml;

                    pagContainer.innerHTML = `
                        <button onclick="app.changeRankingPage(-1)" 
                                ${currentPage === 1 ? 'disabled class="text-gray-300 cursor-not-allowed px-3 py-1.5 rounded-lg text-xs font-bold"' : 'class="text-gray-600 hover:text-primary active:scale-95 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1"'} >
                            <i class="fa-solid fa-chevron-left"></i> ก่อนหน้า
                        </button>
                        <span class="text-xs font-bold text-gray-500">
                            หน้า ${currentPage} / ${totalPages}
                        </span>
                        <button onclick="app.changeRankingPage(1)" 
                                ${currentPage === totalPages ? 'disabled class="text-gray-300 cursor-not-allowed px-3 py-1.5 rounded-lg text-xs font-bold"' : 'class="text-gray-600 hover:text-primary active:scale-95 px-3 py-1.5 rounded-lg text-xs font-bold transition flex items-center gap-1"'} >
                            ถัดไป <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    `;

                } catch (error) {
                    console.error("Error loading ranking data:", error);
                    listContainer.innerHTML = `<div class="text-center py-6 text-red-500 text-xs">เกิดข้อผิดพลาดในการดึงข้อมูลอันดับ</div>`;
                    pagContainer.innerHTML = '';
                }
            },

                    window.renderStore.assignments = {};

                    let classmates = [];
                    const myClass = appState.user.class;
                    const myRoom = appState.user.room;

                    for (const uid in allUsers) {
                        const u = allUsers[uid];
                        if (u.role === 'student' && u.class === myClass && u.room === myRoom) {
                            classmates.push({ uid, ...u });
                        }
                    }

                    classmates.sort((a, b) => parseInt(a.number) - parseInt(b.number));
                    const subRef = ref(db, `submissions/${assignId}`);
                    const subSnap = await get(subRef);
                    const submissions = subSnap.exists() ? subSnap.val() : {};

                        listContainer.innerHTML = `<div class="text-center py-6 text-gray-400 text-sm">ไม่พบรายชื่อเพื่อนร่วมห้อง</div>`;

                                    ${sub.status}
                                </span>
